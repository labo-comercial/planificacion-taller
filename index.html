  <meta name="theme-color" content="#2F372A">
  <title>Planificación Mano de Obra</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Respaldo: si el CDN principal no cargó la librería, la traemos de otro y avisamos cuando esté lista.
    window.__supaReady = (function(){
      function cargado(){ return (typeof supabase !== "undefined" && supabase && supabase.createClient); }
      return new Promise(function(resolve){
        if (cargado()) { resolve(); return; }
        var s = document.createElement("script");
        s.src = "https://unpkg.com/@supabase/supabase-js@2";
        s.onload = function(){ resolve(); };
        s.onerror = function(){ resolve(); };
        document.head.appendChild(s);
        // chequeo por las dudas a los 300ms
        setTimeout(function(){ if (cargado()) resolve(); }, 300);
      });
    })();
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F7F6F2; color: #2C2C2A; margin: 0; padding: 24px; }
    .wrap { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 2px; }
    .sub { font-size: 13px; color: #888780; margin: 0 0 16px; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid #E6E4DC; overflow-x: auto; }
    .tab { background: var(--c, transparent); opacity: 0.55; border: 1px solid transparent; border-bottom: none; border-radius: 10px 10px 0 0; padding: 9px 15px; font-size: 13.5px; color: #5F5E5A; cursor: pointer; margin-bottom: -1px; white-space: nowrap; transition: opacity .15s; }
    .tab:hover { opacity: 0.8; }
    .tab.active { background: var(--c, #fff); opacity: 1; border-color: #E6E4DC; border-bottom-color: var(--c, #fff); color: #2C2C2A; font-weight: 600; }
    .panel { background: #fff; border: 1px solid #E6E4DC; border-top: none; border-radius: 0 0 14px 14px; padding: 18px; }
    .estado { font-size: 12.5px; padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; }
    .ok { background: #E1F5EE; color: #0F6E56; } .err { background: #FCEBEB; color: #A32D2D; } .cargando { background: #F1EFE8; color: #5F5E5A; }
    table { width: 100%; border-collapse: collapse; border: 1px solid #E6E4DC; border-radius: 12px; font-size: 13px; }
    thead tr { background: #F1EFE8; }
    th { text-align: left; padding: 9px 12px; font-weight: 600; color: #5F5E5A; font-size: 12px; position: sticky; top: 0; background: #F1EFE8; z-index: 10; box-shadow: inset 0 -1px 0 #E6E4DC; }
    td { padding: 6px 10px; border-top: 1px solid #F1EFE8; }
    input, select { border: 1px solid #E6E4DC; border-radius: 6px; padding: 5px 7px; font-size: 12.5px; width: 100%; }
    .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #185FA5; color: #fff; }
    /* --- Sistema de botones homogéneo (variantes semánticas) --- */
    .btn-sec { background: #fff; border: 1px solid #E6E4DC; color: #5F5E5A; }
    .btn-sec:hover { border-color: #C4C2BA; }
    .btn-plan { background: #4A3F7A; color: #fff; }      /* ir a Planificación */
    .btn-ok { background: #3B6D11; color: #fff; }        /* generar / confirmar */
    .btn-wsp { background: #25D366; color: #fff; }       /* WhatsApp */
    .btn-sm { padding: 5px 12px; font-size: 11.5px; border-radius: 7px; font-weight: 550; }
    .btn-add { background: transparent; border: 1px dashed #E6E4DC; color: #185FA5; padding: 8px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; }
    .btn-del { border: none; background: transparent; color: #A8A69E; cursor: pointer; font-size: 16px; }
    .row-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    .card { border: 1px solid #E6E4DC; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .lbl { font-size: 11.5px; color: #888780; } .lbl input, .lbl select { margin-top: 3px; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .chip { border: 1px solid #E6E4DC; background: #fff; color: #888780; border-radius: 16px; padding: 4px 10px; font-size: 11.5px; cursor: pointer; }
    .chip.on { border-color: #185FA5; background: #E6F1FB; color: #185FA5; }
    .estpill { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .pl-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    #login { position: fixed; inset: 0; background: #F7F6F2; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: #fff; border: 1px solid #E6E4DC; border-radius: 16px; padding: 32px 28px; max-width: 360px; width: 100%; text-align: center; }
    .login-card input { margin: 6px 0; padding: 10px 12px; font-size: 14px; }
    #app { display: none; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    @media print { .no-print { display: none !important; } body { background: #fff; padding: 0; } .tabs { display: none !important; } .topbar button { display: none; } .solo-print { display: block !important; } }
    .solo-print { display: none; }
  </style>

    /* ---- TRASLADOS DE PRESUPUESTO A COMPRAS ---- */

    let solpAbierto = null; // id del traslado cuya SOLP se está mostrando (null = ver la lista)

    async function revertirTraslado(id) {

      if (!lista.length) h += '<tr><td colspan="7" style="color:#A8A69E;padding:14px">Sin personas en esta sede.</td></tr>';

        const esContr = p.tipo==="Contratista";

        h += '<tr><td style="width:90px"><input value="'+(p.legajo!=null?String(p.legajo).replace(/"/g,'&quot;'):'')+'" placeholder="—" onchange="editarP(\''+p.id+'\',\'legajo\',this.value)" style="width:100%"></td><td><input value="'+(p.nombre||'').replace(/"/g,'&quot;')+'" onchange="editarP(\''+p.id+'\',\'nombre\',this.value)"></td><td><input value="'+(p.especialidad||'').replace(/"/g,'&quot;')+'" onchange="editarP(\''+p.id+'\',\'especialidad\',this.value)"></td><td style="width:120px"><select onchange="editarP(\''+p.id+'\',\'tipo\',this.value)"><option '+(p.tipo==='Directo'?'selected':'')+'>Directo</option><option '+(p.tipo==='Contratista'?'selected':'')+'>Contratista</option></select></td><td style="width:120px">'+cc+'</td><td style="width:130px">'+(esContr?'<span style="font-size:11px;color:#A8A69E">—</span>':'<button class="btn" style="background:#fff;border:1px solid #E6E4DC;color:#185FA5;padding:3px 9px;font-size:11px" onclick="togglePersonal(\''+p.id+'\')">'+(abierto?'▾ Ocultar':'▸ Ver')+(nMeses?' ('+nMeses+')':'')+'</button>')+'</td><td style="width:30px"><button class="btn-del" onclick="eliminarP(\''+p.id+'\')">×</button></td></tr>';

      h += '<p style="font-size:11.5px;color:#A8A69E;margin-top:10px">El <b>valor hora base</b> se usa como fallback cuando un mes no tiene valor propio cargado (por ejemplo, planificación a futuro). El detalle diario y la planificación valorizan cada jornada con el valor del mes correspondiente.</p>';

    function togglePersonal(id){ personalAbierto[id]=!personalAbierto[id]; renderPersonal(); }

      let h = '<div style="display:flex;gap:24px;flex-wrap:wrap">';
      // Valor-hora por mes
      h += '<div style="flex:1;min-width:280px"><div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:6px">💵 Valor hora por mes</div>';
      h += '<table style="font-size:12px;width:100%"><thead><tr><th style="text-align:left">Mes</th><th style="text-align:right">Valor hora</th><th></th></tr></thead><tbody>';
      const mesesVH = Object.keys(vh).sort().reverse();
      if(!mesesVH.length) h += '<tr><td colspan="3" style="color:#A8A69E;padding:8px 0">Sin valores mensuales. Usa el valor base.</td></tr>';
      mesesVH.forEach(m=>{ h += '<tr><td>'+nombreMes(m)+'</td><td style="text-align:right"><input type="number" value="'+vh[m]+'" onchange="setValorHora(\''+p.id+'\',\''+m+'\',Number(this.value))" style="width:90px;text-align:right"></td><td style="text-align:right"><button class="btn-del" style="width:20px;height:20px;line-height:1" onclick="borrarValorHora(\''+p.id+'\',\''+m+'\')">×</button></td></tr>'; });
      h += '</tbody></table>';
      h += '<div style="display:flex;gap:6px;align-items:center;margin-top:8px"><input type="month" id="vh-mes-'+p.id+'" value="'+mesActual()+'" style="width:auto;font-size:12px"><input type="number" id="vh-val-'+p.id+'" placeholder="valor" style="width:90px;font-size:12px"><button class="btn" style="background:#185FA5;color:#fff;padding:4px 10px;font-size:11px" onclick="agregarValorHora(\''+p.id+'\')">+ Agregar mes</button></div>';
      h += '</div>';
      // Especialidad por mes
      h += '<div style="flex:1;min-width:280px"><div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:6px">🏷 Especialidad por mes (ascensos / cambios)</div>';
      h += '<table style="font-size:12px;width:100%"><thead><tr><th style="text-align:left">Mes</th><th style="text-align:left">Especialidad</th><th></th></tr></thead><tbody>';
      const mesesEH = Object.keys(eh).sort().reverse();
      if(!mesesEH.length) h += '<tr><td colspan="3" style="color:#A8A69E;padding:8px 0">Sin histórico. Usa la especialidad actual.</td></tr>';
      mesesEH.forEach(m=>{ h += '<tr><td>'+nombreMes(m)+'</td><td><input value="'+(eh[m]||'').replace(/"/g,'&quot;')+'" onchange="setEspecialidad(\''+p.id+'\',\''+m+'\',this.value)" style="width:100%"></td><td style="text-align:right"><button class="btn-del" style="width:20px;height:20px;line-height:1" onclick="borrarEspecialidad(\''+p.id+'\',\''+m+'\')">×</button></td></tr>'; });
      h += '</tbody></table>';
      h += '<div style="display:flex;gap:6px;align-items:center;margin-top:8px"><input type="month" id="eh-mes-'+p.id+'" value="'+mesActual()+'" style="width:auto;font-size:12px"><input id="eh-val-'+p.id+'" placeholder="especialidad" style="font-size:12px;flex:1"><button class="btn" style="background:#185FA5;color:#fff;padding:4px 10px;font-size:11px" onclick="agregarEspecialidad(\''+p.id+'\')">+ Agregar mes</button></div>';
      h += '</div>';
      h += '</div>';
      return h;
    }
    // ---- valor-hora mensual (upsert por persona+mes) ----
    async function setValorHora(pid, mes, valor){
      const { error } = await sb.from("valor_hora_hist").upsert({ persona_id:pid, mes, valor }, { onConflict:"persona_id,mes" });
      if(error) return setEstado("Error: "+error.message,"err");
      (valorHoraHist[pid]=valorHoraHist[pid]||{})[mes]=valor; setEstado("\u2713 Valor de "+nombreMes(mes)+" guardado.","ok");
    }
    async function agregarValorHora(pid){
      const mes = document.getElementById("vh-mes-"+pid).value;
      const val = Number(document.getElementById("vh-val-"+pid).value);
      if(!mes){ setEstado("Elegí un mes.","err"); return; }
      if(!val && val!==0){ setEstado("Cargá un valor.","err"); return; }
      await setValorHora(pid, mes, val); renderPersonal();
    }
    async function borrarValorHora(pid, mes){
      if(!confirm("¿Borrar el valor hora de "+nombreMes(mes)+"?")) return;
      const { error } = await sb.from("valor_hora_hist").delete().eq("persona_id",pid).eq("mes",mes);
      if(error) return setEstado("Error: "+error.message,"err");
      if(valorHoraHist[pid]) delete valorHoraHist[pid][mes]; setEstado("\u2713 Borrado.","ok"); renderPersonal();
    }
    // ---- especialidad mensual ----
    async function setEspecialidad(pid, mes, esp){
      const { error } = await sb.from("especialidad_hist").upsert({ persona_id:pid, mes, especialidad:esp }, { onConflict:"persona_id,mes" });
      if(error) return setEstado("Error: "+error.message,"err");
      (especialidadHist[pid]=especialidadHist[pid]||{})[mes]=esp; setEstado("\u2713 Especialidad de "+nombreMes(mes)+" guardada.","ok");
    }
    async function agregarEspecialidad(pid){
      const mes = document.getElementById("eh-mes-"+pid).value;
      const esp = document.getElementById("eh-val-"+pid).value.trim();
      if(!mes){ setEstado("Elegí un mes.","err"); return; }
      if(!esp){ setEstado("Cargá una especialidad.","err"); return; }
      await setEspecialidad(pid, mes, esp); renderPersonal();
    }
    async function borrarEspecialidad(pid, mes){
      if(!confirm("¿Borrar la especialidad de "+nombreMes(mes)+"?")) return;
      const { error } = await sb.from("especialidad_hist").delete().eq("persona_id",pid).eq("mes",mes);
      if(error) return setEstado("Error: "+error.message,"err");
      if(especialidadHist[pid]) delete especialidadHist[pid][mes]; setEstado("\u2713 Borrado.","ok"); renderPersonal();
    }
    async function agregarP(){const ch=(SEDE==="neuquen"?17000:0);const{error}=await sb.from("personal").insert({nombre:"Nueva persona",tipo:"Directo",costo_hora:ch,sede:SEDE});if(error)return setEstado("Error: "+error.message,"err");registrarLog("crear","personal","Nueva persona");cargar();}
    async function editarP(id,c,v){const u={};u[c]=v;const{error}=await sb.from("personal").update(u).eq("id",id);if(error)return setEstado("Error: "+error.message,"err");setEstado("\u2713 Guardado.","ok");}
    async function eliminarP(id){
      const p = personas.find(x=>x.id===id);
      const nombre = p ? (p.nombre||"esta persona") : "esta persona";
      // 1ª confirmación: intención
      if(!confirm('¿Querés eliminar a "'+nombre+'"?\n\nEsta acción no se puede deshacer.')) { setEstado("Borrado cancelado.","cargando"); return; }
      // Contar qué se va a arrastrar (borrado en cascada) para mostrarlo antes de confirmar de nuevo.
      let nPlan=0, nDet=0, nSup=0;
      try {
        const c1 = await sb.from("planificacion_personal").select("*",{count:"exact",head:true}).eq("persona_id",id); nPlan=c1.count||0;
        const c2 = await sb.from("detalle_diario").select("*",{count:"exact",head:true}).eq("persona_real",id); nDet=c2.count||0;
        const c3 = await sb.from("supervision").select("*",{count:"exact",head:true}).eq("supervisor_id",id); nSup=c3.count||0;
      } catch(e){ /* si falla el conteo, seguimos con la 2ª confirmación igual */ }
      const total = nPlan+nDet+nSup;
      // 2ª confirmación: consecuencias concretas
      let msg = 'CONFIRMACIÓN FINAL para eliminar a "'+nombre+'".\n\n';
      if(total>0){
        msg += 'Atención: al borrar a esta persona también se borrarán, sin poder recuperarlos:\n';
        if(nPlan>0) msg += '  • '+nPlan+' asignación(es) en Planificación\n';
        if(nDet>0)  msg += '  • '+nDet+' registro(s) en Detalle diario\n';
        if(nSup>0)  msg += '  • '+nSup+' asignación(es) de Supervisión\n';
        msg += '\n';
      } else {
        msg += 'No tiene asignaciones cargadas.\n\n';
      }
      msg += 'Para confirmar, escribí el nombre exacto de la persona:';
      const escrito = prompt(msg, "");
      if(escrito===null){ setEstado("Borrado cancelado.","cargando"); return; }
      if(escrito.trim().toLowerCase() !== (nombre||"").trim().toLowerCase()){
        setEstado("El nombre no coincide. Borrado cancelado.","err"); return;
      }
      const{error}=await sb.from("personal").delete().eq("id",id);
      if(error)return setEstado("Error: "+error.message,"err");
      setEstado('\u2713 "'+nombre+'" eliminada.',"ok");
      cargar();
    }

    /* ---- PROYECTOS ---- */
    // Borrador de proyectos: los cambios en la solapa NO se guardan hasta tocar "Guardar cambios".
    let draftPr = {};
    function prVal(pr, campo){ const d=draftPr[pr.id]; if(d && Object.prototype.hasOwnProperty.call(d,campo)) return d[campo]; return pr[campo]; }
    function setDraftPr(id, campo, valor){ if(!draftPr[id]) draftPr[id]={}; draftPr[id][campo]=valor; marcarSucio(id); }
    function marcarSucio(id){ const badge=document.getElementById("pr-dirty-"+id); if(badge) badge.style.display="inline-block"; const btn=document.getElementById("pr-savebtn"); if(btn){ btn.style.background="#185FA5"; btn.style.cursor="pointer"; } const msg=document.getElementById("pr-savebar-msg"); if(msg){ msg.textContent="Tenés cambios sin guardar."; msg.style.color="#BA7517"; } }
    function hayCambiosPr(){ return Object.keys(draftPr).some(id => draftPr[id] && Object.keys(draftPr[id]).length); }
    function renderProyectos() {
      let h = '';
      // ── Filtro de vista: En operación / Cotizaciones / Archivados ──
      const enOper = proyectos.filter(p=>esOperativo(p));
      const cotiz  = proyectos.filter(p=>esCotizacion(p) && !esArchivado(p));
      const arch   = proyectos.filter(p=>esArchivado(p));
      const tabBtn = (id,label,n)=>{ const on = proyVista===id; return '<button onclick="setProyVista(\''+id+'\')" style="border:1px solid '+(on?'#185FA5':'#E0DDD3')+';background:'+(on?'#185FA5':'#fff')+';color:'+(on?'#fff':'#5F5E5A')+';border-radius:9px;padding:6px 13px;font-size:12.5px;font-weight:'+(on?'600':'500')+';cursor:pointer">'+label+' <span style="opacity:.75;font-weight:500">('+n+')</span></button>'; };
      h += '<div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">'
         + tabBtn('operacion','En operación',enOper.length)
         + tabBtn('cotizaciones','Cotizaciones',cotiz.length)
         + tabBtn('archivados','Archivados',arch.length)
         + '</div>';
      h += '<div class="no-print" style="display:flex;justify-content:flex-end;margin-bottom:10px">'+botonesExport("proy-print","proyectos")+'</div>';
      h += '<div id="proy-print">';
      const lista = proyVista==='cotizaciones' ? cotiz : proyVista==='archivados' ? arch : enOper;
      if(proyVista==='cotizaciones') h += '<div style="font-size:11.5px;color:#8A86A0;background:#FBFAFE;border:1px solid #E4E0F0;border-radius:9px;padding:9px 12px;margin-bottom:16px">Las <b>cotizaciones</b> se planifican y se les calcula costo como práctica, pero <b>no consumen disponibilidad</b> ni aparecen en dashboard, gantt, histograma, parte diario ni desvíos operativos. Son presupuestos teóricos.</div>';
      if(proyVista==='archivados') h += '<div style="font-size:11.5px;color:#6E6C66;background:#F7F6F2;border:1px solid #E6E4DC;border-radius:9px;padding:9px 12px;margin-bottom:16px">Los proyectos <b>archivados</b> están fuera de la operación pero siguen consultables. Al archivar se congela un <b>snapshot</b> (proyecto + planificación + detalle) que sobrevive incluso si algún día borrás los datos vivos. Se pueden <b>restaurar</b> con un clic.</div>';

      if (!lista.length) h += '<p style="color:#A8A69E;font-size:13px;padding:6px 0">'+(proyVista==='cotizaciones'?'No hay cotizaciones. Marcá un proyecto como cotización desde su tarjeta.':proyVista==='archivados'?'No hay proyectos archivados.':'Sin proyectos en operación.')+'</p>';
      lista.forEach((pr,i)=>{
        const dirty = draftPr[pr.id] && Object.keys(draftPr[pr.id]).length;
        const cerrado = pr.estado==='Cerrado';
        const cotizacion = esCotizacion(pr), archivado = esArchivado(pr);
        const acento = archivado ? '#8C8A82' : cotizacion ? '#4A3F7A' : cerrado ? '#A8A69E' : '#185FA5';
        // chip de estado en el título
        let chipEstado = '';
        if(cotizacion) chipEstado = '<span style="background:#EDEAFA;color:#4A3F7A;font-size:10px;padding:1px 8px;border-radius:8px;font-weight:600;margin-left:6px">cotización</span>';
        else if(archivado) chipEstado = '<span style="background:#EDEBE4;color:#6E6C66;font-size:10px;padding:1px 8px;border-radius:8px;font-weight:600;margin-left:6px">archivado</span>';
        // controles del header según estado + permisos
        let controles = '';
        if(!archivado){
          controles += '<select onchange="editarPrEstado(\''+pr.id+'\',this.value)" style="width:auto;color:'+(cerrado?'#888780':'#3B6D11')+'"><option '+(pr.estado!=='Cerrado'?'selected':'')+'>Vigente</option><option '+(cerrado?'selected':'')+'>Cerrado</option></select>';
        }
        if(esAdmin()){
          if(archivado){
            controles += '<button class="btn" style="background:#fff;border:1px solid #C9E3B8;color:#3B6D11;padding:4px 10px;font-size:11.5px" onclick="restaurarPr(\''+pr.id+'\')">↩ Restaurar</button>';
            controles += '<button class="btn" style="background:#fff;border:1px solid #E4E0F0;color:#4A3F7A;padding:4px 10px;font-size:11.5px" onclick="recongelarSnapshot(\''+pr.id+'\')">↻ Re-congelar</button>';
          } else {
            controles += '<button class="btn" style="background:#fff;border:1px solid #E6E4DC;color:#6E6C66;padding:4px 10px;font-size:11.5px" onclick="archivarPr(\''+pr.id+'\')">📦 Archivar</button>';
          }
        }
        // replicar planificación: disponible en todas las vistas, para cualquier admin/coordinador
        controles += '<button class="btn" style="background:#fff;border:1px solid #CBD8EA;color:#185FA5;padding:4px 10px;font-size:11.5px" onclick="replicarPlanProy(\''+pr.id+'\')" title="Crear un proyecto nuevo copiando esta planificación">⧉ Replicar plan</button>';
        controles += '<button class="btn-del" onclick="eliminarPr(\''+pr.id+'\')">×</button>';

        h += '<div class="card" style="border:1.5px solid #D9D6CC;border-top:4px solid '+acento+';border-radius:14px;padding:18px;margin-bottom:22px;box-shadow:0 2px 10px rgba(44,44,42,0.07);background:#FFFEFB'+(dirty?';border-color:#E7C173':'')+(archivado?';opacity:.92':'')+'"><div class="card-head" style="border-bottom:1px solid #F1EFE8;padding-bottom:10px;margin-bottom:14px"><span style="font-size:15px;font-weight:700;color:'+acento+'">'+String(prVal(pr,'nombre')||'Proyecto '+(i+1)).replace(/</g,'&lt;').replace(/"/g,'&quot;')+chipEstado+' <span id="pr-dirty-'+pr.id+'" style="display:'+(dirty?'inline-block':'none')+';background:#FAEEDA;color:#BA7517;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;margin-left:6px">sin guardar</span></span><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">'+controles+'</div></div>'
        // toggle Cotización (solo si no está archivado y sos admin)
        + ((esAdmin() && !archivado) ? '<label style="display:inline-flex;align-items:center;gap:7px;font-size:12px;color:#4A3F7A;background:#FBFAFE;border:1px solid #E4E0F0;border-radius:9px;padding:6px 11px;margin-bottom:12px;cursor:pointer"><input type="checkbox" '+(cotizacion?'checked':'')+' onchange="toggleCotizacion(\''+pr.id+'\',this.checked)" style="width:auto;margin:0"> Es una cotización (presupuesto teórico, no consume recursos)</label>' : '')
        + '<div class="grid">'
        + li(pr.id,'nombre','Nombre',prVal(pr,'nombre')) + li(pr.id,'codigo','Código',prVal(pr,'codigo'))
        + '<label class="lbl" style="grid-column:1/-1">Descripción<input value="'+(prVal(pr,'descripcion')||'')+'" onchange="setDraftPr(\''+pr.id+'\',\'descripcion\',this.value)"></label>'
        + ln(pr.id,'cant_modulos','Cantidad de módulos',prVal(pr,'cant_modulos')) + li(pr.id,'tam_modulos','Tamaño de módulos',prVal(pr,'tam_modulos'))
        + ln(pr.id,'m2_totales','m² totales del proyecto',prVal(pr,'m2_totales'))
        // Fechas (solo informativas para el coordinador): inicio → montaje → entrega
        + ld(pr.id,'fecha_inicio','Fecha de inicio',prVal(pr,'fecha_inicio'))
        + ld(pr.id,'fecha_montaje','Fecha de montaje',prVal(pr,'fecha_montaje'))
        + ld(pr.id,'fecha_entrega','Fecha de entrega',prVal(pr,'fecha_entrega'))
        + '<div class="lbl" style="grid-column:1/-1;font-size:11px;color:#A8A69E;margin:-4px 0 2px">Las fechas son solo informativas para el coordinador de producción; no afectan la planificación ni los cálculos.</div>'
        // Presupuesto desdoblado
        + ln(pr.id,'presupuesto_mo_huella','Presupuesto MO La Huella',prVal(pr,'presupuesto_mo_huella'))
        + ln(pr.id,'presupuesto_mo_montaje','Presupuesto MO Montaje',prVal(pr,'presupuesto_mo_montaje'))
        + li(pr.id,'planos','Planos (link o ref.)',prVal(pr,'planos'))
        + editorModulos(pr) + '</div></div>';
      });
      if(proyVista!=='archivados') h += '<button class="btn-add" onclick="agregarPr()">+ Agregar proyecto</button>';
      // Barra de guardado SIEMPRE visible en la solapa Proyectos.
      const sucio = hayCambiosPr();
      h += '</div>'; // cierra proy-print (la barra de guardado queda fuera del export)
      h += '<div id="pr-savebar" class="no-print" style="display:flex;position:sticky;bottom:0;gap:10px;align-items:center;justify-content:flex-end;background:#FFFDF7;border:1px solid #F0E6CE;border-radius:12px;padding:12px 16px;margin-top:16px;box-shadow:0 -2px 12px rgba(0,0,0,0.06)">'

    // Cuenta cuántos días hábiles hay entre dos fechas ISO (con signo). 0 si es el mismo día.
    function offsetHabiles(desde, hasta){

      const arranques = bloques.map(b=>b.fecha_desde).filter(Boolean).sort();

      if(nombreNuevo===null) return;

      if(arranqueOrig){
        nuevaIni = prompt("Nueva fecha de inicio del plan (formato AAAA-MM-DD).\n\nTodo el plan se recorre manteniendo la duración en días hábiles.\nArranque original: "+dmy(arranqueOrig)+"\n\nDejá vacío para copiar con las MISMAS fechas del original.", "");
        if(nuevaIni===null) return;

      // función para recorrer una fecha del origen a la nueva base
      const recorrer = (f)=>{
        if(!f) return null;
        if(!nuevaIni || !arranqueOrig) return f; // sin recorrido: mismas fechas

      const nuevoId = creado.id;

          b += '<div style="padding:7px 0;border-bottom:1px solid #F1EFE8"><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="background:#E6F1FB;color:#185FA5;padding:1px 6px;border-radius:5px;font-size:10.5px;font-weight:600">'+trailerIfTipoId(t.trailer_id)+'</span><span style="font-size:12px;font-weight:600">'+descMant(t)+'</span><span style="background:'+e.bg+';color:'+e.color+';padding:1px 6px;border-radius:5px;font-size:10px">'+e.label+'</span></div><div style="font-size:11px;color:#888780;margin-top:2px">'+quien+'</div></div>';
        });
        return b;
      };
      h += '<div style="flex:1;min-width:300px;background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px 18px">';
      h += '<div style="font-size:14px;font-weight:700;margin-bottom:10px">🔧 Trabajo de mantenimiento</div>';
      h += bloqueDia("Hoy", hoy);
      h += '<div style="height:12px"></div>';
      h += bloqueDia("Mañana", manana);
      h += '</div>';

      // Columna derecha — alertas y control
      h += '<div style="flex:1;min-width:300px;display:flex;flex-direction:column;gap:14px">';

      // Trailers fuera de servicio
      h += '<div style="background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px 18px">';
      h += '<div style="font-size:14px;font-weight:700;margin-bottom:8px">🚧 Fuera de servicio <span style="font-weight:500;color:#A8A69E">('+fueraServicio.length+')</span></div>';
      if(!fueraServicio.length) h += '<div style="font-size:12px;color:#A8A69E">Ningún trailer en mantenimiento o rebuilding.</div>';
      else fueraServicio.forEach(t=>{ const e=TRAILER_ESTADOS[t.estado]||{color:'#55544F',bg:'#F1EFE8',label:t.estado}; h += '<div style="display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #F1EFE8;font-size:12.5px"><span style="font-weight:600">'+trailerIfTipo(t)+'</span><span style="background:'+e.bg+';color:'+e.color+';padding:1px 6px;border-radius:5px;font-size:10px;margin-left:auto">'+e.label+'</span></div>'; });
      h += '</div>';

      // Alertas de stock
      h += '<div style="background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px 18px">';
      h += '<div style="font-size:14px;font-weight:700;margin-bottom:8px">📦 Stock bajo mínimo <span style="font-weight:500;color:#A8A69E">('+bajos.length+')</span></div>';
      if(!bajos.length) h += '<div style="font-size:12px;color:#3B6D11">Todo el stock está por encima del mínimo.</div>';
      else bajos.slice(0,8).forEach(i=>{ h += '<div style="display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #F1EFE8;font-size:12.5px"><span>'+((i.descripcion||i.codigo||"(ítem)")).replace(/</g,"&lt;")+'</span><span style="margin-left:auto;color:#A32D2D;font-weight:600">'+fmtNum(i.cantidad)+' / mín '+fmtNum(i.minimo)+'</span></div>'; });
      if(bajos.length>8) h += '<div style="font-size:11px;color:#A8A69E;margin-top:6px">y '+(bajos.length-8)+' más…</div>';
      h += '</div>';

      // Indicadores de gestión
      h += '<div style="background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px 18px">';
      h += '<div style="font-size:14px;font-weight:700;margin-bottom:8px">📈 Control de gestión</div>';
      h += '<div style="display:flex;gap:8px;align-items:baseline;padding:4px 0;font-size:12.5px"><span style="font-size:19px;font-weight:800;color:'+(abiertosVencidos.length?'#A32D2D':'#3B6D11')+';min-width:30px">'+abiertosVencidos.length+'</span><span style="color:#5F5E5A">mantenimientos con fecha de fin vencida y sin finalizar</span></div>';
      h += '<div style="display:flex;gap:8px;align-items:baseline;padding:4px 0;font-size:12.5px"><span style="font-size:19px;font-weight:800;color:'+(sinMantReciente.length?'#854F0B':'#3B6D11')+';min-width:30px">'+sinMantReciente.length+'</span><span style="color:#5F5E5A">trailers sin parte de mantenimiento en los últimos 30 días</span></div>';
      h += '</div>';

      h += '</div>'; // fin columna derecha
      h += '</div>'; // fin dos columnas

      h += '</div>'; // cierra nqndash-print
      h += '<div class="row-actions no-print"><button class="btn btn-primary" onclick="cargar()">\u21bb Recargar</button></div>';
      contenido.innerHTML = h;
    }

    /* ---- TRAILERS (Base Neuquén) ---- */
    function setTrailerFiltro(k){ trailerEstadoFiltro = (trailerEstadoFiltro===k ? "" : k); renderTrailers(); }
    function renderTrailers() {
      // Resumen por estado — indicadores grandes y clickeables (filtran la tabla de abajo)
      const conteo = {}; TRAILER_EST_KEYS.forEach(k=> conteo[k]=0);
      trailers.forEach(t=>{ if(conteo[t.estado]!=null) conteo[t.estado]++; });
      const total = trailers.length;
      let resumen = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin:0 0 18px">';
      // Tarjeta "Total" (deselecciona el filtro)
      const totalSel = trailerEstadoFiltro==="";
      resumen += '<div onclick="setTrailerFiltro(\'\')" title="Ver todos" style="cursor:pointer;flex:1;min-width:130px;background:#fff;border:2px solid '+(totalSel?'#2C2C2A':'#E6E4DC')+';border-radius:14px;padding:14px 18px;transition:border-color .15s">'
        + '<div style="font-size:34px;font-weight:800;color:#2C2C2A;line-height:1">'+total+'</div>'
        + '<div style="font-size:13px;color:#5F5E5A;margin-top:4px">Parque total'+(totalSel?' <span style="color:#2C2C2A;font-weight:600">●</span>':'')+'</div></div>';
      TRAILER_EST_KEYS.forEach(k=>{ const e=TRAILER_ESTADOS[k]; const sel=trailerEstadoFiltro===k;
        const pct = total ? Math.round(conteo[k]*100/total) : 0;
        resumen += '<div onclick="setTrailerFiltro(\''+k+'\')" title="Filtrar: '+e.label+'" style="cursor:pointer;flex:1;min-width:130px;background:'+e.bg+';border:2px solid '+(sel?e.color:'transparent')+';border-radius:14px;padding:14px 18px;transition:border-color .15s">'
          + '<div style="font-size:34px;font-weight:800;color:'+e.color+';line-height:1">'+conteo[k]+'</div>'
          + '<div style="font-size:13px;color:'+e.color+';margin-top:4px">'+e.label+' <span style="opacity:.7;font-size:11px">('+pct+'%)</span>'+(sel?' <span style="font-weight:700">●</span>':'')+'</div></div>';
      });
      resumen += '</div>';
      if(trailerEstadoFiltro) resumen += '<div style="margin:0 0 10px"><button class="btn btn-sec btn-sm" onclick="setTrailerFiltro(\''+trailerEstadoFiltro+'\')">✕ Quitar filtro · ver todos</button></div>';

      const filtrados = trailerEstadoFiltro ? trailers.filter(t=>t.estado===trailerEstadoFiltro) : trailers;

      let h = '<div class="no-print" style="display:flex;justify-content:flex-end;margin-bottom:10px">'+botonesExport("trailers-print","trailers")+'</div>';
      h += '<div id="trailers-print">' + resumen + '<table><thead><tr><th>Código (contenedor)</th><th>IF</th><th>Tipo</th><th>Med</th><th>Mod</th><th>Estado</th><th>Ubicación</th><th>Cliente</th><th>Obs.</th><th></th></tr></thead><tbody>';
      if (!filtrados.length) h += '<tr><td colspan="10" style="color:#A8A69E;padding:14px">'+(trailerEstadoFiltro?'Sin trailers en este estado.':'Sin trailers cargados. Agregá el primero abajo.')+'</td></tr>';
      filtrados.forEach(t=>{
        const e = TRAILER_ESTADOS[t.estado] || { color:"#55544F" };
        const alquilado = (t.estado === "alquilado");
        const selEstado = '<select onchange="editarTr(\''+t.id+'\',\'estado\',this.value)" style="width:auto;color:'+e.color+';font-weight:600">'
          + TRAILER_EST_KEYS.map(k=>'<option value="'+k+'" '+(k===t.estado?'selected':'')+'>'+TRAILER_ESTADOS[k].label+'</option>').join('') + '</select>';
        const opac = alquilado ? '' : 'opacity:.55';
        const ro = (v,extra)=>'<span style="font-size:12.5px;color:#3A3A38;'+(extra||'')+'">'+((v==null||v==='')?'<span style="color:#C9C7BE">—</span>':String(v).replace(/</g,'&lt;'))+'</span>';
        h += '<tr>'
          + '<td style="width:130px">'+ro(t.codigo, "font-weight:600")+'</td>'
          + '<td style="width:100px">'+ro(t.if_codigo)+'</td>'
          + '<td style="width:120px">'+ro(t.tipo)+'</td>'
          + '<td style="width:50px;text-align:center">'+ro(t.medida)+'</td>'
          + '<td style="width:60px;text-align:center">'+ro(t.modelo)+'</td>'
          + '<td style="width:140px">'+selEstado+'</td>'
          + '<td style="'+opac+'"><input value="'+(t.ubicacion||'').replace(/"/g,'&quot;')+'" placeholder="'+(alquilado?'obra / lugar':'—')+'" onchange="editarTr(\''+t.id+'\',\'ubicacion\',this.value)"></td>'
          + '<td style="'+opac+'"><input value="'+(t.cliente||'').replace(/"/g,'&quot;')+'" placeholder="'+(alquilado?'cliente':'—')+'" onchange="editarTr(\''+t.id+'\',\'cliente\',this.value)"></td>'
          + '<td style="width:120px"><input value="'+(t.observaciones||'').replace(/"/g,'&quot;')+'" placeholder="—" onchange="editarTr(\''+t.id+'\',\'observaciones\',this.value)"></td>'
          + '<td style="width:30px"><button class="btn-del" onclick="eliminarTr(\''+t.id+'\')">×</button></td>'
          + '</tr>';
      });
      h += '</tbody></table></div><div class="row-actions no-print"><button class="btn-add" onclick="agregarTr()">+ Agregar trailer</button><button class="btn btn-primary" onclick="cargar()">\u21bb Recargar</button></div>';
      contenido.innerHTML = h;
    }
    async function agregarTr(){ const{error}=await sb.from("trailers").insert({ sede:"neuquen", estado:"disponible", codigo:"", alias:"" }); if(error)return setEstado("Error: "+error.message,"err"); registrarLog("crear","trailer","Nuevo trailer (sin código aún)"); cargar(); }
    async function editarTr(id,c,v){ const u={}; u[c]=v; const{error}=await sb.from("trailers").update(u).eq("id",id); if(error)return setEstado("Error: "+error.message,"err");
      const t=trailers.find(x=>x.id===id); if(t){ t[c]=v; if(c==="estado") renderTrailers(); } registrarLog("editar","trailer",(t?(t.codigo||"(sin código)"):"")+" · "+c+" = "+v); setEstado("\u2713 Guardado.","ok"); }
    async function eliminarTr(id){ const t=trailers.find(x=>x.id===id); if(!confirm("¿Eliminar este trailer del padrón?")) return; const{error}=await sb.from("trailers").delete().eq("id",id); if(error)return setEstado("Error: "+error.message,"err"); registrarLog("eliminar","trailer",(t?(t.codigo||"(sin código)"):"")); cargar(); }

    /* ---- MANTENIMIENTO (Base Neuquén) ---- */
    function nombreTrailer(id){ const t=trailers.find(x=>x.id===id); if(!t) return "(sin trailer)"; const extra = t.alias || [t.tipo,t.medida].filter(Boolean).join(" "); return (t.codigo||"(sin código)")+(extra?(" · "+extra):""); }
    // Etiqueta corta de un trailer por IF + Tipo (sin el código de contenedor). Usada en Gantt, Histograma, Parte, filtros.
    function trailerIfTipo(t){ if(!t) return "(sin trailer)"; const iff = t.if_codigo || "(sin IF)"; const tipo = (t.tipo||"").trim(); return tipo ? (iff+" · "+tipo) : iff; }
    function trailerIfTipoId(id){ return trailerIfTipo(trailers.find(x=>x.id===id)); }
    function renderMantenimiento() {
      let h = '<p style="font-size:13px;color:#888780;margin-top:0">Tareas de mantenimiento sobre los trailers. Cada tarea tiene un trailer, una descripción (de la lista típica o libre), fechas, estado y una o varias personas asignadas.</p>';

      if (!trailers.length) {
        h += '<div class="estado err">No hay trailers cargados. Agregá trailers en la pestaña Trailers antes de planificar mantenimiento.</div>';
        contenido.innerHTML = h; return;
      }

      // Catálogo editable de tareas típicas (colapsable arriba), agrupado por tarea (categoría).
      const tareasCat = tareasDeMant(); // { tarea: [ {id, subtarea} ] }
      const catKeys = Object.keys(tareasCat).sort((a,b)=>a.localeCompare(b,"es"));
      h += '<details style="margin-bottom:14px;border:1px solid #E6E4DC;border-radius:10px;padding:10px 14px;background:#FAFAF8">'
        + '<summary style="cursor:pointer;font-size:13px;font-weight:600;color:#2C2C2A">Catálogo de tareas ('+mantTipicas.length+' subtareas en '+catKeys.length+' categorías) — editar</summary>'
        + '<div style="margin-top:10px"><div style="font-size:12px;color:#888780;margin-bottom:8px">Cada tarea (categoría) agrupa sus subtareas. Al cargar una tarea de mantenimiento vas a elegir primero la categoría y después la subtarea.</div>';
      catKeys.forEach(cat=>{
        h += '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#2C2C2A;margin-bottom:4px">'+cat.replace(/</g,"&lt;")+'</div><div class="chips">';
        tareasCat[cat].forEach(s=>{ h += '<span style="display:inline-flex;align-items:center;gap:2px;border:1px solid #E6E4DC;border-radius:16px;padding:2px 4px 2px 10px;background:#fff"><span style="font-size:12px">'+(s.subtarea||"(sin subtarea)").replace(/</g,"&lt;")+'</span><button class="btn-del" style="width:18px;height:18px;line-height:1" onclick="eliminarTipica(\''+s.id+'\')">×</button></span>'; });
        h += '</div></div>';
      });
      h += '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><input id="nuevaTareaCat" placeholder="Categoría (ej: PINTURA)" style="width:180px"><input id="nuevaSubtarea" placeholder="Subtarea (ej: PI. PINTURA INTERIOR)" style="flex:1;min-width:200px" onkeydown="if(event.key===\'Enter\')agregarTipica()"><button class="btn-add" onclick="agregarTipica()">+ Agregar</button></div></div></details>';

      // ---- Filtros: por trailer y "desde tal fecha" (achica la ventana) ----
      const hoyF = fechaStr(new Date());
      if (mantDesdeFiltro === "") mantDesdeFiltro = hoyF;
      h += '<div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;background:#FAFAF8;border:1px solid #EEECE4;border-radius:10px;padding:8px 12px">';
      // ---- Selector de LENTE (agrupación): trailer / tarea ----
      h += '<span style="font-size:12px;color:#888780">Ver por:</span>';
      h += '<span style="display:inline-flex;background:#F1F0EC;border-radius:9px;padding:3px;gap:2px">'
        + [['trailer','Trailer'],['tarea','Tarea'],['semana','Semana']].map(([k,lab])=>{
            const on = mantLente===k;
            return '<button class="btn" onclick="mantLente=\''+k+'\';renderMantenimiento()" style="border:0;background:'+(on?'#fff':'transparent')+';color:'+(on?'#2C2C2A':'#888780')+';font-size:12px;font-weight:550;padding:5px 12px;border-radius:7px;'+(on?'box-shadow:0 1px 3px rgba(0,0,0,.09)':'')+'">'+lab+'</button>';
          }).join('')
        + '</span>';
      h += '<span style="width:1px;height:22px;background:#E6E4DC;margin:0 2px"></span>';
      h += '<label style="font-size:12px;color:#888780">Trailer <select onchange="mantTrailerFiltro=this.value;renderMantenimiento()" style="width:auto"><option value="">Todos</option>'
        + trailers.map(tr=>'<option value="'+tr.id+'" '+(tr.id===mantTrailerFiltro?'selected':'')+'>'+trailerIfTipo(tr).replace(/"/g,'&quot;')+'</option>').join('') + '</select></label>';
      h += '<label style="font-size:12px;color:#888780">Desde <input type="date" value="'+mantDesdeFiltro+'" onchange="mantDesdeFiltro=this.value;renderMantenimiento()" style="width:auto"></label>';
      h += '<button class="btn btn-sec btn-sm" onclick="mantTrailerFiltro=\'\';mantDesdeFiltro=\'\';renderMantenimiento()">Limpiar filtros</button>';
      h += '</div>';

      // Aplicar filtros: por trailer y por fecha ("desde" oculta tareas que terminan antes de esa fecha).
      let mantVisibles = mantTareas.slice();
      if (mantTrailerFiltro) mantVisibles = mantVisibles.filter(t=> t.trailer_id===mantTrailerFiltro);
      if (mantDesdeFiltro) mantVisibles = mantVisibles.filter(t=> !t.fecha_hasta || t.fecha_hasta >= mantDesdeFiltro);
      const ocultasMant = mantTareas.length - mantVisibles.length;
      if (ocultasMant > 0) h += '<p style="font-size:11.5px;color:#A8A69E;margin:0 0 10px">'+ocultasMant+' tarea(s) ocultas por los filtros.</p>';
      h += '<div class="no-print" style="display:flex;justify-content:flex-end;margin-bottom:10px">'+botonesExport("nqnmant-print","mantenimiento")+'</div>';
      h += '<div id="nqnmant-print">';

      // ---- Controles de expandir/colapsar todo (no en vista grilla) ----
      if (mantVisibles.length && mantLente!=='semana') {
        h += '<div class="no-print" style="display:flex;gap:8px;align-items:center;margin-bottom:10px">'
          + '<button class="btn btn-sec btn-sm" onclick="mantExpandTodo()">Expandir todo</button>'
          + '<button class="btn btn-sec btn-sm" onclick="mantAbiertos.clear();renderMantenimiento()">Colapsar todo</button>'
          + '<span style="font-size:11.5px;color:#A8A69E">Tocá una fila para expandirla y editarla.</span>'
          + '</div>';
      }

      // Cuerpo expandido de una tarea: idéntico a la vista anterior (mismos onchange/onclick).
      function cuerpoMt(t){
        const gente = mantPers[t.id] || [];
        const selTrailer = '<select onchange="editarMt(\''+t.id+'\',\'trailer_id\',this.value)" style="min-width:180px">'
          + '<option value="">(elegir trailer)</option>'
          + trailers.map(tr=>'<option value="'+tr.id+'" '+(tr.id===t.trailer_id?'selected':'')+'>'+trailerIfTipo(tr).replace(/"/g,'&quot;')+'</option>').join('') + '</select>';
        const trSel = trailers.find(x=>x.id===t.trailer_id);
        const infoTrailer = trSel
          ? '<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:#5F5E5A;background:#F4F7FB;border-radius:8px;padding:6px 10px;margin:6px 0"><span><b>IF:</b> '+(trSel.if_codigo||'—')+'</span><span><b>Tipo:</b> '+(trSel.tipo||'—')+'</span><span><b>Medida:</b> '+(trSel.medida||'—')+'</span></div>'
          : '';
        const tareasCatT = tareasDeMant();
        const catsT = Object.keys(tareasCatT).sort((a,b)=>a.localeCompare(b,"es"));
        const selTarea = '<select onchange="editarMt(\''+t.id+'\',\'tarea\',this.value)" style="min-width:170px">'
          + '<option value="">(elegir tarea)</option>'
          + catsT.map(c=>'<option value="'+c.replace(/"/g,'&quot;')+'" '+(c===t.tarea?'selected':'')+'>'+c+'</option>').join('') + '</select>';
        const subsElegidas = (t.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);
        const subsDeCat = (t.tarea && tareasCatT[t.tarea]) ? tareasCatT[t.tarea] : [];
        let subChips;
        if(!t.tarea){ subChips = '<span style="font-size:11.5px;color:#A8A69E">Elegí primero la tarea para ver sus subtareas.</span>'; }
        else if(!subsDeCat.length){ subChips = '<span style="font-size:11.5px;color:#A8A69E">Esta tarea no tiene subtareas en el catálogo.</span>'; }
        else {
          subChips = '<div class="chips">'+subsDeCat.map(s=>{ const on=subsElegidas.includes(s.subtarea); return '<button class="chip'+(on?' on':'')+'" onclick="toggleMtSubtarea(\''+t.id+'\',\''+(s.subtarea||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\')">'+(s.subtarea||'').replace(/</g,'&lt;')+'</button>'; }).join('')+'</div>';
        }
        const inputHoras = '<div class="pl-row" style="margin-top:6px;align-items:center"><span style="font-size:12px;color:#5F5E5A">Horas de la tarea:</span><input type="number" min="0" value="'+(t.horas!=null?t.horas:'')+'" placeholder="ej. 8" onchange="editarMt(\''+t.id+'\',\'horas\',this.value)" style="width:90px"></div>';
        const notaLibre = (!t.tarea && t.descripcion)
          ? '<div style="margin-top:6px"><input value="'+(t.descripcion||'').replace(/"/g,'&quot;')+'" placeholder="Descripción libre (registro anterior)" onchange="editarMt(\''+t.id+'\',\'descripcion\',this.value)" style="width:100%"></div>'
          : '';
        return '<div style="padding:14px;border-top:1px solid #EEECE4">'
          + '<div class="pl-row" style="align-items:center"><span style="font-size:11px;color:#A8A69E;margin-right:4px">Trailer:</span>'+selTrailer+'</div>'
          + infoTrailer
          + '<div class="pl-row" style="margin:8px 0;flex-wrap:wrap"><span style="font-size:11px;color:#A8A69E;margin-right:4px">Tarea:</span>'+selTarea+'</div>'
          + '<div style="font-size:11px;color:#A8A69E;margin:2px 0 4px">Subtareas (tildá una o varias):</div>'
          + subChips
          + inputHoras
          + notaLibre
          + '<div class="pl-row" style="margin-top:8px"><input type="date" value="'+(t.fecha_desde||'')+'" onchange="editarMt(\''+t.id+'\',\'fecha_desde\',this.value)" style="width:auto"><span style="color:#A8A69E;font-size:12px">a</span><input type="date" value="'+(t.fecha_hasta||'')+'" onchange="editarMt(\''+t.id+'\',\'fecha_hasta\',this.value)" style="width:auto"><span style="color:#A8A69E;font-size:12px">'+diasHabiles(t.fecha_desde,t.fecha_hasta).length+' días háb.</span></div>'
          + '<div style="font-size:11px;color:#A8A69E;margin:6px 0 4px">Personas asignadas (tildá una o varias):</div>'
          + '<div class="chips">'+personasDe("neuquen").map(p=>{ const on=gente.includes(p.id); return '<button class="chip'+(on?' on':'')+'" onclick="toggleMtPersona(\''+t.id+'\',\''+p.id+'\','+(on?'true':'false')+')">'+p.nombre+'</button>'; }).join('')+'</div>'
          + '</div>';
      }
      // Fila colapsable de una tarea. showTrailer/showTarea según la lente.
      function filaMt(t, showTrailer, showTarea){
        const gente = mantPers[t.id] || [];
        const abierto = mantAbiertos.has(t.id);
        const trSel = trailers.find(x=>x.id===t.trailer_id);
        const trNombre = trSel ? trailerIfTipo(trSel) : '<span style="color:#C99">sin trailer</span>';
        const subsElegidas = (t.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);
        const tareaTxt = t.tarea ? (t.tarea + (subsElegidas.length?(' · '+subsElegidas.join(', ')):'')) : (t.descripcion || '<span style="color:#A8A69E">sin tarea</span>');
        const dias = diasHabiles(t.fecha_desde,t.fecha_hasta);
        const fechaTxt = (t.fecha_desde&&t.fecha_hasta) ? dm(t.fecha_desde)+'–'+dm(t.fecha_hasta)+' · '+dias.length+' d.háb.' : '<span style="color:#C99">sin fechas</span>';
        const ava = gente.slice(0,5).map(pid=>{ const p=personas.find(x=>x.id===pid); const ini=p?p.nombre.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase():'?'; return '<span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:#DCD9CF;color:#5F5E5A;font-size:9.5px;font-weight:650;align-items:center;justify-content:center;border:2px solid #fff;margin-left:-6px">'+ini+'</span>'; }).join('');
        const avaWrap = gente.length ? '<span style="display:inline-flex;margin-left:6px">'+ava+'</span><span style="font-size:11.5px;color:#A8A69E;margin-left:8px">'+gente.length+' pers.</span>' : '<span style="font-size:11.5px;color:#C4C2BA;margin-left:6px">sin gente</span>';
        // color de estado del trabajo (pendiente / en curso / hecho), fallback gris
        const estColor = t.estado==='hecho' ? '#3B6D11' : t.estado==='en_curso' ? '#B5651D' : '#8A8780';
        let head = '<div class="pl-row" style="margin:0;padding:11px 13px;cursor:pointer;align-items:center" onclick="mantToggle(\''+t.id+'\')">';
        head += '<span style="color:#A8A69E;font-size:11px;transition:.15s;display:inline-block;'+(abierto?'transform:rotate(90deg)':'')+'">▶</span>';
        if(showTrailer) head += '<span class="estpill" style="background:#3E6DA0;color:#fff;min-width:150px;display:inline-block;text-align:center;font-weight:600;font-size:11.5px">'+trNombre+'</span>';
        if(showTarea) head += '<span style="font-weight:600;color:#2C2C2A;font-size:12.5px">'+tareaTxt+'</span>';
        if(showTrailer && !showTarea) head += '<span style="font-size:12.5px;color:#888780">'+tareaTxt+'</span>';
        head += '<span style="font-size:12px;color:#A8A69E;margin-left:8px">'+fechaTxt+'</span>';
        if(t.estado) head += '<span style="background:'+estColor+'22;color:'+estColor+';font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;margin-left:6px">'+t.estado.replace('_',' ')+'</span>';
        head += '<span style="margin-left:auto;display:flex;align-items:center">'+avaWrap
          + '<button class="btn-del" style="margin-left:10px" onclick="event.stopPropagation();eliminarMt(\''+t.id+'\')">×</button></span>';
        head += '</div>';
        return '<div class="card" style="border:1px solid #E6E4DC;border-left:5px solid #3E6DA0;border-radius:11px;margin-bottom:7px;padding:0;overflow:hidden">'
          + head + (abierto ? cuerpoMt(t) : '') + '</div>';
      }

      if (!mantVisibles.length) {
        h += '<p style="color:#A8A69E;font-size:13px">'+(mantTareas.length?'Ninguna tarea coincide con los filtros.':'Sin tareas de mantenimiento. Agregá la primera abajo.')+'</p>';
      } else if (mantLente==='semana') {
        // ---- VISTA PANORÁMICA: grilla día × trailer ----
        h += '<p style="font-size:11.5px;color:#A8A69E;margin:0 0 10px">Tocá un bloque para abrirlo y editarlo.</p>';
        // Rango de días: unión de los rangos visibles, acotado a 42 días.
        let fMin=null, fMax=null;
        mantVisibles.forEach(t=>{ if(t.fecha_desde){ if(!fMin||t.fecha_desde<fMin)fMin=t.fecha_desde; } if(t.fecha_hasta){ if(!fMax||t.fecha_hasta>fMax)fMax=t.fecha_hasta; } });
        if(!fMin) fMin = fechaStr(new Date());
        if(!fMax){ const d=new Date(fMin+'T12:00:00'); d.setDate(d.getDate()+13); fMax=fechaStr(d); }
        const dIni=new Date(fMin+'T12:00:00'), dFin=new Date(fMax+'T12:00:00');
        const dias=[]; let cur=new Date(dIni);
        while(cur<=dFin && dias.length<42){ dias.push(fechaStr(cur)); cur.setDate(cur.getDate()+1); }
        const tareasEnDia = (fecha, trId) => mantVisibles.filter(t => t.trailer_id===trId && diasHabiles(t.fecha_desde,t.fecha_hasta).includes(fecha));
        // filas = trailers con tareas visibles
        const filasTr = trailers.filter(tr=>mantVisibles.some(t=>t.trailer_id===tr.id));
        const haySinTrailer = mantVisibles.some(t=>!t.trailer_id);

        if(!filasTr.length && !haySinTrailer){
          h += '<p style="font-size:13px;color:#A8A69E;padding:8px 2px">No hay tareas con fechas para mostrar en la grilla.</p>';
        } else {
          h += '<div style="overflow:auto;border:1px solid #E6E4DC;border-radius:12px;background:#fff">';
          h += '<table style="border-collapse:collapse;width:100%;font-size:11.5px;min-width:'+(150+dias.length*66)+'px">';
          h += '<thead><tr><th style="position:sticky;left:0;background:#F6F5F1;border:1px solid #EEECE4;padding:8px 10px;text-align:left;min-width:150px;z-index:2">Trailer</th>';
          dias.forEach(f=>{
            const wd=new Date(f+'T12:00:00').getDay(); const finde=(wd===0||wd===6); const fer=esFeriado(f);
            h += '<th style="border:1px solid #EEECE4;padding:6px 4px;background:'+(fer?'#FBF0F0':finde?'#F1F0EC':'#F6F5F1')+';color:'+(fer?'#A32D2D':finde?'#C4C2BA':'#888780')+';font-weight:600;min-width:62px">'+['D','L','M','M','J','V','S'][wd]+'<br>'+f.slice(8,10)+'</th>';
          });
          h += '</tr></thead><tbody>';
          const pintarFila = (label, trId) => {
            let row = '<tr><td style="position:sticky;left:0;background:#FAFAF8;border:1px solid #EEECE4;padding:7px 10px;font-weight:600;white-space:nowrap;z-index:1"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#3E6DA0;margin-right:6px;vertical-align:0"></span>'+label+'</td>';
            dias.forEach(f=>{
              const wd=new Date(f+'T12:00:00').getDay(); const finde=(wd===0||wd===6);
              const aqui = tareasEnDia(f, trId);
              let cell='';
              aqui.forEach(t=>{
                const estColor = t.estado==='hecho' ? '#3B6D11' : t.estado==='en_curso' ? '#B5651D' : '#3E6DA0';
                const etiqueta = t.tarea || t.descripcion || 'tarea';
                cell += '<div onclick="mantAbrirDesdeGrilla(\''+t.id+'\')" title="'+etiqueta.replace(/"/g,'&quot;')+' — tocá para editar" '
                  + 'style="background:'+estColor+';color:#fff;border-radius:5px;padding:3px 6px;margin:2px 0;font-size:10px;font-weight:600;cursor:pointer;line-height:1.25">'
                  + etiqueta.replace(/</g,'&lt;') + '</div>';
              });
              row += '<td style="border:1px solid #EEECE4;padding:3px;vertical-align:top;background:'+(finde?'#FBFAF8':'#fff')+';min-width:62px">'+(cell||'<span style="color:#E0DED6;font-size:13px;display:block;text-align:center">·</span>')+'</td>';
            });
            return row + '</tr>';
          };
          filasTr.forEach(tr=>{ h += pintarFila(trailerIfTipo(tr).replace(/</g,'&lt;'), tr.id); });
          if(haySinTrailer) h += pintarFila('<span style="color:#A32D2D">Sin trailer</span>', null);
          h += '</tbody></table></div>';
          h += '<p style="font-size:11px;color:#A8A69E;margin-top:8px">Cada celda es un día. Color del bloque según estado (azul pendiente, ámbar en curso, verde hecho). Fines de semana y feriados sombreados. Tocá un bloque para abrirlo en la lista y editarlo.</p>';
        }
      } else if (mantLente==='trailer') {
        // Agrupar por trailer (según orden del parque), tareas sin trailer al final.
        const conTrailer = trailers.filter(tr=>mantVisibles.some(t=>t.trailer_id===tr.id));
        conTrailer.forEach(tr=>{
          const grp = mantVisibles.filter(t=>t.trailer_id===tr.id).sort((a,b)=>(a.fecha_desde||'9999')<(b.fecha_desde||'9999')?-1:1);
          if(!grp.length) return;
          h += '<div style="font-size:11px;color:#A8A69E;text-transform:uppercase;letter-spacing:.05em;font-weight:650;margin:14px 2px 5px">'+trailerIfTipo(tr).replace(/</g,'&lt;')+' <span style="color:#C4C2BA;font-weight:500">· '+grp.length+'</span></div>';
          grp.forEach(t=>{ h += filaMt(t, false, true); });
        });
        const sinTrailer = mantVisibles.filter(t=>!t.trailer_id);
        if(sinTrailer.length){ h += '<div style="font-size:11px;color:#A32D2D;text-transform:uppercase;letter-spacing:.05em;font-weight:650;margin:14px 2px 5px">Sin trailer</div>'; sinTrailer.forEach(t=>{ h += filaMt(t, false, true); }); }
      } else { // tarea (categoría)
        const cats = [...new Set(mantVisibles.map(t=>t.tarea).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"es"));
        cats.forEach(cat=>{
          const grp = mantVisibles.filter(t=>t.tarea===cat).sort((a,b)=>(a.fecha_desde||'9999')<(b.fecha_desde||'9999')?-1:1);
          if(!grp.length) return;
          h += '<div style="font-size:11px;color:#A8A69E;text-transform:uppercase;letter-spacing:.05em;font-weight:650;margin:14px 2px 5px">'+cat.replace(/</g,'&lt;')+' <span style="color:#C4C2BA;font-weight:500">· '+grp.length+'</span></div>';
          grp.forEach(t=>{ h += filaMt(t, true, false); });
        });
        const sinTarea = mantVisibles.filter(t=>!t.tarea);
        if(sinTarea.length){ h += '<div style="font-size:11px;color:#A8A69E;text-transform:uppercase;letter-spacing:.05em;font-weight:650;margin:14px 2px 5px">Sin tarea</div>'; sinTarea.forEach(t=>{ h += filaMt(t, true, false); }); }
      }
      // expone la lista visible para "Expandir todo"
      window.__mantVisiblesIds = mantVisibles.map(t=>t.id);
      h += '</div>'; // cierra nqnmant-print
      h += '<div class="row-actions no-print"><button class="btn-add" onclick="agregarMt()">+ Agregar tarea</button><button class="btn btn-ok" onclick="generarDetalleNqn()">Generar detalle diario →</button><button class="btn btn-primary" onclick="cargar()">\u21bb Recargar</button></div>';
      contenido.innerHTML = h;
    }
    // Expandir / colapsar una fila de tarea de mantenimiento.
    function mantToggle(id){
      if(mantAbiertos.has(id)) mantAbiertos.delete(id); else mantAbiertos.add(id);
      renderMantenimiento();
    }
    // Expandir todas las tareas visibles.
    function mantExpandTodo(){
      (window.__mantVisiblesIds||[]).forEach(id=>mantAbiertos.add(id));
      renderMantenimiento();
    }
    // Desde la grilla semanal: abrir una tarea y llevar a la lista para editarla.
    function mantAbrirDesdeGrilla(id){
      mantAbiertos.add(id);
      mantLente = "trailer"; // volver a la lista, donde la tarea aparece expandida
      renderMantenimiento();
    }
    // Texto legible de una tarea de mantenimiento: "TAREA · Subtarea", con fallback a descripción libre.
    function descMant(t){
      if(t.tarea || t.subtarea){ return [t.tarea, t.subtarea].filter(Boolean).join(" · "); }
      return t.descripcion || "(sin tarea)";
    }
    // Agrupa las tareas típicas por categoría: { "PINTURA": [ {id, subtarea}, ... ], ... }
    function tareasDeMant(){
      const out={};
      mantTipicas.forEach(t=>{
        const cat = t.tarea || t.nombre || "(sin categoría)";
        (out[cat] = out[cat] || []).push({ id:t.id, subtarea: (t.subtarea!=null && t.subtarea!=="") ? t.subtarea : (t.tarea?"":t.nombre) });
      });
      Object.keys(out).forEach(k=> out[k].sort((a,b)=>(a.subtarea||"").localeCompare(b.subtarea||"","es")));
      return out;
    }
    // Catálogo de tareas típicas (ahora con categoría + subtarea)
    async function agregarTipica(){
      const catEl=document.getElementById("nuevaTareaCat"); const subEl=document.getElementById("nuevaSubtarea");
      const cat=(catEl&&catEl.value||"").trim(); const sub=(subEl&&subEl.value||"").trim();
      if(!cat){ setEstado("Escribí al menos la categoría (tarea).","err"); return; }
      const{error}=await sb.from("mant_tareas_tipicas").insert({ sede:"neuquen", tarea:cat, subtarea:sub, nombre:(sub||cat) });
      if(error)return setEstado("Error: "+error.message,"err");
      registrarLog("crear","tarea_tipica", cat+(sub?(" · "+sub):"")); cargar();
    }
    async function eliminarTipica(id){ const t=mantTipicas.find(x=>x.id===id); const{error}=await sb.from("mant_tareas_tipicas").delete().eq("id",id); if(error)return setEstado("Error: "+error.message,"err"); registrarLog("eliminar","tarea_tipica",(t?((t.tarea||"")+(t.subtarea?(" · "+t.subtarea):"")||t.nombre):"")); cargar(); }
    // Tareas de mantenimiento
    async function agregarMt(){ const{error}=await sb.from("mant_tareas").insert({ sede:"neuquen", estado:"pendiente", trailer_id: (trailers[0]?trailers[0].id:null) }); if(error)return setEstado("Error: "+error.message,"err"); registrarLog("crear","mantenimiento","Nueva tarea de mantenimiento"); cargar(); }
    async function editarMt(id,c,v){ const u={};
      if(c==="horas"){ u.horas = (v===""? null : Number(v)); if(u.horas!==null && isNaN(u.horas)) return setEstado("Horas inválidas.","err"); }
      else { u[c]=(v===""?null:v); }
      // Si cambia la categoría (tarea), limpiar las subtareas previas (cambian con la categoría).
      if(c==="tarea") u.subtarea=null;
      const{error}=await sb.from("mant_tareas").update(u).eq("id",id); if(error)return setEstado("Error: "+error.message,"err");
      const t=mantTareas.find(x=>x.id===id); if(t){ Object.assign(t,u); if(c==="estado"||c==="fecha_desde"||c==="fecha_hasta"||c==="trailer_id"||c==="tarea") renderMantenimiento(); }
      registrarLog("editar","mantenimiento",(t?(nombreTrailer(t.trailer_id)):"")+" · "+c+" = "+(v||"—")); setEstado("\u2713 Guardado.","ok"); }
    // Agrega o quita una subtarea del texto separado por coma (multi-selección).
    async function toggleMtSubtarea(id, sub){
      const t=mantTareas.find(x=>x.id===id); if(!t) return;
      const actuales = (t.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);
      const idx = actuales.indexOf(sub);
      if(idx>=0) actuales.splice(idx,1); else actuales.push(sub);
      const nuevo = actuales.join(", ");
      const{error}=await sb.from("mant_tareas").update({ subtarea: nuevo||null }).eq("id",id); if(error)return setEstado("Error: "+error.message,"err");
      t.subtarea = nuevo||null; renderMantenimiento();
      registrarLog("editar","mantenimiento",nombreTrailer(t.trailer_id)+" · subtareas = "+(nuevo||"—")); setEstado("\u2713 Guardado.","ok");
    }
    async function eliminarMt(id){ const t=mantTareas.find(x=>x.id===id); if(!confirm("¿Eliminar esta tarea de mantenimiento?")) return; const{error}=await sb.from("mant_tareas").delete().eq("id",id); if(error)return setEstado("Error: "+error.message,"err"); registrarLog("eliminar","mantenimiento",(t?(nombreTrailer(t.trailer_id)+" · "+(t.tarea||t.descripcion||"")):"")); cargar(); }
    async function toggleMtPersona(tareaId, personaId, estaba){
      if (estaba) { const{error}=await sb.from("mant_tareas_personal").delete().eq("tarea_id",tareaId).eq("persona_id",personaId); if(error)return setEstado("Error: "+error.message,"err"); mantPers[tareaId]=(mantPers[tareaId]||[]).filter(x=>x!==personaId); }
      else { const{error}=await sb.from("mant_tareas_personal").insert({ tarea_id:tareaId, persona_id:personaId }); if(error)return setEstado("Error: "+error.message,"err"); if(!mantPers[tareaId])mantPers[tareaId]=[]; mantPers[tareaId].push(personaId); }
      setEstado("\u2713 Guardado.","ok"); renderMantenimiento();
    }

    /* ---- PARTE DIARIO (Base Neuquén) ---- */
    function tareasActivasEn(fecha){
      // tareas cuyo rango incluye 'fecha' (días hábiles). Si no tiene fechas, no aparece.
      return mantTareas.filter(t=> diasHabiles(t.fecha_desde,t.fecha_hasta).includes(fecha));
    }
    function fechasConActividad(){
      const set = new Set();
      mantTareas.forEach(t=> diasHabiles(t.fecha_desde,t.fecha_hasta).forEach(d=> set.add(d)));
      return [...set].sort();
    }
    function renderNqnParte(){
      const fechas = fechasConActividad();
      const hoy = fechaStr(new Date());
      const fSel = nqnParteFecha || (fechas.includes(hoy)?hoy:(fechas[fechas.length-1]||hoy));
      const activas = tareasActivasEn(fSel);

      // Texto para WhatsApp
      const lineas = activas.map(t=>{
        const e = MANT_ESTADOS[t.estado]||MANT_ESTADOS.pendiente;
        const quien = (mantPers[t.id]||[]).map(nombrePersona).join(", ") || "sin asignar";
        const av = (mantParte[t.id+"|"+fSel]||"").trim();
        return "• "+trailerIfTipoId(t.trailer_id)+" → "+descMant(t)+" ["+e.label+"]\n   "+quien+(av?("\n   Avance: "+av):"");
      });
      const texto = "*Parte diario · Base Neuquén*\n"+dmy(fSel)+"\n\n"+(lineas.length?lineas.join("\n"):"Sin tareas activas este día.");

      let h = '<div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px">';
      h += '<label style="font-size:11.5px;color:#888780">Fecha<br><input type="date" value="'+fSel+'" onchange="setNqnParte(this.value)" style="margin-top:3px"></label>';
      h += '<button class="btn btn-wsp" onclick="copiarNqnParte()">Copiar para WhatsApp</button>';
      h += botonesExport("nqnParteBox","parte_neuquen");
      h += '</div>';

      h += '<div id="nqnParteBox" style="border:1px solid #E6E4DC;border-radius:12px;padding:18px 20px;max-width:560px">';
      h += '<div style="font-size:16px;font-weight:600">Parte diario · Base Neuquén</div>';
      h += '<div style="font-size:12.5px;color:#888780;margin-bottom:8px">'+dmy(fSel)+' · '+activas.length+' tarea(s) activa(s)</div>';
      h += '<div style="border-top:1px solid #F1EFE8;padding-top:6px">';
      if(!activas.length){
        h += '<div style="font-size:13px;color:#A8A69E;padding:8px 0">Sin tareas de mantenimiento activas este día. Cargá tareas con fechas en la pestaña Mantenimiento.</div>';
      }
      activas.forEach(t=>{
        const e = MANT_ESTADOS[t.estado]||MANT_ESTADOS.pendiente;
        const quien = (mantPers[t.id]||[]).map(nombrePersona).join(", ") || '<span style="color:#A8A69E">sin asignar</span>';
        const av = mantParte[t.id+"|"+fSel]||"";
        h += '<div style="padding:10px 0;border-bottom:1px solid #F1EFE8">'
          + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="background:#E6F1FB;color:#185FA5;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600">'+trailerIfTipoId(t.trailer_id)+'</span>'
          + '<span style="font-size:13px;font-weight:600">'+descMant(t)+'</span>'
          + '<span style="background:'+e.bg+';color:'+e.color+';padding:2px 7px;border-radius:6px;font-size:10.5px">'+e.label+'</span></div>'
          + '<div style="font-size:12px;color:#888780;margin:4px 0 6px">'+quien+'</div>'
          + '<input class="no-print" value="'+av.replace(/"/g,'&quot;')+'" placeholder="Avance / observación del día…" onchange="guardarAvance(\''+t.id+'\',\''+fSel+'\',this.value)" style="width:100%;font-size:12.5px">'
          + (av?'<div class="solo-print" style="font-size:12px;color:#2C2C2A;margin-top:2px">Avance: '+av.replace(/</g,"&lt;")+'</div>':'')
          + '</div>';
      });
      h += '</div></div>';
      h += '<textarea id="nqnParteTexto" style="position:absolute;left:-9999px">'+texto+'</textarea>';
      contenido.innerHTML = h;
    }
    function setNqnParte(val){ nqnParteFecha = val; renderNqnParte(); }
    async function guardarAvance(tareaId, fecha, val){
      const v = (val||"").trim();
      const key = tareaId+"|"+fecha;
      if (v === ""){
        const { error } = await sb.from("mant_parte").delete().eq("tarea_id",tareaId).eq("fecha",fecha);
        if (error) return setEstado("Error: "+error.message,"err");
        delete mantParte[key];
      } else {
        // upsert por (tarea_id, fecha)
        const { error } = await sb.from("mant_parte").upsert({ sede:"neuquen", tarea_id:tareaId, fecha:fecha, avance:v }, { onConflict:"tarea_id,fecha" });
        if (error) return setEstado("Error: "+error.message,"err");
        mantParte[key] = v;
      }
      setEstado("\u2713 Avance guardado.","ok");
    }
    function copiarNqnParte(){ const t=document.getElementById("nqnParteTexto"); t.select(); try{ navigator.clipboard.writeText(t.value); setEstado("\u2713 Parte copiado. Pegalo en WhatsApp.","ok"); }catch(e){ document.execCommand("copy"); setEstado("\u2713 Parte copiado.","ok"); } }

    /* ---- STOCK (Base Neuquén) — catálogo de ítems ---- */
    function familiasStock(){ const s=new Set(); stockItems.forEach(i=>{ if(i.familia) s.add(i.familia); }); return [...s].sort((a,b)=>a.localeCompare(b,"es")); }
    function bajoMinimo(i){ return Number(i.cantidad) <= Number(i.minimo); }
    function fmtNum(n){ if(n==null||n==="") return ""; const x=Number(n); return Number.isInteger(x)? String(x) : x.toFixed(2); }
    function fmtMoneda(n){ if(n==null||n==="") return ""; return "$" + Number(n).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
    // Exporta el catálogo de stock a CSV (abrible en Excel). Respeta el filtro de familia activo.
    function exportarStockCSV(){
      let lista = stockItems.slice();
      if (stockFiltroFam) lista = lista.filter(i=> (i.familia||"")===stockFiltroFam);
      if (stockSoloBajos) lista = lista.filter(bajoMinimo);
      const esc = (v)=>{ const s = (v==null?"":String(v)); return '"'+s.replace(/"/g,'""')+'"'; };
      const cab = ["Familia","Código","Descripción","Unidad","Cantidad","Mínimo","Costo unitario","Valorizado","Bajo mínimo"];
      const filas = lista.map(i=>{
        const cant=Number(i.cantidad)||0, costo=Number(i.costo)||0;
        return [ i.familia||"", i.codigo||"", i.descripcion||"", i.unidad||"", cant, (Number(i.minimo)||0), costo, (cant*costo), (bajoMinimo(i)?"SÍ":"") ].map(esc).join(";");
      });
      const csv = "\uFEFF" + cab.map(esc).join(";") + "\r\n" + filas.join("\r\n"); // BOM para acentos en Excel
      const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "stock_neuquen_"+hoyISO()+".csv";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
      setEstado("✓ CSV de stock descargado ("+lista.length+" ítems).","ok");
    }

      h += '<div style="background:#F1EFE8;border-radius:10px;padding:7px 12px;font-size:12px">Valorizado: <b>'+fmtMoneda(totalValor)+'</b></div>';

      h += '<div class="pl-row"><label style="font-size:11.5px;color:#888780;flex:1">Notas<br><input value="'+valeDraft.notas.replace(/"/g,'&quot;')+'" placeholder="opcional" onchange="valeDraft.notas=this.value" style="margin-top:3px;width:100%"></label></div>';

        h += '<div class="pl-row"><select onchange="setLinea('+idx+',\'item_id\',this.value)" style="flex:1;min-width:200px">'+optItems+'</select>'

          + (it?'<span style="font-size:11px;color:'+(disp!=null?'#888780':'#A8A69E')+'">disp: '+fmtNum(disp)+(it.unidad?" "+it.unidad:"")+'</span>':'')

    // edición del borrador
    function setLinea(idx,c,v){ valeDraft.lineas[idx][c]=v; renderStockMovs(); }
    function agregarLinea(){ valeDraft.lineas.push(nuevaLineaDraft()); renderStockMovs(); }
    function quitarLinea(idx){ valeDraft.lineas.splice(idx,1); if(!valeDraft.lineas.length) valeDraft.lineas.push(nuevaLineaDraft()); renderStockMovs(); }
    function agregarReparto(idx){ valeDraft.lineas[idx].repartos.push({ trailer_id:"", cantidad:"" }); renderStockMovs(); }
    function setReparto(idx,ridx,c,v){ valeDraft.lineas[idx].repartos[ridx][c]=v; renderStockMovs(); }
    function quitarReparto(idx,ridx){ valeDraft.lineas[idx].repartos.splice(ridx,1); renderStockMovs(); }

    async function guardarVale(){
      const v = valeDraft; const esEnt = v.tipo==="entrada";
      // Validaciones
      const lineas = v.lineas.filter(l=> l.item_id && Number(l.cantidad)>0);
      if(!lineas.length) return setEstado("Agregá al menos un material con cantidad mayor a cero.","err");
      for(const l of lineas){
        const it = itemPorId(l.item_id); const cant = Number(l.cantidad);
        if(!esEnt){
          // bloqueo de stock negativo
          if(cant > Number(it.cantidad)) return setEstado("No hay stock suficiente de \""+nombreItem(l.item_id)+"\": disponible "+fmtNum(it.cantidad)+", salida "+fmtNum(cant)+".","err");
          // reparto obligatorio y debe cuadrar
          const reps = (l.repartos||[]).filter(r=> r.trailer_id && Number(r.cantidad)>0);
          if(!reps.length) return setEstado("Falta el reparto por trailer en \""+nombreItem(l.item_id)+"\".","err");
          const sum = reps.reduce((a,r)=>a+Number(r.cantidad),0);
          if(Math.abs(sum-cant) > 1e-9) return setEstado("El reparto de \""+nombreItem(l.item_id)+"\" suma "+fmtNum(sum)+" y debe ser "+fmtNum(cant)+".","err");
        }
      }
      setEstado("Guardando vale…","cargando");
      // 1) cabecera
      const { data:mv, error:e1 } = await sb.from("stock_mov").insert({ sede:"neuquen", tipo:v.tipo, fecha:v.fecha, responsable:v.responsable||null, notas:v.notas||null }).select().single();
      if(e1) return setEstado("Error: "+e1.message,"err");
      // 2) renglones + 3) repartos + 4) ajuste de stock
      for(const l of lineas){
        const cant = Number(l.cantidad);
        const { data:mi, error:e2 } = await sb.from("stock_mov_item").insert({ mov_id:mv.id, item_id:l.item_id, cantidad:cant }).select().single();
        if(e2) return setEstado("Error en renglón: "+e2.message,"err");
        if(!esEnt){
          const reps = l.repartos.filter(r=> r.trailer_id && Number(r.cantidad)>0).map(r=>({ mov_item_id:mi.id, trailer_id:r.trailer_id, cantidad:Number(r.cantidad) }));
          if(reps.length){ const { error:e3 } = await sb.from("stock_mov_trailer").insert(reps); if(e3) return setEstado("Error en reparto: "+e3.message,"err"); }
        }
        // ajustar cantidad del ítem
        const it = itemPorId(l.item_id);
        const nueva = Number(it.cantidad) + (esEnt? cant : -cant);
        const { error:e4 } = await sb.from("stock_items").update({ cantidad:nueva }).eq("id",l.item_id);
        if(e4) return setEstado("Error al ajustar stock: "+e4.message,"err");
        it.cantidad = nueva;
      }
      valeDraft = null;
      setEstado("\u2713 Vale registrado y stock actualizado.","ok");
      cargar();
    }

    // Detecta si una persona tiene tareas planificadas dentro de un rango de fechas.
    function planificadoEnRango(personaId, desde, hasta){
      const hit=[];
      plani.forEach(b=>{
        // Cotizaciones y archivados no consumen disponibilidad: se ignoran para conflictos.
        if(!esOperativo(proyectos.find(p=>p.id===b.proyecto_id))) return;
        if(!(planiPers[b.id]||[]).includes(personaId)) return;
        const dias=diasHabiles(b.fecha_desde,b.fecha_hasta);
        const choca=dias.filter(d=> d>=desde && d<=hasta);
        if(choca.length){ const st=STATIONS[b.estacion]; hit.push({ estacion: st?st.label:b.estacion, proyecto: nombreProy(b.proyecto_id), dias: choca }); }
      });
      supervisiones.forEach(s=>{
        if(s.supervisor_id!==personaId) return;
        const dias=diasHabiles(s.fecha_desde,s.fecha_hasta);

    function sumarDiasHabiles(iso, n){ if(!iso||!n) return iso; let d=new Date(iso+"T12:00:00"); let restantes=Math.abs(n); const paso=n>0?1:-1; while(restantes>0){ d=new Date(d.getTime()+paso*86400000); const w=d.getDay(); const f=fechaStr(d); if(w!==0&&w!==6&&!esFeriado(f)) restantes--; } return fechaStr(d); }

    function validarCobertura() {
      // rango total de fechas planificadas
      const todas = [];
      plani.forEach(b => diasHabiles(b.fecha_desde, b.fecha_hasta).forEach(d => todas.push(d)));
      const fechas = [...new Set(todas)].sort();
      // carga por persona/día, separando dos "pistas" paralelas:
      //  - cargaEst: trabajo en estaciones normales (se suma)
      //  - cargaSup: supervisión (vale 8h fijas, corre en paralelo, no se suma con estación)
      const cargaEst = {}, cargaSup = {};
      plani.forEach(b => {
        (planiPers[b.id]||[]).forEach(g => {
          const hrs = (planiHoras[b.id] && planiHoras[b.id][g]!=null) ? planiHoras[b.id][g] : 8;
          diasHabiles(b.fecha_desde, b.fecha_hasta).forEach(d => {
            const k = g+"|"+d;
            cargaEst[k] = (cargaEst[k]||0) + hrs;
          });
        });
      });
      // supervisión vive en su propia tabla; vale 8h fijas en paralelo
      supervisiones.forEach(s => {
        const tieneProy = (s.proyectos||"").split(",").map(x=>x.trim()).filter(Boolean).length > 0;
        if (!tieneProy) return;
        const hrs = (s.horas != null ? s.horas : 8);
        diasHabiles(s.fecha_desde, s.fecha_hasta).forEach(d => {
          const k = s.supervisor_id+"|"+d;
          cargaSup[k] = (cargaSup[k]||0) + hrs;
        });
      });
      const directos = personas.filter(p => p.tipo !== "Contratista");
      const faltantes = [], excesos = [];
      const faltantesObj = [], excesosObj = [];
      const bloquesDe = (pid, d) => plani.filter(b => (planiPers[b.id]||[]).includes(pid) && diasHabiles(b.fecha_desde,b.fecha_hasta).includes(d)).map(b=>b.id);
      fechas.forEach(d => {
        directos.forEach(p => {
          if (noDispoEn(p.id, d)) return;
          const k = p.id+"|"+d;
          const hSup = cargaSup[k] || 0;
          const hEst = cargaEst[k] || 0;
          if (hSup > 0) {
            if (hSup < 8) { faltantes.push(nombrePersona(p.id) + " · " + dm(d) + " (supervisión < 8h)"); faltantesObj.push({persona:p.id, fecha:d, txt:nombrePersona(p.id)+" · "+dm(d)+" (supervisión < 8h)", bloques:[]}); }
            else if (hSup > 8) { excesos.push(nombrePersona(p.id) + " · " + dm(d) + " (supervisión > 8h)"); excesosObj.push({persona:p.id, fecha:d, txt:nombrePersona(p.id)+" · "+dm(d)+" (supervisión > 8h)", bloques:[]}); }
            return;
          }
          if (hEst < 8) { faltantes.push(nombrePersona(p.id) + " · " + dm(d)); faltantesObj.push({persona:p.id, fecha:d, txt:nombrePersona(p.id)+" · "+dm(d), bloques:bloquesDe(p.id,d)}); }
          else if (hEst > 8) { excesos.push(nombrePersona(p.id) + " · " + dm(d)); excesosObj.push({persona:p.id, fecha:d, txt:nombrePersona(p.id)+" · "+dm(d), bloques:bloquesDe(p.id,d)}); }
        });
      });
      const cubierto = faltantes.length===0 && excesos.length===0 && fechas.length>0;
      const dedup = (arr) => { const seen=new Set(), out=[]; arr.forEach(o=>{ const k=o.persona+"|"+o.fecha; if(!seen.has(k)){ seen.add(k); out.push(o); } }); return out; };
      return { fechas, faltantes: [...new Set(faltantes)], excesos: [...new Set(excesos)], faltantesObj: dedup(faltantesObj), excesosObj: dedup(excesosObj), ok: VALIDAR_COBERTURA ? cubierto : (fechas.length>0), cubiertoReal: cubierto };
    }
