    function setHistoProy(v){ histoProy=v; if(SEDE==="neuquen") renderHistoNqn(); else renderHisto(); }

    /* ---- GANTT ---- */
    function renderGantt() {
      if(!plani.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay planificación cargada.</p>'; return; }
      // Acumular por ESTACIÓN (una sola fila por estación). Supervisor queda EXCLUIDO.
      // Plan: de plani (todos los bloques de esa estación). Real: del detalle (días trabajados).
      const porEst = {}; // estKey -> { planByDay:{fecha:Set(proyId)}, realByDay:{fecha:Set(proyId)} }
      const ensure = (k)=>{ if(!porEst[k]) porEst[k]={planByDay:{}, realByDay:{}}; return porEst[k]; };
      const proyOperG = new Set(proyectosOperativos().map(p=>p.id));
      const pasaProyG = (pid)=> proyOperG.has(pid) && (!ganttProy || pid===ganttProy);
      plani.forEach(b=>{
        if(b.estacion===SUP_MARK || !STATIONS[b.estacion]) return;
        if(!pasaProyG(b.proyecto_id)) return;
        const e=ensure(b.estacion);
        diasHabiles(b.fecha_desde,b.fecha_hasta).forEach(d=>{ (e.planByDay[d]=e.planByDay[d]||new Set()).add(b.proyecto_id); });
      });
      detalle.forEach(f=>{
        if(f.ausente) return; if(f.estacion_real===SUP_MARK || !STATIONS[f.estacion_real]) return;
        if(!pasaProyG(f.proyecto_id)) return;
        // El "real" solo cuenta días ya ejecutados (hasta ayer). El día en curso y el futuro
        // todavía son plan, aunque el detalle ya tenga filas autogeneradas.
        if(!esFechaReal(f.fecha)) return;
        const e=ensure(f.estacion_real);
        (e.realByDay[f.fecha]=e.realByDay[f.fecha]||new Set()).add(f.proyecto_id);
      });
      // rango de fechas total (plan + real)
      const todas=[]; Object.values(porEst).forEach(e=>{ Object.keys(e.planByDay).forEach(d=>todas.push(d)); Object.keys(e.realByDay).forEach(d=>todas.push(d)); });
      const fechas=[...new Set(todas)].sort();
      const filtroGanttHTML = '<div class="no-print" style="margin-bottom:12px"><label style="font-size:12px;color:#888780">Proyecto <select onchange="setGanttProy(this.value)" style="width:auto"><option value="">Todos</option>'+proyectosOperativos().map(p=>'<option value="'+p.id+'" '+(p.id===ganttProy?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label></div>';
      if(!fechas.length){ contenido.innerHTML=filtroGanttHTML+'<p style="font-size:13px;color:#888780">'+(ganttProy?'Este proyecto no tiene estaciones con fechas cargadas.':'Las estaciones no tienen fechas cargadas.')+'</p>'; return; }
      // orden de estaciones: el orden canónico de STKEYS, solo las que tienen datos
      const estaciones = STKEYS.filter(k=>porEst[k]);
      const proyAbbr=(pid)=>{ const p=proyectos.find(x=>x.id===pid); if(!p) return "?"; return (p.codigo||p.nombre||"?").toString().slice(0,10); };
      const proyTitle=(set)=>[...set].map(nombreProy).join(", ");
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><p style="font-size:13px;color:#888780;margin:0"><span style="display:inline-block;width:14px;height:11px;background:#AEB6C2;border:1px solid #8C95A3;border-radius:2px;vertical-align:middle"></span> planificado &nbsp; <span style="display:inline-block;width:14px;height:11px;background:#185FA5;border-radius:2px;vertical-align:middle"></span> real (días trabajados hasta ayer). Cada barra muestra el código del proyecto.</p><div style="display:flex;gap:8px;align-items:center">'
        + '<label style="font-size:12px;color:#888780">Proyecto <select onchange="setGanttProy(this.value)" style="width:auto"><option value="">Todos</option>'+proyectosOperativos().map(p=>'<option value="'+p.id+'" '+(p.id===ganttProy?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>'
        + botonesExport("gantt-print","gantt")+'</div></div><div id="gantt-print"><div style="overflow-x:auto"><table style="min-width:'+(200+fechas.length*58)+'px;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8;z-index:6">Estación</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:56px">'+dm(d)+'</th>');
      h+='</tr></thead><tbody>';
      estaciones.forEach(k=>{
        const st=STATIONS[k]; const e=porEst[k];
        h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+st.color+';vertical-align:middle;margin-right:6px"></span>'+st.label+'</td>';
        fechas.forEach(d=>{
          const pSet=e.planByDay[d], rSet=e.realByDay[d];
          let cell='';
          if(pSet){ cell+='<div style="background:#AEB6C2;border:1px solid #8C95A3;height:17px;border-radius:3px;margin-bottom:2px;font-size:9.5px;font-weight:600;line-height:16px;color:#33373D;text-align:center;overflow:hidden;white-space:nowrap" title="Planificado · '+proyTitle(pSet)+'">'+proyAbbr([...pSet][0])+'</div>'; }
          if(rSet){ cell+='<div style="background:#185FA5;height:17px;border-radius:3px;font-size:9.5px;font-weight:600;line-height:17px;color:#fff;text-align:center;overflow:hidden;white-space:nowrap" title="Real · '+proyTitle(rSet)+'">'+proyAbbr([...rSet][0])+'</div>'; }
          h+='<td style="padding:3px 2px;vertical-align:middle">'+cell+'</td>';
        });
        h+='</tr>';
      });
      h+='</tbody></table></div></div>';
      contenido.innerHTML=h;
    }

    /* ---- HISTOGRAMA ---- */
    function renderHisto() {
      if(!detalle.length && !personasHuella().length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay detalle generado.</p>'; return; }
      const proyOperH = new Set(proyectosOperativos().map(p=>p.id));
      const detHisto = detalle.filter(f=>proyOperH.has(f.proyecto_id) && (!histoProy || f.proyecto_id===histoProy));
      const filtroHistoHTML = '<label style="font-size:12px;color:#888780">Proyecto <select onchange="setHistoProy(this.value)" style="width:auto"><option value="">Todos</option>'+proyectosOperativos().map(p=>'<option value="'+p.id+'" '+(p.id===histoProy?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>';
      if(!detHisto.length && !personasHuella().length){ contenido.innerHTML='<div class="no-print" style="margin-bottom:12px">'+filtroHistoHTML+'</div><p style="font-size:13px;color:#888780">'+(histoProy?'Este proyecto no tiene detalle cargado.':'No hay detalle de proyectos en operación (las cotizaciones y archivados no se muestran acá).')+'</p>'; return; }
      const fechas=[...new Set(detHisto.map(f=>f.fecha))].sort();
      // Filas: TODO el personal de La Huella (aunque no tenga jornadas), orden alfabético.
      // Se agregan también personas que aparezcan en el detalle pero ya no estén en el plantel actual (ex-empleados con historia).
      const idsPlantel = personasHuella().map(p=>p.id);
      const idsEnDetalle = [...new Set(detHisto.map(f=>f.persona_real))];
      // Orden: primero personal Directo, luego el resto (contratistas). Alfabético dentro de cada grupo.
      const esDirectoH = (id)=>{ const p=personas.find(x=>x.id===id); return p && p.tipo==="Directo" ? 0 : 1; };
      const pers=[...new Set([...idsPlantel, ...idsEnDetalle])]
        .sort((a,b)=>{
          const ga=esDirectoH(a), gb=esDirectoH(b);
          if(ga!==gb) return ga-gb;
          return nombrePersona(a).localeCompare(nombrePersona(b),"es");
        });
      const cell={}; detHisto.forEach(f=>{ cell[f.persona_real+"|"+f.fecha]= f.ausente?"__aus":f.estacion_real; });
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><p style="font-size:13px;color:#888780;margin:0">Personas en filas, días en columnas, color por estación.</p><div style="display:flex;gap:8px;align-items:center">'+filtroHistoHTML+botonesExport("histo-print","histograma")+'</div></div><div id="histo-print"><div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px;min-width:'+(160+fechas.length*52)+'px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8">Persona</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:50px">'+dm(d)+'</th>');
      h+='</tr></thead><tbody>';
      pers.forEach(pid=>{ const esContr=esDirectoH(pid)===1; h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap">'+nombrePersona(pid)+(esContr?' <span style="color:#A8A69E;font-weight:400" title="Contratista">◇</span>':'')+'</td>';
        fechas.forEach(d=>{ const t=cell[pid+"|"+d]; let c='<span style="color:#D3D1C7">—</span>'; if(t==="__aus")c='<span style="display:inline-block;width:100%;background:#FCEBEB;color:#A32D2D;border-radius:5px;padding:3px 0;font-size:9px">Ausente</span>'; else if(t===SUP_MARK)c='<span style="display:inline-block;width:100%;background:'+SUP_BG+';color:'+SUP_COLOR+';border-radius:5px;padding:3px 1px;font-size:8.5px">'+SUP_LABEL.slice(0,8)+'</span>'; else if(t&&STATIONS[t])c='<span style="display:inline-block;width:100%;background:'+STATIONS[t].bg+';color:'+STATIONS[t].color+';border-radius:5px;padding:3px 1px;font-size:8.5px">'+STATIONS[t].label.slice(0,8)+'</span>'; h+='<td style="padding:4px;text-align:center">'+c+'</td>'; });
        h+='</tr>';
      });
      h+='</tbody></table></div></div>';
      contenido.innerHTML=h;
    }

    /* ---- GANTT — BASE NEUQUÉN (filas = trailers) ---- */
    function renderGanttNqn(){
      if(!mantTareas.length && !detalle.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay tareas de mantenimiento ni detalle cargado.</p>'; return; }
      // Acumular por TRAILER. Plan: desde mant_tareas. Real: desde detalle (días trabajados hasta ayer).
      const porTr = {}; // trailerId -> { planByDay:{fecha:Set(tarea)}, realByDay:{fecha:Set(tarea)} }
      const ensure = (k)=>{ if(!porTr[k]) porTr[k]={planByDay:{}, realByDay:{}}; return porTr[k]; };
      const pasa = (trid)=> !ganttProy || trid===ganttProy;
      mantTareas.forEach(t=>{
        if(!t.trailer_id || !pasa(t.trailer_id)) return;
        const e=ensure(t.trailer_id);
        diasHabiles(t.fecha_desde,t.fecha_hasta).forEach(d=>{ (e.planByDay[d]=e.planByDay[d]||new Set()).add(t.tarea||"—"); });
      });
      detalle.forEach(f=>{
        if(f.ausente) return; if(!f.trailer_id || !pasa(f.trailer_id)) return;
        if(!esFechaReal(f.fecha)) return;
        const e=ensure(f.trailer_id);
        (e.realByDay[f.fecha]=e.realByDay[f.fecha]||new Set()).add(f.estacion_real||"—");
      });
      const todas=[]; Object.values(porTr).forEach(e=>{ Object.keys(e.planByDay).forEach(d=>todas.push(d)); Object.keys(e.realByDay).forEach(d=>todas.push(d)); });
      const fechas=[...new Set(todas)].sort();
      const trConDatos = trailers.filter(tr=>porTr[tr.id]);
      const filtro = '<label style="font-size:12px;color:#888780">Trailer <select onchange="setGanttProy(this.value)" style="width:auto"><option value="">Todos</option>'+trailers.map(tr=>'<option value="'+tr.id+'" '+(tr.id===ganttProy?'selected':'')+'>'+trailerIfTipo(tr).replace(/"/g,'&quot;')+'</option>').join('')+'</select></label>';
      if(!fechas.length){ contenido.innerHTML='<div class="no-print" style="margin-bottom:12px">'+filtro+'</div><p style="font-size:13px;color:#888780">Las tareas no tienen fechas cargadas.</p>'; return; }
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><p style="font-size:13px;color:#888780;margin:0"><span style="display:inline-block;width:14px;height:11px;background:#AEB6C2;border:1px solid #8C95A3;border-radius:2px;vertical-align:middle"></span> planificado &nbsp; <span style="display:inline-block;width:14px;height:11px;background:#185FA5;border-radius:2px;vertical-align:middle"></span> real (hasta ayer). Cada barra muestra la tarea.</p><div style="display:flex;gap:8px;align-items:center">'+filtro+botonesExport("ganttn-print","gantt_neuquen")+'</div></div>';
      h+='<div id="ganttn-print"><div style="overflow-x:auto"><table style="min-width:'+(200+fechas.length*58)+'px;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8;z-index:6">Trailer</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:56px">'+dm(d)+'</th>');
      h+='</tr></thead><tbody>';
      const abbr = (s)=> (s||"—").toString().slice(0,8);
      const title = (set)=>[...set].join(", ");
      trConDatos.forEach(tr=>{
        const e=porTr[tr.id];
        h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap">'+trailerIfTipo(tr)+'</td>';
        fechas.forEach(d=>{
          const pSet=e.planByDay[d], rSet=e.realByDay[d];
          let cell='';
          if(pSet){ cell+='<div style="background:#AEB6C2;border:1px solid #8C95A3;height:17px;border-radius:3px;margin-bottom:2px;font-size:9px;font-weight:600;line-height:16px;color:#33373D;text-align:center;overflow:hidden;white-space:nowrap" title="Plan · '+title(pSet)+'">'+abbr([...pSet][0])+'</div>'; }
          if(rSet){ cell+='<div style="background:#185FA5;height:17px;border-radius:3px;font-size:9px;font-weight:600;line-height:17px;color:#fff;text-align:center;overflow:hidden;white-space:nowrap" title="Real · '+title(rSet)+'">'+abbr([...rSet][0])+'</div>'; }
          h+='<td style="padding:3px 2px;vertical-align:middle">'+cell+'</td>';
        });
        h+='</tr>';
      });
      h+='</tbody></table></div></div>';
      contenido.innerHTML=h;
    }

    /* ---- HISTOGRAMA — BASE NEUQUÉN (filas = personas, color por tarea) ---- */
    function renderHistoNqn(){
      if(!detalle.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay detalle generado. Generalo desde Mantenimiento.</p>'; return; }
      const detH = histoProy ? detalle.filter(f=>f.trailer_id===histoProy) : detalle;
      const filtro = '<label style="font-size:12px;color:#888780">Trailer <select onchange="setHistoProy(this.value)" style="width:auto"><option value="">Todos</option>'+trailers.map(tr=>'<option value="'+tr.id+'" '+(tr.id===histoProy?'selected':'')+'>'+trailerIfTipo(tr).replace(/"/g,'&quot;')+'</option>').join('')+'</select></label>';
      if(!detH.length){ contenido.innerHTML='<div class="no-print" style="margin-bottom:12px">'+filtro+'</div><p style="font-size:13px;color:#888780">Este trailer no tiene detalle cargado.</p>'; return; }
      const soloTodos = !histoProy; // cuando el filtro es "Todos", mostramos también el IF del trailer en cada celda
      const ifDe = (id)=>{ const t=trailers.find(x=>x.id===id); return t ? (t.if_codigo||'(sin IF)') : ''; };
      const fechas=[...new Set(detH.map(f=>f.fecha))].sort();
      const pers=[...new Set(detH.map(f=>f.persona_real))];
      // Celda: guardamos tarea + IF del trailer (para poder mostrar ambos cuando el filtro es "Todos").
      const cell={}; detH.forEach(f=>{ cell[f.persona_real+"|"+f.fecha]= f.ausente?{aus:true}:{tarea:(f.estacion_real||"—"), iff:ifDe(f.trailer_id)}; });
      // Paleta simple por tarea (categoría).
      const cats=[...new Set(detH.map(f=>f.estacion_real||"—"))];
      const palette=["#E6F1FB|#185FA5","#E8F3DE|#3B6D11","#FAEEDA|#854F0B","#FBEAF0|#993556","#EFE7FB|#6B3FA0","#F2E8D8|#7A5C00","#E1F5EE|#0F6E56"];
      const colorDe={}; cats.forEach((c,i)=>{ colorDe[c]=palette[i%palette.length].split("|"); });
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><p style="font-size:13px;color:#888780;margin:0">Personas en filas, días en columnas, color por tarea.'+(soloTodos?' Con el filtro en «Todos», cada celda muestra la tarea y el IF del trailer.':'')+'</p><div style="display:flex;gap:8px;align-items:center">'+filtro+botonesExport("histon-print","histograma_neuquen")+'</div></div><div id="histon-print"><div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px;min-width:'+(160+fechas.length*(soloTodos?64:52))+'px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8">Persona</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:'+(soloTodos?62:50)+'px">'+dm(d)+'</th>');
      h+='</tr></thead><tbody>';
      pers.forEach(pid=>{ h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap">'+nombrePersona(pid)+'</td>';
        fechas.forEach(d=>{ const t=cell[pid+"|"+d]; let c='<span style="color:#D3D1C7">—</span>';
          if(t && t.aus)c='<span style="display:inline-block;width:100%;background:#FCEBEB;color:#A32D2D;border-radius:5px;padding:3px 0;font-size:9px">Ausente</span>';
          else if(t){ const col=colorDe[t.tarea]||["#EEE","#555"]; const iffLine = soloTodos ? '<div style="font-size:8px;font-weight:700;opacity:.85;line-height:1.1">'+String(t.iff).replace(/</g,'&lt;')+'</div>' : ''; c='<span style="display:inline-block;width:100%;background:'+col[0]+';color:'+col[1]+';border-radius:5px;padding:3px 1px;font-size:8.5px" title="'+String(t.tarea).replace(/"/g,'&quot;')+(soloTodos?(' · IF '+String(t.iff).replace(/"/g,'&quot;')):'')+'">'+iffLine+String(t.tarea).slice(0,8)+'</span>'; }
          h+='<td style="padding:4px;text-align:center">'+c+'</td>'; });
        h+='</tr>';
      });
      h+='</tbody></table></div></div>';
      contenido.innerHTML=h;
    }

    function renderParte() {

      const fechas=[...new Set(detalle.filter(f=>proyOperP.has(f.proyecto_id)).map(f=>f.fecha))].sort();

      h+='<label style="font-size:11.5px;color:#888780">Proyecto<br><select onchange="setParte(\'proy\',this.value)" style="margin-top:3px"><option value="">Todos</option>'+proyectosOperativos().map(p=>'<option value="'+p.id+'" '+(p.id===parteProy?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>';
      h+='<label style="font-size:11.5px;color:#888780">Estación<br><select onchange="setParte(\'est\',this.value)" style="margin-top:3px"><option value="">Todas</option>'+STKEYS.map(k=>'<option value="'+k+'" '+(k===parteEst?'selected':'')+'>'+STATIONS[k].label+'</option>').join('')+'</select></label>';
      h+='<label style="font-size:11.5px;color:#888780">Persona<br><select onchange="setParte(\'pers\',this.value)" style="margin-top:3px"><option value="">Todas</option>'+personasHuella().map(p=>'<option value="'+p.id+'" '+(p.id===partePersona?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>';
      h+='<button class="btn btn-wsp" onclick="copiarParte()">Copiar para WhatsApp</button>';

      rows.forEach(f=>{ const mm=(f.modulos_real||"").trim(); const pp=personas.find(x=>x.id===f.persona_real); const esContr=pp&&pp.tipo==="Contratista"; h+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #F1EFE8;font-size:13px"><span style="font-weight:600;min-width:140px">'+nombrePersona(f.persona_real)+(esContr?' <span style="background:#EFE7FB;color:#6B3FA0;padding:1px 5px;border-radius:5px;font-size:9.5px;font-weight:500">contratista</span>':'')+'</span><span><span style="background:'+estBg(f.estacion_real)+';color:'+estColor(f.estacion_real)+';padding:2px 6px;border-radius:6px;font-size:10.5px">'+nombreEstacion(f.estacion_real)+'</span>'+(mm?' <span style="background:#E6F1FB;color:#185FA5;padding:2px 6px;border-radius:6px;font-size:10.5px">'+mm+'</span>':'')+' <span style="color:#888780">'+f.subtarea_real+'</span>'+(f.horas_extra>0?' <span style="color:#BA7517;font-size:11px">+'+f.horas_extra+'h</span>':'')+'</span></div>'; });

    function setParte(campo,val){ if(campo==='fecha')parteFecha=val; else if(campo==='proy')parteProy=val; else if(campo==='est')parteEst=val; else if(campo==='pers')partePersona=val; renderParte(); }

    /* ---- INFORME DE CIERRE ---- */
    let informeProy = "";
    let infoExplica = new Set(); // ids de secciones con "cómo se calcula" abierto

    // Bloque colapsable reutilizable "Cómo se calcula". id único por sección; html = contenido de la fórmula.

    // Saltos del informe: tiempo → Planificación General; costo → Detalle diario. Posicionados en el proyecto.
    function infoSaltarAPlan(proyId){
      planiProy = proyId || ""; planiVerTodo = true; // ver todo el plan del proyecto

    function renderInforme() {
      const proySel = informeProy || (proyectos[0] && proyectos[0].id) || "";
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">';
      h+='<label style="font-size:12px;color:#888780">Proyecto<br><select onchange="setInformeProy(this.value)" style="margin-top:3px;min-width:220px">'+(proyectos.length?proyectos.map(p=>'<option value="'+p.id+'" '+(p.id===proySel?'selected':'')+'>'+p.nombre+etiquetaEstadoProy(p)+'</option>').join(''):'<option>Sin proyectos</option>')+'</select></label>';
      h+=botonesExport("informe-print","informe_cierre")+'</div>';

      if(!proySel){ h+='<p style="font-size:13px;color:#888780">No hay proyectos.</p>'; contenido.innerHTML=h; return; }
      const pr = proyectos.find(p=>p.id===proySel);
      const blo = plani.filter(b=>b.proyecto_id===proySel);
      const det = detalle.filter(f=>f.proyecto_id===proySel);
      // Corte del "real" en el informe: solo cuenta lo ya ejecutado (hasta ayer). Excepción:
      // si el proyecto está CERRADO, ya no hay futuro, así que se cuenta todo el detalle.
      const cerradoInf = (pr && pr.estado === "Cerrado");
      const esRealInf = (fch)=> cerradoInf || esFechaReal(fch);

      // --- TIEMPOS ---
      // ¿El proyecto ya arrancó? (tiene al menos un día real ejecutado). Si NO arrancó y no está
      // cerrado, no hay ejecución que comparar: el desvío real vs plan es 0 (no fantasma).
      const arranco = proyectoArranco(proySel);
      const midiendoReal = cerradoInf || arranco;
      // PLANIFICADO: se toma de la LÍNEA BASE (la primera planificación guardada). Si no hay base
      // fijada, se cae a la planificación vigente actual, avisándolo.
      const baseInf = baseDeProy(proySel);
      const bloquesPlanBase = baseInf && baseInf.contenido && baseInf.contenido.bloques ? baseInf.contenido.bloques : blo;
      const usandoBase = !!(baseInf && baseInf.contenido && baseInf.contenido.bloques);
      let planDias=[], realDias=[];
      // El plan del informe muestra el plan COMPLETO de la base (no recortado a "hasta ayer"):
      // es contra lo que el proyecto se comprometió. El recorte aplica solo al "real".
      bloquesPlanBase.forEach(b=>diasHabiles(b.fecha_desde,b.fecha_hasta).forEach(d=>planDias.push(d)));
      if(midiendoReal){ det.forEach(f=>{ if(!f.ausente && esRealInf(f.fecha)) realDias.push(f.fecha); }); }
      planDias=[...new Set(planDias)].sort(); realDias=[...new Set(realDias)].sort();
      const planIni=planDias[0], planFin=planDias[planDias.length-1];
      const realIni=realDias[0], realFin=realDias[realDias.length-1];
      const planDur=planDias.length, realDur=realDias.length;
      // Desvío de ejecución: solo tiene sentido si el proyecto arrancó (o está cerrado).
      const desvDias = midiendoReal ? (realDur-planDur) : 0;
      // Desvío de FECHA DE FIN (informativo): días hábiles entre el fin planificado y el fin real.
      // >0 = terminó después de lo previsto; <0 = antes. Independiente de la cantidad de días trabajados.
      let desvFin=null;
      if(midiendoReal && planFin && realFin){
        const signo = realFin>planFin?1:(realFin<planFin?-1:0);
        const a = realFin>planFin?planFin:realFin, b = realFin>planFin?realFin:planFin;
        desvFin = signo * Math.max(0, diasHabiles(a,b).length-1);
      }

      // --- COSTOS (desdoblados: La Huella vs Montaje) ---
      const presupH = presupHuella(pr), presupM = presupMontaje(pr), presup = presupH + presupM;
      let jornal=0, extra=0, hsExtra=0, ausencias=0, costoImprodInf=0;
      let realH=0, realM=0; // costo real contra cada presupuesto
      det.forEach(f=>{ if(!esRealInf(f.fecha)) return; const ch=costoHora(f.persona_real, f.fecha);
        if(f.ausente){
          // Ausencia pagada (mensualizado): suma como jornada planificada a valor vigente; se registra como improductivo.
          ausencias++;
          const hp=(f.horas_plan!=null?Number(f.horas_plan):Number(f.horas_normales)||0);
          const pa=hp*ch; costoImprodInf+=pa;
          if(esMontaje(f.estacion_real)) realM+=pa; else realH+=pa;
          return;
        }
        const cn=(Number(f.horas_normales)||0)*ch; const ce=(Number(f.horas_extra)||0)*ch*multExtra(f.fecha); jornal+=cn; extra+=ce; hsExtra+=(Number(f.horas_extra)||0); if(esMontaje(f.estacion_real)) realM+=cn+ce; else realH+=cn+ce; });
      const real=jornal+extra+costoImprodInf;
      const desvCosto=real-presup;
      const desvPct=presup?(desvCosto/presup*100):0;
      const desvH=realH-presupH, desvM=realM-presupM;
      const pctH=presupH?(desvH/presupH*100):0, pctM=presupM?(desvM/presupM*100):0;

      // --- JORNALES (solo personal Directo; horas reales incl. día extra) / 8, con apertura por especialidad ---
      // Contratistas quedan fuera: su costo se paga por otra vía y no consumen jornal de mano de obra directa.
      // La especialidad usada es la vigente en el mes de cada fila (mismo criterio en cascada que el valor-hora).
      let horasRealesTotal=0;
      const porEsp={};
      det.forEach(f=>{
        if(f.ausente) return;
        if(!esRealInf(f.fecha)) return;
        const p=personas.find(x=>x.id===f.persona_real);
        if(!p || p.tipo!=="Directo") return;
        const hs=(Number(f.horas_normales)||0)+(Number(f.horas_extra)||0);
        horasRealesTotal+=hs;
        const esp=especialidadMes(f.persona_real, f.fecha);
        porEsp[esp]=(porEsp[esp]||0)+hs;
      });
      const jornalesTotal=horasRealesTotal/8;
      const jornalesPorEsp=Object.entries(porEsp).map(([esp,hs])=>[esp,hs/8]).sort((a,b)=>b[1]-a[1]);

      // --- POR ESTACIÓN (Supervisión EXCLUIDA: es un rol paralelo, no una estación) ---
      const est={};
      blo.forEach(b=>{ if(b.estacion===SUP_MARK) return; const dP=diasHabiles(b.fecha_desde,b.fecha_hasta).filter(esRealInf); if(!est[b.estacion])est[b.estacion]={planD:new Set(),realD:new Set(),costo:0,hsExtra:0,modsPlan:new Set(),modsReal:new Set()}; dP.forEach(d=>est[b.estacion].planD.add(d)); (b.modulos||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(m=>est[b.estacion].modsPlan.add(m)); });
      det.forEach(f=>{ if(f.estacion_real===SUP_MARK) return; if(!esRealInf(f.fecha)) return; if(!est[f.estacion_real])est[f.estacion_real]={planD:new Set(),realD:new Set(),costo:0,hsExtra:0,modsPlan:new Set(),modsReal:new Set()}; if(!f.ausente){est[f.estacion_real].realD.add(f.fecha); const ch=costoHora(f.persona_real, f.fecha); est[f.estacion_real].costo+=(Number(f.horas_normales)||0)*ch+(Number(f.horas_extra)||0)*ch*multExtra(f.fecha); est[f.estacion_real].hsExtra+=(Number(f.horas_extra)||0); (f.modulos_real||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(m=>est[f.estacion_real].modsReal.add(m));} else { const ch=costoHora(f.persona_real, f.fecha); const hp=(f.horas_plan!=null?Number(f.horas_plan):Number(f.horas_normales)||0); est[f.estacion_real].costo+=hp*ch; } });

      const fmt=(n)=>'$'+Math.round(n).toLocaleString("es-AR");
      const fdate=(d)=>d?dmy(d):"—";
      // --- Datos para gráficos: costo plan por estación + rangos de fecha plan/real por estación ---
      // Costo plan: de la LÍNEA BASE si existe (bloques con personas+horas), si no, de la plani vigente.
      // Se valoriza con el costo/hora del mes de la fecha de inicio de cada bloque (aprox. estable).
      const estCostoPlan = {};       // estacion -> costo plan
      const estFechasPlan = {};      // estacion -> {ini, fin}  (rango completo del plan, sin recorte)
      const estFechasReal = {};      // estacion -> {ini, fin}  (rango real ejecutado, hasta ayer/cerrado)
      function acumPlanRango(estacion, desde, hasta){
        if(estacion===SUP_MARK) return;
        const dh = diasHabiles(desde,hasta);
        if(!dh.length) return;
        const ini=dh[0], fin=dh[dh.length-1];
        const r = estFechasPlan[estacion] || (estFechasPlan[estacion]={ini:null,fin:null});
        if(!r.ini || ini<r.ini) r.ini=ini;
        if(!r.fin || fin>r.fin) r.fin=fin;
      }
      if(usandoBase){
        bloquesPlanBase.forEach(b=>{
          if(b.estacion===SUP_MARK) return;
          acumPlanRango(b.estacion, b.fecha_desde, b.fecha_hasta);
          const nd = diasHabiles(b.fecha_desde,b.fecha_hasta).length;
          const refFecha = b.fecha_desde || hoyISO();
          (b.personas||[]).forEach(pp=>{ const ch=costoHora(pp.persona_id, refFecha); estCostoPlan[b.estacion]=(estCostoPlan[b.estacion]||0)+ (Number(pp.horas)||8)*ch*nd; });
        });
      } else {
        blo.forEach(b=>{
          if(b.estacion===SUP_MARK) return;
          acumPlanRango(b.estacion, b.fecha_desde, b.fecha_hasta);
          const nd = diasHabiles(b.fecha_desde,b.fecha_hasta).length;
          const refFecha = b.fecha_desde || hoyISO();
          (planiPers[b.id]||[]).forEach(pid=>{ const hrs=(planiHoras[b.id]&&planiHoras[b.id][pid]!=null)?planiHoras[b.id][pid]:8; const ch=costoHora(pid, refFecha); estCostoPlan[b.estacion]=(estCostoPlan[b.estacion]||0)+ hrs*ch*nd; });
        });
      }
      det.forEach(f=>{ if(f.estacion_real===SUP_MARK || f.ausente) return; if(!esRealInf(f.fecha)) return; const r=estFechasReal[f.estacion_real]||(estFechasReal[f.estacion_real]={ini:null,fin:null}); if(!r.ini||f.fecha<r.ini) r.ini=f.fecha; if(!r.fin||f.fecha>r.fin) r.fin=f.fecha; });

      // --- COSTO PLANIFICADO (línea base): total y desdoblado Huella / Montaje ---
      // Se arma sumando estCostoPlan (costo del plan por estación, valorizado por costo/hora).
      // Montaje va contra el presupuesto de Montaje; el resto contra el de La Huella.
      // Si no hay línea base fijada, estCostoPlan se cae al plan vigente (mismo criterio que el resto del informe).
      let planCostoH=0, planCostoM=0;
      Object.keys(estCostoPlan).forEach(k=>{ if(esMontaje(k)) planCostoM+=estCostoPlan[k]; else planCostoH+=estCostoPlan[k]; });
      // Supervisión en el PLAN: el supervisor trabaja en paralelo (no es estación) pero SÍ tiene costo,
      // igual que el costo real lo cuenta. Va al bucket La Huella (el supervisor no tiene estación Montaje).
      // Las horas se toman de la base si están congeladas; el rango de días se toma de la supervisión
      // vigente del proyecto (la base no congela fechas de supervisión). Aproximación estable y simétrica con el real.
      (function(){
        const supVig = supervisiones.filter(s=> String(s.proyectos||"").split(",").map(x=>x.trim()).includes(proySel));
        // horas planificadas por supervisor según la base (si existe), si no, la vigente
        const horasBase = {};
        if(usandoBase && baseInf && baseInf.contenido && Array.isArray(baseInf.contenido.supervisiones)){
          baseInf.contenido.supervisiones.forEach(s=>{ horasBase[s.supervisor_id]=(s.horas!=null?s.horas:8); });
        }
        supVig.forEach(s=>{
          const nd = diasHabiles(s.fecha_desde, s.fecha_hasta).length;
          if(!nd) return;
          const hrs = (horasBase[s.supervisor_id]!=null) ? horasBase[s.supervisor_id] : (s.horas!=null?s.horas:8);
          const ch = costoHora(s.supervisor_id, s.fecha_desde || hoyISO());
          planCostoH += hrs*ch*nd;
        });
      })();
      const planCosto = planCostoH + planCostoM;
      const hayPlanCosto = planCosto > 0;
      // Desvíos del PLAN (costo planificado línea base) contra presupuesto y contra real.
      // Plan vs Presupuesto: >0 = el plan ya proyectaba más gasto que el presupuesto.
      // Plan vs Real: >0 = se ejecutó más caro que lo planificado (sobreejecución).
      const desvPlanPres = planCosto - presup, desvPlanPresPct = presup?(desvPlanPres/presup*100):0;
      const desvRealPlan = real - planCosto, desvRealPlanPct = planCosto?(desvRealPlan/planCosto*100):0;
      const desvPlanPresH = planCostoH - presupH, desvPlanPresM = planCostoM - presupM;
      const desvRealPlanH = realH - planCostoH, desvRealPlanM = realM - planCostoM;
      const pctPlanPresH = presupH?(desvPlanPresH/presupH*100):0, pctPlanPresM = presupM?(desvPlanPresM/presupM*100):0;
      const pctRealPlanH = planCostoH?(desvRealPlanH/planCostoH*100):0, pctRealPlanM = planCostoM?(desvRealPlanM/planCostoM*100):0;

      h+='<div id="informe-print">';
      h+='<div style="border:1px solid #E6E4DC;border-radius:14px;padding:20px;background:#fff">';
      h+='<div style="font-size:20px;font-weight:700">Informe de cierre</div><div style="font-size:15px;color:#185FA5;font-weight:600;margin-bottom:2px">'+pr.nombre+(pr.codigo?' · '+pr.codigo:'')+'</div><div style="font-size:12px;color:#A8A69E;margin-bottom:6px">Estado: '+(pr.estado||'Vigente')+(pr.cant_modulos?' · '+pr.cant_modulos+' módulos':'')+'</div>';
      h+='<div style="font-size:11px;color:'+(cerradoInf?'#3B6D11':'#BA7517')+';background:'+(cerradoInf?'#F1F8EC':'#FCF4E6')+';border-radius:8px;padding:8px 11px;margin-bottom:16px;line-height:1.5">'
        + (cerradoInf
            ? '<b>Proyecto cerrado.</b> El informe cuenta todo el detalle registrado, sin recorte de fecha (ya no hay días futuros pendientes).'
            : '<b>Proyecto en curso.</b> El “real” cuenta solo lo ejecutado hasta ayer inclusive. El día en curso y los días futuros todavía son plan pendiente y no se computan como real. Al cerrar el proyecto, el informe pasará a contar el total.')
        + '</div>';

      if(det.length===0){ h+='<div class="estado err" style="margin:0">Este proyecto no tiene detalle diario registrado todavía. El informe necesita datos reales cargados para comparar.</div></div></div>'; contenido.innerHTML=h; return; }

      // resumen general
      h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px">';
      const kpi=(l,v,s,col)=>'<div style="flex:1;min-width:140px;background:#F9F8F4;border-radius:12px;padding:12px 14px"><div style="font-size:11.5px;color:#888780">'+l+'</div><div style="font-size:19px;font-weight:600;color:'+(col||'#2C2C2A')+';margin-top:2px">'+v+'</div>'+(s?'<div style="font-size:11px;color:#A8A69E;margin-top:1px">'+s+'</div>':'')+'</div>';
      h+=kpi("Costo real",fmt(real),"jornales + extra");
      h+=kpi("Costo planificado",hayPlanCosto?fmt(planCosto):"s/dato",usandoBase?"línea base":"plan vigente");
      h+=kpi("Presupuesto MO",presup?fmt(presup):"s/dato",null);
      h+=kpi("Desvío de costo",(desvCosto>=0?"+":"")+fmt(desvCosto),presup?(desvPct>=0?"+":"")+desvPct.toFixed(0)+"%":null,desvCosto>0?'#A32D2D':'#3B6D11');
      h+=kpi("Desvío de tiempo",midiendoReal?((desvDias>=0?"+":"")+desvDias+" días"):"—",midiendoReal?(planDur+" plan / "+realDur+" real"):"sin arrancar",desvDias>0?'#A32D2D':desvDias<0?'#3B6D11':'#888780');
      h+='</div>';
      h+='<details style="margin:-8px 0 18px"><summary style="font-size:11.5px;color:#185FA5;cursor:pointer">Cómo se calculan estos indicadores</summary><div style="font-size:11px;color:#888780;line-height:1.6;background:#FAFAF8;border:1px solid #EEECE4;border-radius:8px;padding:10px 12px;margin-top:6px">'
        + '<b>Costo real:</b> suma de (horas normales × valor-hora del mes) + (horas extra × valor-hora × 1,5 lun-sáb ó × 2 dom/feriado) de todas las jornadas reales del proyecto.<br>'
        + '<b>Costo planificado:</b> costo de la planificación de la <b>línea base</b> (horas planificadas × valor-hora), sin recorte de fecha. Incluye la <b>supervisión de proyecto</b>, igual que el costo real. Es lo que el plan proyectaba gastar. Si no hay línea base fijada, se toma el plan vigente.<br>'
        + '<b>Presupuesto MO:</b> presupuesto de mano de obra cargado en el proyecto (La Huella + Montaje).<br>'
        + '<b>Desvío de costo:</b> costo real − presupuesto. Positivo = te pasaste; negativo = por debajo.<br>'
        + '<b>Plan vs presupuesto:</b> costo planificado − presupuesto. Positivo = ya el plan proyectaba más que el presupuesto.<br>'
        + '<b>Real vs plan:</b> costo real − costo planificado. Positivo = se ejecutó más caro que lo planificado.<br>'
        + '<b>Desvío de tiempo:</b> días hábiles reales trabajados − días hábiles planificados. Cuidado: cuenta cantidad de días distintos, no fechas. El “corrimiento de fecha de fin” de la tabla de abajo mide otra cosa: si terminó antes o después de la fecha prevista.<br>'
        + '<b>Recorte:</b> mientras el proyecto está en curso, todo lo anterior cuenta solo hasta ayer; al cerrarlo, cuenta todo.'
        + '</div></details>';

      // --- VEREDICTO: síntesis en prosa del resultado de mano de obra ---
      (function(){
        const frases=[];
        // Costo

      estArr.forEach(([k,v])=>{ const dp=v.planD.size, dr=v.realD.size, dv=dr-dp; const mP=[...v.modsPlan].join(", ")||"—"; const mR=[...v.modsReal].join(", ")||"—"; h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:7px 10px"><span style="background:'+estBg(k)+';color:'+estColor(k)+';padding:2px 7px;border-radius:6px">'+nombreEstacion(k)+'</span></td><td style="text-align:center">'+dp+'</td><td style="text-align:center">'+dr+'</td><td style="text-align:center;color:'+(dv>0?'#A32D2D':dv<0?'#3B6D11':'#888780')+'">'+(dv>=0?"+":"")+dv+'</td><td style="text-align:right">'+fmt(v.costo)+'</td><td style="text-align:center;color:'+(v.hsExtra>0?'#BA7517':'#A8A69E')+'">'+(v.hsExtra||0)+'h</td><td style="padding:7px 10px;font-size:11.5px;color:#5F5E5A">'+mP+'</td><td style="padding:7px 10px;font-size:11.5px;color:#5F5E5A">'+mR+'</td></tr>'; });
      // Supervisión: se reporta aparte (rol paralelo). Su costo está en el total pero no en las estaciones.

      det.forEach(f=>{ if(f.estacion_real===SUP_MARK && !f.ausente && esRealInf(f.fecha)){ const ch=costoHora(f.persona_real, f.fecha); costoSup+=(Number(f.horas_normales)||0)*ch+(Number(f.horas_extra)||0)*ch*multExtra(f.fecha); diasSupSet.add(f.fecha); } });
      if(costoSup>0){ h+='<tr style="border-top:1px solid #F1EFE8;background:'+SUP_BG+'33"><td style="padding:7px 10px"><span style="background:'+SUP_BG+';color:'+SUP_COLOR+';padding:2px 7px;border-radius:6px">'+SUP_LABEL+'</span> <span style="font-size:10.5px;color:#A8A69E">(rol paralelo)</span></td><td style="text-align:center">—</td><td style="text-align:center">'+diasSupSet.size+'</td><td style="text-align:center;color:#888780">—</td><td style="text-align:right">'+fmt(costoSup)+'</td><td style="text-align:center;color:#A8A69E">—</td><td style="padding:7px 10px;font-size:11.5px;color:#A8A69E">—</td><td style="padding:7px 10px;font-size:11.5px;color:#A8A69E">—</td></tr>'; }
      h+='</tbody></table></div>';
      h+='<div style="font-size:11px;color:#A8A69E;margin-top:6px">La Supervisión es un rol paralelo, no una estación: su costo se incluye en el total del proyecto pero no genera desvío de plazo de estación. Las fechas y módulos del desglose salen del detalle diario, no del plan.</div>';

      // lectura del desvío (descriptiva, basada en datos)

      (function(){
        const nMods = Number(pr.cant_modulos)||0;

      h+='<div style="font-size:14px;font-weight:600;margin:18px 0 8px">📝 Lectura del desvío</div><div style="font-size:13px;color:#5F5E5A;line-height:1.6;background:#F9F8F4;border-radius:12px;padding:14px 16px">';
      const obs=[];

      if(ausencias>0)obs.push("Se registraron "+ausencias+" jornada(s) de ausencia en el período.");

      const peor=estArr.filter(([,v])=>v.realD.size-v.planD.size>0).sort((a,b)=>(b[1].realD.size-b[1].planD.size)-(a[1].realD.size-a[1].planD.size))[0];

    function setInformeProy(v){ informeProy=v; renderInforme(); }

    /* ================= TABLERO DE FÁBRICA (La Huella) ================= */
    // Estado del tablero. Corte temporal + período seleccionado + proyecto.
    let tabCorte = "mes";      // "dia" | "semana" | "quincena" | "mes"
    let tabPeriodo = "";       // clave del período elegido (depende del corte); "" = el más reciente
    let tabProy = "";          // "" = todos los proyectos operativos

    // Devuelve la CLAVE de período de una fecha ISO, según el corte.
    function tabClavePeriodo(fISO, corte){
      if(!fISO) return "";
      if(corte==="dia") return fISO;
      if(corte==="mes") return fISO.slice(0,7);
      const d = new Date(fISO+"T12:00:00");
      if(corte==="quincena"){ const q = d.getDate()<=15 ? "Q1" : "Q2"; return fISO.slice(0,7)+"-"+q; }
      // semana: lunes de la semana ISO como clave
      const w = d.getDay(); const offset = (w===0? -6 : 1-w); const lun = new Date(d); lun.setDate(d.getDate()+offset);
      return fechaStr(lun);
    }
    // Etiqueta legible de un período.
    function tabEtiquetaPeriodo(clave, corte){
      if(!clave) return "—";
      if(corte==="dia") return dmy(clave);
      if(corte==="mes") return nombreMes(clave);
      if(corte==="quincena"){ const [y,m,q]=clave.split("-"); return (q==="Q1"?"1ª quinc. ":"2ª quinc. ")+nombreMes(y+"-"+m); }
      // semana
      const lun=new Date(clave+"T12:00:00"); const dom=new Date(lun); dom.setDate(lun.getDate()+6);
      return "Sem. "+dm(clave)+"–"+dm(fechaStr(dom));
    }
    // ¿Es personal Directo? (tablero de fábrica: solo directos)
    function esDirecto(pid){ const p=personas.find(x=>x.id===pid); return !!(p && p.tipo==="Directo"); }

    // Fecha ISO de INICIO de un período (según el corte). Se usa para saltar al Detalle diario.
    function tabInicioPeriodo(clave, corte){
      if(!clave) return null;
      if(corte==="dia") return clave;
      if(corte==="semana") return clave; // la clave YA es el lunes
      if(corte==="mes") return clave+"-01";
      if(corte==="quincena"){ const [y,m,q]=clave.split("-"); return y+"-"+m+"-"+(q==="Q1"?"01":"16"); }
      return null;
    }
    // Salta al Detalle diario posicionado en el inicio del período que se está viendo en el Tablero.
    function tabSaltarADetalle(){
      const ini = tabInicioPeriodo(tabPeriodo, tabCorte);

    // Calcula los agregados de costo de un conjunto de filas de detalle. Fórmula ÚNICA,
    // reutilizada por los KPIs, el gráfico de evolución y la descomposición del desvío.
    function tabCostoDeFilas(filas){
      let costoReal=0, costoPlan=0, jornales=0, jornalesPlan=0, hsExtra=0, extraCosto=0, ausencias=0;
      let costoImproductivo=0; // ausencias pagadas (directo mensualizado): se paga pero no produce
      // efectos de la descomposición del desvío (suman exactamente desvPlan)
      let efTarifa=0, efHoras=0, efExtra=0, efAusencia=0;
      filas.forEach(f=>{
        const hn=Number(f.horas_normales)||0, he=Number(f.horas_extra)||0;
        const hp=(f.horas_plan!=null?Number(f.horas_plan):hn);
        const vhReal = costoHora(f.persona_real, f.fecha);
        const vhPlan = (f.valor_hora_plan!=null?Number(f.valor_hora_plan):vhReal);
        const mult = multExtra(f.fecha);
        if(f.ausente){
          ausencias++;
          // El directo es mensualizado: se le paga igual la jornada planificada, aunque no produzca.
          const pagoAusencia = hp*vhReal;
          costoReal += pagoAusencia;
          costoImproductivo += pagoAusencia;
        }
        else {
          costoReal += hn*vhReal + he*vhReal*mult;
          extraCosto += he*vhReal*mult;
          jornales += hn/8;
          hsExtra += he;
          jornalesPlan += hp/8;
        }
        costoPlan += hp*vhPlan;
        // --- descomposición (suma exacta del desvío) ---
        // efecto tarifa: mismas horas plan, diferencia de valor-hora (aplica también a ausentes: se pagó a vhReal)
        efTarifa += hp*(vhReal - vhPlan);
        if(f.ausente){
          // Ausencia pagada: real = hp*vhReal, plan = hp*vhPlan. La diferencia YA está en efTarifa.
          // No agrega desvío por horas (se pagó lo planificado). Su peso se muestra aparte como costo improductivo.
          efAusencia += 0;
        } else {
          // efecto horas normales: (horas reales - plan) a valor real
          efHoras += (hn - hp)*vhReal;
          // efecto extra: las horas extra (no estaban en el plan)
          efExtra += he*vhReal*mult;
        }
      });
      return { costoReal, costoPlan, jornales, jornalesPlan, hsExtra, extraCosto, ausencias, costoImproductivo,

               desvPlan: costoReal-costoPlan,
               efTarifa, efHoras, efExtra, efAusencia };
    }

    function renderTablero(){

      if (tabProy) base = base.filter(f => f.proyecto_id === tabProy);

      if (!tabPeriodo || !periodos.includes(tabPeriodo)) tabPeriodo = periodos[0] || "";

      const filas = base.filter(f => tabClavePeriodo(f.fecha, tabCorte) === tabPeriodo);

      // KPIs del período (solo directos, real) — vía helper de fórmula única.
      const agg = tabCostoDeFilas(filas);
      const costoReal=agg.costoReal, costoPlan=agg.costoPlan, jornales=agg.jornales,

      h += '<select onchange="tabPeriodo=this.value;renderTablero()" style="width:auto">'
        + (periodos.length? periodos.map(p=>'<option value="'+p+'" '+(p===tabPeriodo?'selected':'')+'>'+tabEtiquetaPeriodo(p,tabCorte)+'</option>').join('') : '<option>—</option>')
        + '</select>';
      h += '<span style="width:1px;height:22px;background:#E6E4DC"></span>';
      h += '<span style="font-size:11px;color:#A8A69E;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Proyecto</span>';
      h += '<select onchange="tabProy=this.value;renderTablero()" style="width:auto"><option value="">Todos</option>'
        + proyOper.map(p=>'<option value="'+p.id+'" '+(p.id===tabProy?'selected':'')+'>'+p.nombre+'</option>').join('') + '</select>';
      h += botonesExport("costos-print","tablero");
      h += '</div>';

      h += '<div id="costos-print">';
      if(!filas.length){
        h += '<p style="font-size:13px;color:#A8A69E;padding:10px 2px">No hay ejecución real de personal directo en este período. Probá con otro corte o período, o esperá a que se registren jornadas.</p></div>';
        contenido.innerHTML = h; return;
      }

      // ---- KPIs ----
      const kpiCalcs = []; // recolecta (label, fórmula) para el colapsable único
      const kpi = (lab,val,sub,col,calc)=> {
        if(calc) kpiCalcs.push('<b>'+lab+':</b> '+calc);
        return '<div style="flex:1;min-width:150px;background:#fff;border:1px solid #E6E4DC;border-radius:12px;padding:13px 15px">'
        + '<div style="font-size:10.5px;color:#A8A69E;text-transform:uppercase;letter-spacing:.04em;font-weight:600">'+lab+'</div>'
        + '<div style="font-size:21px;font-weight:680;color:'+(col||'#2C2C2A')+';margin-top:4px">'+val+'</div>'
        + (sub?'<div style="font-size:11px;color:#A8A69E;margin-top:3px">'+sub+'</div>':'')
        + '</div>';
      };
      const colDesv = desvPlan>0 ? '#A32D2D' : (desvPlan<0 ? '#3B6D11' : '#2C2C2A');
      h += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px">';

      h += kpi('Desvío vs plan', fmtSigno(desvPlan), (desvPct>=0?'+':'')+desvPct.toFixed(1)+'% sobre plan', colDesv, 'Costo real − costo plan. El plan es horas_plan × valor-hora congelado de cada jornada. Positivo = sobrecosto.');
      h += kpi('Jornales', jornales.toFixed(1).replace('.',','), 'plan: '+jornalesPlan.toFixed(1).replace('.',','), '#2C2C2A', 'Suma de horas normales trabajadas ÷ 8. Una jornada de 8 h = 1; media jornada = 0,5. Solo directos.');
      h += kpi('Ausentismo', ausentismo.toFixed(1).replace('.',',')+'%', ausencias+' ausencia'+(ausencias===1?'':'s')+(costoImproductivo>0?' · '+fmtM(costoImproductivo)+' pagados':''), (ausentismo>0?'#A32D2D':'#2C2C2A'), 'Jornadas ausentes ÷ jornadas programadas. El personal directo es mensualizado: cada ausencia se paga igual (valor-hora × horas planificadas) pero no produce — es costo improductivo, mostrado aparte.');
      h += kpi('% horas extra', pctExtra.toFixed(1).replace('.',',')+'%', hsExtra.toFixed(0)+' h · '+fmtM(extraCosto), (pctExtra>5?'#A32D2D':'#2C2C2A'), 'Costo de horas extra ÷ costo real total. Señala sobrecarga o desvío de planificación.');
      h += '</div>';
      h += bloqueComoSeCalcula('tablero-kpis', kpiCalcs.join('<br>'));

      // ---- EVOLUCIÓN: costo real vs plan por período (últimos ~8) ----
      const periodosAsc = periodos.slice().reverse(); // de más antiguo a más reciente
      const ultimos = periodosAsc.slice(-8);
      const serie = ultimos.map(clave=>{
        const fp = base.filter(f=>tabClavePeriodo(f.fecha,tabCorte)===clave);
        const a = tabCostoDeFilas(fp);
        return { clave, real:a.costoReal, plan:a.costoPlan, desv:a.desvPlan };
      });
      const maxVal = Math.max(1, ...serie.map(s=>Math.max(s.real,s.plan)));

      // narrativa explicada

    // ---- Disparador: traslado de presupuesto a Compras (fase 3) ----
    // No hay forma de detectar el swap de forma at\u00f3mica: son dos clicks separados
    // (sacar el directo, agregar el contratista), en cualquier orden. Se guarda en
    // memoria (no persiste, se pierde al recargar) cu\u00e1l fue la \u00faltima baja de directo
    // y la \u00faltima alta de contratista por bloque, y se dispara apenas se completan
    // las dos puntas dentro de la ventana de tiempo. Es solo un gatillo de UI: si no
    // llega a dispararse, no rompe nada, el traslado se puede evaluar m\u00e1s adelante.
    let ultimoDirectoSacado = {};       // bloqueId -> { personaId, horas, ts }
    let ultimoContratistaAgregado = {}; // bloqueId -> { personaId, ts }
    const TRASLADO_TRIGGER_TTL_MS = 5 * 60 * 1000; // 5 minutos: m\u00e1s viejo que eso, se ignora

    async function toggleGente(planiId, personaId, estaba) {
      const persona = personas.find(x => x.id === personaId);
      const horasPrevias = (planiHoras[planiId] && planiHoras[planiId][personaId] != null) ? planiHoras[planiId][personaId] : 8;
      if (estaba) { const { error } = await sb.from("planificacion_personal").delete().eq("planificacion_id", planiId).eq("persona_id", personaId); if (error) return setEstado("Error: " + error.message, "err"); }
      else { const { error } = await sb.from("planificacion_personal").insert({ planificacion_id: planiId, persona_id: personaId, horas: 8 }); if (error) return setEstado("Error: " + error.message, "err"); }
      if (!planiPers[planiId]) { planiPers[planiId] = []; planiHoras[planiId] = {}; }
      if (estaba) { planiPers[planiId] = planiPers[planiId].filter(x => x !== personaId); delete planiHoras[planiId][personaId]; }
      else { planiPers[planiId].push(personaId); if(!planiHoras[planiId]) planiHoras[planiId]={}; planiHoras[planiId][personaId] = 8; }
      setEstado("\u2713 Guardado.", "ok"); renderPlani();

      if (persona && persona.tipo === "Directo" && estaba) {
        ultimoDirectoSacado[planiId] = { personaId, horas: horasPrevias, ts: Date.now() };
        const pend = ultimoContratistaAgregado[planiId];
        if (pend && (Date.now() - pend.ts) <= TRASLADO_TRIGGER_TTL_MS) await evaluarDisparadorTraslado(planiId, personaId, horasPrevias, pend.personaId);
      } else if (persona && persona.tipo === "Contratista" && !estaba) {
        ultimoContratistaAgregado[planiId] = { personaId, ts: Date.now() };
        const pend = ultimoDirectoSacado[planiId];
        if (pend && (Date.now() - pend.ts) <= TRASLADO_TRIGGER_TTL_MS) await evaluarDisparadorTraslado(planiId, pend.personaId, pend.horas, personaId);
      }
    }
    // Calcula el monto (jornales futuros del directo en ese bloque \u00d7 su valor-hora vigente),
    // pide confirmaci\u00f3n y, si se acepta, registra el traslado. "Futuro" = desde hoy inclusive
    // (el pasado ya est\u00e1 congelado). No toca l\u00ednea base ni costo real.
    async function evaluarDisparadorTraslado(bloqueId, personaDirectoId, horas, personaContratistaId) {
      delete ultimoDirectoSacado[bloqueId]; delete ultimoContratistaAgregado[bloqueId];
      const b = plani.find(x => x.id === bloqueId);
      if (!b) return;
      const dias = diasHabiles(b.fecha_desde, b.fecha_hasta).filter(f => f >= hoyISO());
      if (!dias.length) return;
      const horasFuturas = dias.length * (Number(horas) || 8);
      const jornales = horasFuturas / 8;
      const valorHora = costoHora(personaDirectoId, hoyISO());
      const monto = horasFuturas * valorHora;
      if (monto <= 0) return;
      const proy = proyectos.find(p => p.id === b.proyecto_id);
      const msg = "Se trasladar\u00edan " + fmtMTraslados(monto) + ", " + jornales.toFixed(1).replace(".", ",") + " jornal(es) de " + nombrePersona(personaDirectoId) + ".\n\nProyecto: " + (proy ? proy.nombre : "\u2014") + " \u00b7 Contratista: " + nombrePersona(personaContratistaId) + "\n\n\u00bfConfirm\u00e1s el traslado a Compras?";
      if (!confirm(msg)) { setEstado("Traslado no registrado.", "cargando"); return; }
      const { error } = await sb.from("traslados_compras").insert({
        proyecto_id: b.proyecto_id, bloque_id: bloqueId,
        persona_directo_id: personaDirectoId, persona_contratista_id: personaContratistaId,
        jornales, horas_por_jornal: 8, valor_hora: valorHora, monto,
        fecha_desde: dias[0], fecha_hasta: dias[dias.length - 1],
        estado: "pendiente_aviso", creado_por: miEmail
      });
      if (error) return setEstado("Error al registrar el traslado: " + error.message, "err");
      setEstado("\u2713 Traslado de " + fmtMTraslados(monto) + " registrado a Compras.", "ok");
    }
    // suma de horas de una persona en un día dado, entre las estaciones cuyo rango incluye ese día.
    // La supervisión vive en su propia tabla y corre en paralelo, así que no entra en esta suma.
    function horasPersonaDia(personaId, fecha, exceptoPlaniId) {
      let tot = 0;
      plani.forEach(b => {
        if (b.id === exceptoPlaniId) return;
        if (!(planiPers[b.id]||[]).includes(personaId)) return;
        if (!diasHabiles(b.fecha_desde, b.fecha_hasta).includes(fecha)) return;
        tot += (planiHoras[b.id] && planiHoras[b.id][personaId] != null) ? planiHoras[b.id][personaId] : 8;
      });
      return tot;
    }
    async function editarHoras(planiId, personaId, horas) {
      // guardar siempre; avisar (sin bloquear) si algún día supera 8h entre estaciones
      const { error } = await sb.from("planificacion_personal").update({ horas }).eq("planificacion_id", planiId).eq("persona_id", personaId);
      if (error) return setEstado("Error: " + error.message, "err");
      if (!planiHoras[planiId]) planiHoras[planiId] = {}; planiHoras[planiId][personaId] = horas;
      // chequear si ahora hay algún día con más de 8h
      const b = plani.find(x => x.id === planiId);
      const dias = diasHabiles(b.fecha_desde, b.fecha_hasta);
      let aviso = null;
      for (const d of dias) { const tot = horasPersonaDia(personaId, d, null); if (tot > 8) { aviso = dm(d) + " (" + tot + "h)"; break; } }
      if (aviso) setEstado("\u26a0 " + nombrePersona(personaId) + " queda con más de 8h el " + aviso + ". Ajustá el reparto antes de generar el detalle.", "err");
      else setEstado("\u2713 Guardado.", "ok");
      renderPlani();
    }

      cargar();
    }
    function puedeVerSueldos() { return miPerfil.rol === "admin" || miPerfil.rol === "pm" ? (miPerfil.ve_sueldos !== false) : (miPerfil.ve_sueldos === true); }
    function esAdmin() { return miPerfil.rol === "admin"; }
    // Registra una acción en el log de actividad. No bloquea ni interrumpe si falla
    // (el log es auxiliar; un error acá nunca debe frenar la operación real del usuario).
    async function registrarLog(accion, entidad, detalle){
      try {
        await sb.from("actividad_log").insert({
          sede: SEDE, usuario_id: miUserId || null, usuario_email: miEmail || null,
          accion: accion, entidad: entidad, detalle: (detalle||"").slice(0,500)
        });
      } catch(e){ /* silencioso: el log no debe interferir con la operación */ }
    }
    function aplicarPermisos() {
      // La visibilidad de la solapa Personal (sueldos) la maneja renderTabs() según permisos.
      // mostrar rol en la barra
      const ue = document.getElementById("userEmail");
      if (ue && miPerfil.rol) ue.textContent = ue.textContent + " · " + miPerfil.rol;
    }
    async function initAuth() {
      const { data } = await sb.auth.getSession();
      if (data.session) mostrarApp(data.session.user);
      else { document.getElementById("login").style.display = "flex"; document.getElementById("app").style.display = "none"; }
    }
    window.__supaReady.then(function(){
      if (typeof supabase === "undefined" || !supabase || !supabase.createClient) {
        document.getElementById("loginError").textContent = "No se pudo cargar la librería. Revisá tu conexión y recargá.";
        document.getElementById("loginError").style.display = "block";
        return;
      }
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      initAuth();
    });
  </script>
</body>
</html>
