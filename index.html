  <script>
    // Respaldo: si el CDN principal no cargó la librería, la traemos de otro y avisamos cuando esté lista.
    window.__supaReady = (function(){
      function cargado(){ return (typeof supabase !== "undefined" && supabase && supabase.createClient); }
      return new Promise(function(resolve){
        if (cargado()) { resolve(); return; }
        var s = document.createElement("script");
        s.src = "https://unpkg.com/@supabase/supabase-js@2";
        s.onload = function(){ resolve(); };
        s.onerror = function(){ resolve(); };
        document.head.appendChild(s);
        // chequeo por las dudas a los 300ms
        setTimeout(function(){ if (cargado()) resolve(); }, 300);
      });
    })();
  </script>

    async function asegurarBase() {
      if (!personas.length) { const { data } = await sb.from("personal").select("*"); personas = (data||[]).sort((a,b)=>{if(a.tipo!==b.tipo)return a.tipo==="Directo"?-1:1;return (parseInt(a.legajo)||9999)-(parseInt(b.legajo)||9999);}); }

    /* ---- PLANIFICACIÓN ---- */
    function diasHabiles(a,b){const o=[];if(!a||!b)return o;let d=new Date(a+"T12:00:00");const e=new Date(b+"T12:00:00");while(d<=e){const w=d.getDay();if(w!==0&&w!==6)o.push(fechaStr(d));d=new Date(d.getTime()+86400000);}return o;}

    function noDispoEn(personaId, fecha) { return dispo.some(n => n.persona_id === personaId && fecha >= n.desde && fecha <= n.hasta); }
    function tipoNoDispoEn(personaId, fecha) { const n = dispo.find(x => x.persona_id === personaId && fecha >= x.desde && fecha <= x.hasta); return n ? n.tipo : null; }

    function validarCobertura() {
      // rango total de fechas planificadas
      const todas = [];
      plani.forEach(b => diasHabiles(b.fecha_desde, b.fecha_hasta).forEach(d => todas.push(d)));
      const fechas = [...new Set(todas)].sort();
      // carga por persona/día (cada bloque modo nombre asigna jornada completa)
      const carga = {};
      plani.forEach(b => { (planiPers[b.id]||[]).forEach(g => { const hrs = (planiHoras[b.id] && planiHoras[b.id][g]!=null) ? planiHoras[b.id][g] : 8; diasHabiles(b.fecha_desde, b.fecha_hasta).forEach(d => { const k = g+"|"+d; carga[k] = (carga[k]||0) + hrs; }); }); });
      const directos = personas.filter(p => p.tipo !== "Contratista");
      const faltantes = [], excesos = [];
      fechas.forEach(d => {
        directos.forEach(p => {
          if (noDispoEn(p.id, d)) return;
          const h = carga[p.id+"|"+d] || 0;
          if (h < 8) faltantes.push(nombrePersona(p.id) + " · " + d.slice(5));
          else if (h > 8) excesos.push(nombrePersona(p.id) + " · " + d.slice(5));
        });
      });
      return { fechas, faltantes: [...new Set(faltantes)], excesos: [...new Set(excesos)], ok: faltantes.length===0 && excesos.length===0 && fechas.length>0 };
    }

    async function generarDetalle() {
      const val = validarCobertura();
      if (!val.ok) { setEstado("Todavía hay días sin cubrir.", "err"); return; }
      const hoy = fechaStr(new Date());

      if (eEx) return setEstado("Error: " + eEx.message, "err");
      // ¿hay algo cargado (real) en días futuros (>= hoy)?
      const futConDatos = (existente||[]).filter(d => d.fecha >= hoy && (d.ausente || d.horas_extra > 0 || d.estacion_real !== d.estacion_plan || d.persona_real !== d.persona_plan));
      if (futConDatos.length > 0) {

      let h='<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">';
      h+='<div style="display:flex;border:1px solid #E6E4DC;border-radius:8px;overflow:hidden"><button onclick="setVista(\'pm\')" style="border:none;padding:7px 16px;font-size:13px;cursor:pointer;background:'+(vistaDash==='pm'?'#185FA5':'transparent')+';color:'+(vistaDash==='pm'?'#fff':'#888780')+'">Vista PM</button><button onclick="setVista(\'coord\')" style="border:none;padding:7px 16px;font-size:13px;cursor:pointer;background:'+(vistaDash==='coord'?'#185FA5':'transparent')+';color:'+(vistaDash==='coord'?'#fff':'#888780')+'">Vista Coordinador</button></div>';
      h+='<select onchange="setDashProy(this.value)" style="width:auto"><option value="">Todos los vigentes</option>'+proyVig.map(p=>'<option value="'+p.id+'" '+(p.id===dashProy?'selected':'')+'>'+p.nombre+'</option>').join('')+(proyectos.filter(p=>p.estado==='Cerrado').length?('<optgroup label="Cerrados">'+proyectos.filter(p=>p.estado==='Cerrado').map(p=>'<option value="'+p.id+'" '+(p.id===dashProy?'selected':'')+'>'+p.nombre+' (cerrado)</option>').join('')+'</optgroup>'):'')+'</select></div>';
      if(det.length===0){ h+='<p style="font-size:13px;color:#888780">Sin datos en el detalle todavía. Generá el detalle diario para ver indicadores.</p>'; contenido.innerHTML=h; return; }
      if(vistaDash==='pm'){
        const usoPct = presup ? (real/presup*100) : 0;
        h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">'
          + card("Costo real acumulado","$"+Math.round(real).toLocaleString("es-AR"),null)
          + card("Uso del presupuesto MO", presup?usoPct.toFixed(0)+"%":"s/presup", "$"+Math.round(real).toLocaleString("es-AR")+" de $"+Math.round(presup).toLocaleString("es-AR"), usoPct>100?'#A32D2D':usoPct>85?'#BA7517':'#3B6D11')
          + card("Horas extra", hsExtra+" h", null, hsExtra>0?'#BA7517':null)
          + card("Ausencias", ausencias, "jornadas no trabajadas", ausencias>0?'#A32D2D':'#3B6D11')
          + '</div>';
      } else {
        h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">'
          + card("Costo real acumulado","$"+Math.round(real).toLocaleString("es-AR"),"jornales + extra")
          + card("Horas extra", hsExtra+" h", "$"+Math.round(extra).toLocaleString("es-AR")+" en extra", hsExtra>0?'#BA7517':null)
          + card("Ausencias", ausencias, "jornadas no trabajadas", ausencias>0?'#A32D2D':'#3B6D11')
          + card("Personal utilizado", usados.size+"/"+personas.filter(p=>p.tipo!=='Contratista').length, "asignados / plantel")
          + '</div>';
        // agenda
        const ag=(titulo,fch,lista)=>{ let x='<div style="flex:1;min-width:260px;background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px"><div style="font-size:13px;font-weight:600;margin-bottom:8px">'+titulo+(fch?' ('+fch.slice(8)+'/'+fch.slice(5,7)+')':'')+'</div>'; if(!lista.length)x+='<div style="font-size:12.5px;color:#A8A69E">Sin tareas.</div>'; lista.forEach((t,i)=>{x+='<div style="padding:6px 0;border-top:'+(i?'1px solid #F1EFE8':'none')+';font-size:12.5px"><span style="background:'+STATIONS[t.est].bg+';color:'+STATIONS[t.est].color+';padding:2px 6px;border-radius:6px;font-size:10.5px">'+STATIONS[t.est].label+'</span> <span style="color:#888780">'+t.sub+'</span><div style="font-size:11px;color:#A8A69E;margin-top:2px">'+t.g.join(", ")+'</div></div>';}); return x+'</div>'; };
        h+='<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">'+ag("📋 Tareas de hoy",diaHoy,tareasDe(diaHoy))+ag("⏭️ Preparar para mañana",diaMan,tareasDe(diaMan))+'</div>';
      }
      // gráfico de barras costo por estación (común a ambas vistas)
      h+='<div style="background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px"><div style="font-size:13px;font-weight:600;margin-bottom:12px">Costo real por estación</div>';
      if(!estArr.length) h+='<div style="font-size:12.5px;color:#A8A69E">Sin datos.</div>';
      estArr.forEach(([k,v])=>{ const pct=v.real/maxEst*100; h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px"><span style="width:150px;color:#5F5E5A">'+nombreEstacion(k)+'</span><div style="flex:1;background:#F1EFE8;border-radius:4px;height:18px;position:relative"><div style="width:'+pct+'%;background:'+STATIONS[k].color+';height:100%;border-radius:4px"></div></div><span style="width:90px;text-align:right">$'+Math.round(v.real).toLocaleString("es-AR")+'</span></div>'; });
      h+='</div>';
      contenido.innerHTML=h;
    }
    function setVista(v){ vistaDash=v; renderDash(); }
    function setDashProy(v){ dashProy=v; renderDash(); }

    /* ---- GANTT ---- */
    function renderGantt() {
      if(!plani.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay planificación cargada.</p>'; return; }
      // rango de fechas total
      const todas=[]; plani.forEach(b=>{ diasHabiles(b.fecha_desde,b.fecha_hasta).forEach(d=>todas.push(d)); if(b.fecha_real_desde&&b.fecha_real_hasta)diasHabiles(b.fecha_real_desde,b.fecha_real_hasta).forEach(d=>todas.push(d)); });
      const fechas=[...new Set(todas)].sort();
      if(!fechas.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">Las estaciones no tienen fechas cargadas.</p>'; return; }
      let h='<p style="font-size:13px;color:#888780;margin-top:0">Barra clara: planificado. Barra sólida: real (de las fechas reales del detalle).</p><div style="overflow-x:auto"><table style="min-width:'+(200+fechas.length*42)+'px;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8">Estación</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:40px">'+d.slice(8)+'/'+d.slice(5,7)+'</th>');
      h+='</tr></thead><tbody>';
      plani.forEach(b=>{ const st=STATIONS[b.estacion]; if(!st)return; const dP=diasHabiles(b.fecha_desde,b.fecha_hasta); const dR=(b.fecha_real_desde&&b.fecha_real_hasta)?diasHabiles(b.fecha_real_desde,b.fecha_real_hasta):[];
        h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap">'+st.label+'<div style="font-size:9.5px;color:#A8A69E">'+(b.subtarea||'')+'</div></td>';
        fechas.forEach(d=>{ const oP=dP.includes(d), oR=dR.includes(d); h+='<td style="padding:3px 2px;vertical-align:middle">'+(oP?'<div style="background:#C9C6BC;height:8px;border-radius:2px;margin-bottom:2px"></div>':'')+(oR?'<div style="background:'+st.color+';height:8px;border-radius:2px"></div>':'')+'</td>'; });
        h+='</tr>';
      });
      h+='</tbody></table></div>';
      contenido.innerHTML=h;
    }

    /* ---- HISTOGRAMA ---- */
    function renderHisto() {
      if(!detalle.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay detalle generado.</p>'; return; }
      const fechas=[...new Set(detalle.map(f=>f.fecha))].sort();
      const pers=[...new Set(detalle.map(f=>f.persona_real))];
      const cell={}; detalle.forEach(f=>{ cell[f.persona_real+"|"+f.fecha]= f.ausente?"__aus":f.estacion_real; });
      let h='<p style="font-size:13px;color:#888780;margin-top:0">Personas en filas, días en columnas, color por estación.</p><div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px;min-width:'+(160+fechas.length*52)+'px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8">Persona</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:50px">'+d.slice(8)+'/'+d.slice(5,7)+'</th>');
      h+='</tr></thead><tbody>';
      pers.forEach(pid=>{ h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap">'+nombrePersona(pid)+'</td>';
        fechas.forEach(d=>{ const t=cell[pid+"|"+d]; let c='<span style="color:#D3D1C7">—</span>'; if(t==="__aus")c='<span style="display:inline-block;width:100%;background:#FCEBEB;color:#A32D2D;border-radius:5px;padding:3px 0;font-size:9px">Ausente</span>'; else if(t&&STATIONS[t])c='<span style="display:inline-block;width:100%;background:'+STATIONS[t].bg+';color:'+STATIONS[t].color+';border-radius:5px;padding:3px 1px;font-size:8.5px">'+STATIONS[t].label.slice(0,8)+'</span>'; h+='<td style="padding:4px;text-align:center">'+c+'</td>'; });
        h+='</tr>';
      });
      h+='</tbody></table></div>';
      contenido.innerHTML=h;
    }

    /* ---- PARTE DIARIO ---- */
    let parteFecha="", parteProy="", parteEst="", partePersona="";
    function renderParte() {
      const fechas=[...new Set(detalle.map(f=>f.fecha))].sort();
      const fSel = parteFecha || fechas[0] || "";
      let rows = detalle.filter(f=>f.fecha===fSel && !f.ausente);
      if(parteProy) rows=rows.filter(f=>f.proyecto_id===parteProy);
      if(parteEst) rows=rows.filter(f=>f.estacion_real===parteEst);
      if(partePersona) rows=rows.filter(f=>f.persona_real===partePersona);
      const proyNom = parteProy ? nombreProy(parteProy) : "Todos los proyectos";
      const texto = "*Parte diario "+(fSel?fSel.split("-").reverse().join("/"):"")+"*\n"+proyNom+"\n\n"+rows.map(f=>"• "+nombrePersona(f.persona_real)+" → "+nombreEstacion(f.estacion_real)+": "+f.subtarea_real+(f.horas_extra>0?" (+"+f.horas_extra+"h extra)":"")).join("\n");
      let h='<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px">';
      h+='<label style="font-size:11.5px;color:#888780">Fecha<br><select onchange="setParte(\'fecha\',this.value)" style="margin-top:3px">'+(fechas.length?fechas.map(d=>'<option value="'+d+'" '+(d===fSel?'selected':'')+'>'+d.split("-").reverse().join("/")+'</option>').join(''):'<option>—</option>')+'</select></label>';
      h+='<label style="font-size:11.5px;color:#888780">Proyecto<br><select onchange="setParte(\'proy\',this.value)" style="margin-top:3px"><option value="">Todos</option>'+proyectos.map(p=>'<option value="'+p.id+'" '+(p.id===parteProy?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>';
      h+='<label style="font-size:11.5px;color:#888780">Estación<br><select onchange="setParte(\'est\',this.value)" style="margin-top:3px"><option value="">Todas</option>'+STKEYS.map(k=>'<option value="'+k+'" '+(k===parteEst?'selected':'')+'>'+STATIONS[k].label+'</option>').join('')+'</select></label>';
      h+='<label style="font-size:11.5px;color:#888780">Persona<br><select onchange="setParte(\'pers\',this.value)" style="margin-top:3px"><option value="">Todas</option>'+personas.map(p=>'<option value="'+p.id+'" '+(p.id===partePersona?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>';
      h+='<button class="btn" style="background:#25D366;color:#fff" onclick="copiarParte()">Copiar para WhatsApp</button>';
      h+='</div>';
      h+='<div id="parteBox" style="border:1px solid #E6E4DC;border-radius:12px;padding:18px 20px;max-width:480px"><div style="font-size:16px;font-weight:600">Parte diario '+(fSel?fSel.split("-").reverse().join("/"):"")+'</div><div style="font-size:12.5px;color:#888780;margin-bottom:6px">'+proyNom+(parteEst?' · '+STATIONS[parteEst].label:'')+(partePersona?' · '+nombrePersona(partePersona):'')+'</div><div style="border-top:1px solid #F1EFE8;margin-top:6px;padding-top:6px">';
      if(!rows.length) h+='<div style="font-size:13px;color:#A8A69E;padding:8px 0">'+(detalle.length?'Sin asignaciones para este filtro.':'Generá el detalle diario primero.')+'</div>';
      rows.forEach(f=>{ h+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #F1EFE8;font-size:13px"><span style="font-weight:600;min-width:140px">'+nombrePersona(f.persona_real)+'</span><span><span style="background:'+STATIONS[f.estacion_real].bg+';color:'+STATIONS[f.estacion_real].color+';padding:2px 6px;border-radius:6px;font-size:10.5px">'+nombreEstacion(f.estacion_real)+'</span> <span style="color:#888780">'+f.subtarea_real+'</span>'+(f.horas_extra>0?' <span style="color:#BA7517;font-size:11px">+'+f.horas_extra+'h</span>':'')+'</span></div>'; });
      h+='</div></div>';
      h+='<textarea id="parteTexto" style="position:absolute;left:-9999px">'+texto+'</textarea>';
      contenido.innerHTML=h;
    }
    function setParte(campo,val){ if(campo==='fecha')parteFecha=val; else if(campo==='proy')parteProy=val; else if(campo==='est')parteEst=val; else if(campo==='pers')partePersona=val; renderParte(); }
    function copiarParte(){ const t=document.getElementById("parteTexto"); t.select(); try{ navigator.clipboard.writeText(t.value); setEstado("\u2713 Parte copiado. Pegalo en WhatsApp.","ok"); }catch(e){ document.execCommand("copy"); setEstado("\u2713 Parte copiado.","ok"); } }
    async function toggleGente(planiId, personaId, estaba) {
      if (estaba) { const { error } = await sb.from("planificacion_personal").delete().eq("planificacion_id", planiId).eq("persona_id", personaId); if (error) return setEstado("Error: " + error.message, "err"); }
      else { const { error } = await sb.from("planificacion_personal").insert({ planificacion_id: planiId, persona_id: personaId, horas: 8 }); if (error) return setEstado("Error: " + error.message, "err"); }
      if (!planiPers[planiId]) { planiPers[planiId] = []; planiHoras[planiId] = {}; }
      if (estaba) { planiPers[planiId] = planiPers[planiId].filter(x => x !== personaId); delete planiHoras[planiId][personaId]; }
      else { planiPers[planiId].push(personaId); if(!planiHoras[planiId]) planiHoras[planiId]={}; planiHoras[planiId][personaId] = 8; }
      setEstado("\u2713 Guardado.", "ok"); renderPlani();
    }
    // suma de horas de una persona en un día dado, entre todas las estaciones cuyo rango incluye ese día
    function horasPersonaDia(personaId, fecha, exceptoPlaniId) {
      let tot = 0;
      plani.forEach(b => {
        if (b.id === exceptoPlaniId) return;
        if (!(planiPers[b.id]||[]).includes(personaId)) return;
        if (!diasHabiles(b.fecha_desde, b.fecha_hasta).includes(fecha)) return;
        tot += (planiHoras[b.id] && planiHoras[b.id][personaId] != null) ? planiHoras[b.id][personaId] : 8;
      });
      return tot;
    }
    async function editarHoras(planiId, personaId, horas) {
      // guardar siempre; avisar (sin bloquear) si algún día supera 8h entre estaciones
      const { error } = await sb.from("planificacion_personal").update({ horas }).eq("planificacion_id", planiId).eq("persona_id", personaId);
      if (error) return setEstado("Error: " + error.message, "err");
      if (!planiHoras[planiId]) planiHoras[planiId] = {}; planiHoras[planiId][personaId] = horas;
      // chequear si ahora hay algún día con más de 8h
      const b = plani.find(x => x.id === planiId);
      const dias = diasHabiles(b.fecha_desde, b.fecha_hasta);
      let aviso = null;
      for (const d of dias) { const tot = horasPersonaDia(personaId, d, null); if (tot > 8) { aviso = d.slice(5) + " (" + tot + "h)"; break; } }
      if (aviso) setEstado("\u26a0 " + nombrePersona(personaId) + " queda con más de 8h el " + aviso + ". Ajustá el reparto antes de generar el detalle.", "err");
      else setEstado("\u2713 Guardado.", "ok");
      renderPlani();
    }

    async function hacerLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPass").value;
      const errDiv = document.getElementById("loginError");
      errDiv.style.display = "none";
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { errDiv.textContent = "Email o contraseña incorrectos."; errDiv.style.display = "block"; return; }
      mostrarApp(data.user);
    }
    async function cerrarSesion() { await sb.auth.signOut(); document.getElementById("app").style.display = "none"; document.getElementById("login").style.display = "flex"; }
    let miPerfil = { rol: "coordinador", ve_sueldos: false };
    async function mostrarApp(user) {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("userEmail").textContent = user.email;
      // leer perfil (rol y permisos)
      const { data: perf } = await sb.from("perfiles").select("*").eq("id", user.id).maybeSingle();
      miPerfil = perf || { rol: "coordinador", ve_sueldos: false };
      aplicarPermisos();
      // tab inicial: si no ve sueldos y estaba en personal, mandarlo a proyectos
      if (tab === "personal" && !puedeVerSueldos()) tab = "plani";
      cargar();
    }
    function puedeVerSueldos() { return miPerfil.rol === "admin" || miPerfil.rol === "pm" ? (miPerfil.ve_sueldos !== false) : (miPerfil.ve_sueldos === true); }
    function esAdmin() { return miPerfil.rol === "admin"; }
    function aplicarPermisos() {
      // Solapa Personal (sueldos): solo si ve_sueldos
      const tp = document.getElementById("tab-personal");
      if (tp) tp.style.display = puedeVerSueldos() ? "" : "none";
      // Solapa Proyectos: PM y admin la editan; coordinador la ve. (visible para todos por ahora)
      // mostrar rol en la barra
      const ue = document.getElementById("userEmail");
      if (ue && miPerfil.rol) ue.textContent = ue.textContent + " · " + miPerfil.rol;
    }
    async function initAuth() {
      const { data } = await sb.auth.getSession();
      if (data.session) mostrarApp(data.session.user);
      else { document.getElementById("login").style.display = "flex"; document.getElementById("app").style.display = "none"; }
    }
    window.__supaReady.then(function(){
      if (typeof supabase === "undefined" || !supabase || !supabase.createClient) {
        document.getElementById("loginError").textContent = "No se pudo cargar la librería. Revisá tu conexión y recargá.";
        document.getElementById("loginError").style.display = "block";
        return;
      }
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      initAuth();
    });
  </script>
</body>
</html>
