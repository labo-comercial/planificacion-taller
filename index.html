  <meta name="theme-color" content="#2F372A">
  <title>Planificación Mano de Obra</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Respaldo: si el CDN principal no cargó la librería, la traemos de otro y avisamos cuando esté lista.
    window.__supaReady = (function(){
      function cargado(){ return (typeof supabase !== "undefined" && supabase && supabase.createClient); }
      return new Promise(function(resolve){
        if (cargado()) { resolve(); return; }
        var s = document.createElement("script");
        s.src = "https://unpkg.com/@supabase/supabase-js@2";
        s.onload = function(){ resolve(); };
        s.onerror = function(){ resolve(); };
        document.head.appendChild(s);
        // chequeo por las dudas a los 300ms
        setTimeout(function(){ if (cargado()) resolve(); }, 300);
      });
    })();
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F7F6F2; color: #2C2C2A; margin: 0; padding: 24px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 2px; }
    .sub { font-size: 13px; color: #888780; margin: 0 0 16px; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid #E6E4DC; overflow-x: auto; }
    .tab { background: var(--c, transparent); opacity: 0.55; border: 1px solid transparent; border-bottom: none; border-radius: 10px 10px 0 0; padding: 9px 15px; font-size: 13.5px; color: #5F5E5A; cursor: pointer; margin-bottom: -1px; white-space: nowrap; transition: opacity .15s; }
    .tab:hover { opacity: 0.8; }
    .tab.active { background: var(--c, #fff); opacity: 1; border-color: #E6E4DC; border-bottom-color: var(--c, #fff); color: #2C2C2A; font-weight: 600; }
    .panel { background: #fff; border: 1px solid #E6E4DC; border-top: none; border-radius: 0 0 14px 14px; padding: 18px; }
    .estado { font-size: 12.5px; padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; }
    .ok { background: #E1F5EE; color: #0F6E56; } .err { background: #FCEBEB; color: #A32D2D; } .cargando { background: #F1EFE8; color: #5F5E5A; }
    table { width: 100%; border-collapse: collapse; border: 1px solid #E6E4DC; border-radius: 12px; overflow: hidden; font-size: 13px; }
    thead tr { background: #F1EFE8; }
    th { text-align: left; padding: 9px 12px; font-weight: 600; color: #5F5E5A; font-size: 12px; }
    td { padding: 6px 10px; border-top: 1px solid #F1EFE8; }
    input, select { border: 1px solid #E6E4DC; border-radius: 6px; padding: 5px 7px; font-size: 12.5px; width: 100%; }
    .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #185FA5; color: #fff; }
    .btn-add { background: transparent; border: 1px dashed #E6E4DC; color: #185FA5; padding: 8px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; }
    .btn-del { border: none; background: transparent; color: #A8A69E; cursor: pointer; font-size: 16px; }
    .row-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    .card { border: 1px solid #E6E4DC; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .lbl { font-size: 11.5px; color: #888780; } .lbl input, .lbl select { margin-top: 3px; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .chip { border: 1px solid #E6E4DC; background: #fff; color: #888780; border-radius: 16px; padding: 4px 10px; font-size: 11.5px; cursor: pointer; }
    .chip.on { border-color: #185FA5; background: #E6F1FB; color: #185FA5; }
    .estpill { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .pl-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    #login { position: fixed; inset: 0; background: #F7F6F2; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: #fff; border: 1px solid #E6E4DC; border-radius: 16px; padding: 32px 28px; max-width: 360px; width: 100%; text-align: center; }
    .login-card input { margin: 6px 0; padding: 10px 12px; font-size: 14px; }
    #app { display: none; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    @media print { .no-print { display: none !important; } body { background: #fff; padding: 0; } .tabs { display: none !important; } .topbar button { display: none; } }
  </style>

    /* ---- PLANIFICACIÓN ---- */
    function esFeriado(f){ return feriados.some(h => h.fecha === f && !h.se_trabaja); }
    function diasHabiles(a,b){const o=[];if(!a||!b)return o;let d=new Date(a+"T12:00:00");const e=new Date(b+"T12:00:00");while(d<=e){const w=d.getDay();const f=fechaStr(d);if(w!==0&&w!==6&&!esFeriado(f))o.push(f);d=new Date(d.getTime()+86400000);}return o;}

    function noDispoEn(personaId, fecha) { return dispo.some(n => n.persona_id === personaId && fecha >= n.desde && fecha <= n.hasta); }
    function tipoNoDispoEn(personaId, fecha) { const n = dispo.find(x => x.persona_id === personaId && fecha >= x.desde && fecha <= x.hasta); return n ? n.tipo : null; }

    function validarCobertura() {
      // rango total de fechas planificadas
      const todas = [];
      plani.forEach(b => diasHabiles(b.fecha_desde, b.fecha_hasta).forEach(d => todas.push(d)));
      const fechas = [...new Set(todas)].sort();
      // carga por persona/día (cada bloque modo nombre asigna jornada completa)
      const carga = {};
      plani.forEach(b => { (planiPers[b.id]||[]).forEach(g => { const hrs = (planiHoras[b.id] && planiHoras[b.id][g]!=null) ? planiHoras[b.id][g] : 8; diasHabiles(b.fecha_desde, b.fecha_hasta).forEach(d => { const k = g+"|"+d; carga[k] = (carga[k]||0) + hrs; }); }); });
      const directos = personas.filter(p => p.tipo !== "Contratista");
      const faltantes = [], excesos = [];
      fechas.forEach(d => {
        directos.forEach(p => {
          if (noDispoEn(p.id, d)) return;
          const h = carga[p.id+"|"+d] || 0;
          if (h < 8) faltantes.push(nombrePersona(p.id) + " · " + dm(d));
          else if (h > 8) excesos.push(nombrePersona(p.id) + " · " + dm(d));
        });
      });
      const cubierto = faltantes.length===0 && excesos.length===0 && fechas.length>0;
      return { fechas, faltantes: [...new Set(faltantes)], excesos: [...new Set(excesos)], ok: VALIDAR_COBERTURA ? cubierto : (fechas.length>0), cubiertoReal: cubierto };
    }
    function renderPlani() {

      if (!proyectos.length) h += '<div class="estado err">No hay proyectos. Creá al menos uno en la pestaña Proyectos antes de planificar.</div>';
      const val = validarCobertura();
      if (!VALIDAR_COBERTURA && plani.length > 0) {
        h += '<div class="estado cargando" style="margin-bottom:12px">🔧 <b>Modo prueba:</b> la validación de cobertura está pausada. Podés generar el detalle aunque falten personas por asignar.' + (val.faltantes.length?(' <span style="color:#A8A69E">(Sin asignar hoy: '+val.faltantes.slice(0,6).join(" · ")+(val.faltantes.length>6?"…":"")+')</span>'):'') + '</div>';

        if (val.faltantes.length) h += '<div style="margin-top:4px">Sin asignar: ' + val.faltantes.slice(0,10).join(" · ") + (val.faltantes.length>10?(" … y "+(val.faltantes.length-10)+" más"):"") + '</div>';
        if (val.excesos.length) h += '<div style="margin-top:4px">Sobreasignados (+8h): ' + val.excesos.slice(0,8).join(" · ") + '</div>';
        h += '</div>';
      } else if (plani.length > 0 && val.ok) {
        h += '<div class="estado ok" style="margin-bottom:12px">✓ Cobertura completa. Todo el personal directo disponible está asignado cada día.</div>';
      }
      plani.forEach(b => {
        const st = STATIONS[b.estacion]; if (!st) return;
        const gente = planiPers[b.id] || [];
        const subsSel = (b.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);

    async function agregarEstacion(estKey) {
      if (!proyectos.length) { setEstado("Creá un proyecto primero.", "err"); return; }

      const { error } = await sb.from("planificacion").insert({ estacion: estKey, subtarea: st.subs[0], proyecto_id: proyectos[0].id, modo: "nombre", fecha_desde: null, fecha_hasta: null });
      if (error) return setEstado("Error: " + error.message, "err"); cargar();
    }
    async function agregarEstacionDefault() {
      if (!proyectos.length) { setEstado("Creá un proyecto primero.", "err"); return; }
      const filas = STKEYS.map(k => ({ estacion: k, subtarea: STATIONS[k].subs[0], proyecto_id: proyectos[0].id, modo: "nombre" }));
      const { error } = await sb.from("planificacion").insert(filas);
      if (error) return setEstado("Error: " + error.message, "err"); cargar();
    }
    async function editarPl(id, c, v) { const u = {}; u[c] = (v === "" ? null : v); const { error } = await sb.from("planificacion").update(u).eq("id", id); if (error) return setEstado("Error: " + error.message, "err"); const b = plani.find(x=>x.id===id); if(b) b[c]=u[c]; setEstado("\u2713 Guardado.", "ok"); if(c==="fecha_desde"||c==="fecha_hasta") renderPlani(); }
    async function toggleSub(id, sub, estaba) {
      const b = plani.find(x=>x.id===id); if(!b) return;
      let subs = (b.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);
      if (estaba) subs = subs.filter(s=>s!==sub); else if(!subs.includes(sub)) subs.push(sub);
      const nuevo = subs.join(", ");
      const { error } = await sb.from("planificacion").update({ subtarea: nuevo }).eq("id", id);
      if (error) return setEstado("Error: " + error.message, "err");
      b.subtarea = nuevo; setEstado("\u2713 Guardado.", "ok"); renderPlani();
    }
    async function eliminarPl(id) { const { error } = await sb.from("planificacion").delete().eq("id", id); if (error) return setEstado("Error: " + error.message, "err"); cargar(); }
    async function generarDetalle() {
      const val = validarCobertura();
      if (!val.ok) { setEstado("Todavía hay días sin cubrir.", "err"); return; }
      const hoy = fechaStr(new Date());
      // traer detalle existente
      const { data: existente, error: eEx } = await sb.from("detalle_diario").select("*");
      if (eEx) return setEstado("Error: " + eEx.message, "err");
      // ¿hay algo cargado (real) en días futuros (>= hoy)?
      const futConDatos = (existente||[]).filter(d => d.fecha >= hoy && (d.ausente || d.horas_extra > 0 || d.estacion_real !== d.estacion_plan || d.persona_real !== d.persona_plan));
      if (futConDatos.length > 0) {
        if (!confirm("Hay " + futConDatos.length + " registro(s) ya cargados en días de hoy en adelante que se van a regenerar y perder. ¿Continuar?")) { setEstado("Generación cancelada.", "cargando"); return; }
      }
      // borrar SOLO el detalle de hoy en adelante (el pasado queda intacto)
      const { error: eDel } = await sb.from("detalle_diario").delete().gte("fecha", hoy);
      if (eDel) return setEstado("Error al limpiar futuro: " + eDel.message, "err");
      // generar filas nuevas de hoy en adelante
      const filas = [];
      plani.forEach(b => {
        const dias = diasHabiles(b.fecha_desde, b.fecha_hasta).filter(d => d >= hoy);
        const gente = planiPers[b.id] || [];
        gente.forEach(g => dias.forEach(fecha => {
          if (noDispoEn(g, fecha)) return; // no genera filas para días no disponibles
          const hrs = (planiHoras[b.id] && planiHoras[b.id][g]!=null) ? planiHoras[b.id][g] : 8;
          filas.push({ fecha, persona_plan: g, persona_real: g, proyecto_id: b.proyecto_id, estacion_plan: b.estacion, subtarea_plan: b.subtarea, estacion_real: b.estacion, subtarea_real: b.subtarea, horas_normales: hrs, horas_extra: 0, ausente: false });
        }));
      });
      if (filas.length > 0) {
        const { error: eIns } = await sb.from("detalle_diario").insert(filas);
        if (eIns) return setEstado("Error al generar: " + eIns.message, "err");
      }
      setEstado("\u2713 Detalle generado: " + filas.length + " registro(s) de hoy en adelante. El pasado quedó intacto.", "ok");
      tab = "detalle"; ["personal","proyectos","dispo","plani","detalle"].forEach(x => document.getElementById("tab-"+x).className = "tab" + (x==="detalle"?" active":""));
      cargar();
    }

      const opcPersona = (sel) => personas.map(p => '<option value="'+p.id+'" '+(p.id===sel?'selected':'')+'>'+p.nombre+'</option>').join('');

      const opcSub = (est, sel) => { const base = STATIONS[est]?STATIONS[est].subs.slice():[]; if(sel && !base.includes(sel)) base.unshift(sel); return base.map(s => '<option '+(s===sel?'selected':'')+'>'+s+'</option>').join(''); };

      h += '<div style="overflow-x:auto"><table style="min-width:920px"><thead><tr><th>Fecha</th><th>Persona</th><th>Estación</th><th>Tarea</th><th style="text-align:center">Aus.</th><th style="text-align:center">Hs</th><th style="text-align:center">Ext.</th></tr></thead><tbody>';
      detalle.forEach(f => {

        const dis = pasado ? 'disabled' : '';
        h += '<tr style="'+bg+'">'
          + '<td style="white-space:nowrap;color:#888780">'+dm(f.fecha)+(pasado?' 🔒':'')+'</td>'

          + '<td>'+(f.ausente?'<span style="color:#A8A69E">—</span>':'<select '+dis+' onchange="editarDet(\''+f.id+'\',\'subtarea_real\',this.value)">'+opcSub(f.estacion_real,f.subtarea_real)+'</select>')+'</td>'

          + '<td style="text-align:center"><input type="number" '+dis+' value="'+(f.horas_extra||0)+'" onchange="editarDet(\''+f.id+'\',\'horas_extra\',Number(this.value))" style="width:42px;text-align:center;'+(f.horas_extra>0?'color:#BA7517':'')+'" '+(f.ausente?'disabled':'')+'></td>'
          + '</tr>';
      });
      h += '</tbody></table></div><div class="row-actions"><button class="btn btn-primary" onclick="cargar()">↻ Recargar</button></div>';
      h += '<p style="font-size:12px;color:#A8A69E;margin-top:10px">🔒 = día anterior a hoy (historia, no editable). Para sumar o cambiar tareas futuras, hacelo en Planificación General y regenerá el detalle.</p>';

    async function editarDet(id, c, v) { const u = {}; u[c] = v; const { error } = await sb.from("detalle_diario").update(u).eq("id", id); if (error) return setEstado("Error: " + error.message, "err"); const f = detalle.find(x=>x.id===id); if(f) f[c]=v; setEstado("\u2713 Guardado.", "ok"); renderDetalle(); }

      estArr.forEach(([k,v])=>{ const pct=v.real/maxEst*100; h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px"><span style="width:150px;color:#5F5E5A">'+nombreEstacion(k)+'</span><div style="flex:1;background:#F1EFE8;border-radius:4px;height:18px;position:relative"><div style="width:'+pct+'%;background:'+STATIONS[k].color+';height:100%;border-radius:4px"></div></div><span style="width:90px;text-align:right">$'+Math.round(v.real).toLocaleString("es-AR")+'</span></div>'; });
      h+='</div>';
      h+='</div>';

    function renderGantt() {
      if(!plani.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">No hay planificación cargada.</p>'; return; }
      // rango de fechas total
      const todas=[]; plani.forEach(b=>{ diasHabiles(b.fecha_desde,b.fecha_hasta).forEach(d=>todas.push(d)); if(b.fecha_real_desde&&b.fecha_real_hasta)diasHabiles(b.fecha_real_desde,b.fecha_real_hasta).forEach(d=>todas.push(d)); });
      const fechas=[...new Set(todas)].sort();
      if(!fechas.length){ contenido.innerHTML='<p style="font-size:13px;color:#888780">Las estaciones no tienen fechas cargadas.</p>'; return; }
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><p style="font-size:13px;color:#888780;margin:0">Barra clara: planificado. Barra sólida: real (de las fechas reales del detalle).</p>'+botonesExport("gantt-print","gantt")+'</div><div id="gantt-print"><div style="overflow-x:auto"><table style="min-width:'+(200+fechas.length*42)+'px;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:9px 12px;position:sticky;left:0;background:#F1EFE8">Estación</th>';
      fechas.forEach(d=>h+='<th style="padding:9px 4px;min-width:40px">'+dm(d)+'</th>');
      h+='</tr></thead><tbody>';
      plani.forEach(b=>{ const st=STATIONS[b.estacion]; if(!st)return; const dP=diasHabiles(b.fecha_desde,b.fecha_hasta); const dR=(b.fecha_real_desde&&b.fecha_real_hasta)?diasHabiles(b.fecha_real_desde,b.fecha_real_hasta):[];
        h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 12px;font-weight:500;position:sticky;left:0;background:#fff;white-space:nowrap">'+st.label+'<div style="font-size:9.5px;color:#A8A69E">'+(b.subtarea||'')+'</div></td>';
        fechas.forEach(d=>{ const oP=dP.includes(d), oR=dR.includes(d); h+='<td style="padding:3px 2px;vertical-align:middle">'+(oP?'<div style="background:#C9C6BC;height:8px;border-radius:2px;margin-bottom:2px"></div>':'')+(oR?'<div style="background:'+st.color+';height:8px;border-radius:2px"></div>':'')+'</td>'; });
        h+='</tr>';
      });
      h+='</tbody></table></div></div>';
      contenido.innerHTML=h;
    }

    /* ---- PARTE DIARIO ---- */
    let parteFecha="", parteProy="", parteEst="", partePersona="";

      h+='<label style="font-size:11.5px;color:#888780">Persona<br><select onchange="setParte(\'pers\',this.value)" style="margin-top:3px"><option value="">Todas</option>'+personas.map(p=>'<option value="'+p.id+'" '+(p.id===partePersona?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></label>';

      if(!rows.length) h+='<div style="font-size:13px;color:#A8A69E;padding:8px 0">'+(detalle.length?'Sin asignaciones para este filtro.':'Generá el detalle diario primero.')+'</div>';
      rows.forEach(f=>{ h+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #F1EFE8;font-size:13px"><span style="font-weight:600;min-width:140px">'+nombrePersona(f.persona_real)+'</span><span><span style="background:'+STATIONS[f.estacion_real].bg+';color:'+STATIONS[f.estacion_real].color+';padding:2px 6px;border-radius:6px;font-size:10.5px">'+nombreEstacion(f.estacion_real)+'</span> <span style="color:#888780">'+f.subtarea_real+'</span>'+(f.horas_extra>0?' <span style="color:#BA7517;font-size:11px">+'+f.horas_extra+'h</span>':'')+'</span></div>'; });
      h+='</div></div>';

    function setParte(campo,val){ if(campo==='fecha')parteFecha=val; else if(campo==='proy')parteProy=val; else if(campo==='est')parteEst=val; else if(campo==='pers')partePersona=val; renderParte(); }

    /* ---- INFORME DE CIERRE ---- */
    let informeProy = "";
    function renderInforme() {
      const proySel = informeProy || (proyectos[0] && proyectos[0].id) || "";
      let h='<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">';

      h+=botonesExport("informe-print","informe_cierre")+'</div>';

      if(!proySel){ h+='<p style="font-size:13px;color:#888780">No hay proyectos.</p>'; contenido.innerHTML=h; return; }
      const pr = proyectos.find(p=>p.id===proySel);
      const blo = plani.filter(b=>b.proyecto_id===proySel);
      const det = detalle.filter(f=>f.proyecto_id===proySel);

      // --- TIEMPOS ---
      // planificado: rango de fechas de las estaciones del proyecto
      let planDias=[], realDias=[];
      blo.forEach(b=>diasHabiles(b.fecha_desde,b.fecha_hasta).forEach(d=>planDias.push(d)));
      det.forEach(f=>{ if(!f.ausente) realDias.push(f.fecha); });
      planDias=[...new Set(planDias)].sort(); realDias=[...new Set(realDias)].sort();
      const planIni=planDias[0], planFin=planDias[planDias.length-1];
      const realIni=realDias[0], realFin=realDias[realDias.length-1];
      const planDur=planDias.length, realDur=realDias.length;
      const desvDias=realDur-planDur;

      // --- COSTOS ---
      const presup=Number(pr.presupuesto_mo)||0;
      let jornal=0, extra=0, hsExtra=0, ausencias=0;
      det.forEach(f=>{ if(f.ausente){ausencias++;return;} const ch=costoHora(f.persona_real); jornal+=(Number(f.horas_normales)||0)*ch; extra+=(Number(f.horas_extra)||0)*ch*2; hsExtra+=(Number(f.horas_extra)||0); });
      const real=jornal+extra;
      const desvCosto=real-presup;
      const desvPct=presup?(desvCosto/presup*100):0;

      // --- POR ESTACIÓN ---
      const est={};
      blo.forEach(b=>{ const dP=diasHabiles(b.fecha_desde,b.fecha_hasta); if(!est[b.estacion])est[b.estacion]={planD:new Set(),realD:new Set(),costo:0,hsExtra:0}; dP.forEach(d=>est[b.estacion].planD.add(d)); });
      det.forEach(f=>{ if(!est[f.estacion_real])est[f.estacion_real]={planD:new Set(),realD:new Set(),costo:0,hsExtra:0}; if(!f.ausente){est[f.estacion_real].realD.add(f.fecha); const ch=costoHora(f.persona_real); est[f.estacion_real].costo+=(Number(f.horas_normales)||0)*ch+(Number(f.horas_extra)||0)*ch*2; est[f.estacion_real].hsExtra+=(Number(f.horas_extra)||0);} });

      const fmt=(n)=>'$'+Math.round(n).toLocaleString("es-AR");
      const fdate=(d)=>d?dmy(d):"—";

      h+='<div id="informe-print">';
      h+='<div style="border:1px solid #E6E4DC;border-radius:14px;padding:20px;background:#fff">';
      h+='<div style="font-size:20px;font-weight:700">Informe de cierre</div><div style="font-size:15px;color:#185FA5;font-weight:600;margin-bottom:2px">'+pr.nombre+(pr.codigo?' · '+pr.codigo:'')+'</div><div style="font-size:12px;color:#A8A69E;margin-bottom:16px">Estado: '+(pr.estado||'Vigente')+(pr.cant_modulos?' · '+pr.cant_modulos+' módulos':'')+'</div>';

      if(det.length===0){ h+='<div class="estado err" style="margin:0">Este proyecto no tiene detalle diario registrado todavía. El informe necesita datos reales cargados para comparar.</div></div></div>'; contenido.innerHTML=h; return; }

      // resumen general
      h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px">';
      const kpi=(l,v,s,col)=>'<div style="flex:1;min-width:140px;background:#F9F8F4;border-radius:12px;padding:12px 14px"><div style="font-size:11.5px;color:#888780">'+l+'</div><div style="font-size:19px;font-weight:600;color:'+(col||'#2C2C2A')+';margin-top:2px">'+v+'</div>'+(s?'<div style="font-size:11px;color:#A8A69E;margin-top:1px">'+s+'</div>':'')+'</div>';
      h+=kpi("Costo real",fmt(real),"jornales + extra");
      h+=kpi("Presupuesto MO",presup?fmt(presup):"s/dato",null);
      h+=kpi("Desvío de costo",(desvCosto>=0?"+":"")+fmt(desvCosto),presup?(desvPct>=0?"+":"")+desvPct.toFixed(0)+"%":null,desvCosto>0?'#A32D2D':'#3B6D11');
      h+=kpi("Desvío de tiempo",(desvDias>=0?"+":"")+desvDias+" días",planDur+" plan / "+realDur+" real",desvDias>0?'#A32D2D':desvDias<0?'#3B6D11':'#888780');
      h+='</div>';

      // tiempos
      h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">⏱ Tiempos</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:18px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:8px 10px"></th><th style="text-align:center;padding:8px 10px">Inicio</th><th style="text-align:center;padding:8px 10px">Fin</th><th style="text-align:center;padding:8px 10px">Días hábiles</th></tr></thead><tbody>';
      h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 10px;font-weight:500">Planificado</td><td style="text-align:center">'+fdate(planIni)+'</td><td style="text-align:center">'+fdate(planFin)+'</td><td style="text-align:center">'+planDur+'</td></tr>';
      h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:8px 10px;font-weight:500">Real</td><td style="text-align:center">'+fdate(realIni)+'</td><td style="text-align:center">'+fdate(realFin)+'</td><td style="text-align:center">'+realDur+'</td></tr>';
      h+='<tr style="border-top:1px solid #F1EFE8;background:'+(desvDias>0?'#FCEBEB':'#F1F8EC')+'"><td style="padding:8px 10px;font-weight:600">Desvío</td><td></td><td></td><td style="text-align:center;font-weight:600;color:'+(desvDias>0?'#A32D2D':'#3B6D11')+'">'+(desvDias>=0?"+":"")+desvDias+' días</td></tr>';
      h+='</tbody></table>';

      // costos
      h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">💰 Costos</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px"><tbody>';
      h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:7px 10px">Jornales (horas normales)</td><td style="text-align:right;padding:7px 10px">'+fmt(jornal)+'</td></tr>';
      h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:7px 10px">Horas extra ('+hsExtra+'h, x2)</td><td style="text-align:right;padding:7px 10px;color:#BA7517">'+fmt(extra)+'</td></tr>';
      h+='<tr style="border-top:1px solid #F1EFE8;font-weight:600"><td style="padding:7px 10px">Costo real total</td><td style="text-align:right;padding:7px 10px">'+fmt(real)+'</td></tr>';
      h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:7px 10px">Presupuesto MO</td><td style="text-align:right;padding:7px 10px">'+(presup?fmt(presup):"s/dato")+'</td></tr>';
      h+='<tr style="border-top:1px solid #F1EFE8;background:'+(desvCosto>0?'#FCEBEB':'#F1F8EC')+';font-weight:600"><td style="padding:7px 10px">Desvío de costo</td><td style="text-align:right;padding:7px 10px;color:'+(desvCosto>0?'#A32D2D':'#3B6D11')+'">'+(desvCosto>=0?"+":"")+fmt(desvCosto)+(presup?' ('+(desvPct>=0?"+":"")+desvPct.toFixed(0)+'%)':'')+'</td></tr>';
      h+='</tbody></table>';

      // desglose por estación
      const estArr=Object.entries(est).filter(([,v])=>v.realD.size>0||v.planD.size>0).sort((a,b)=>b[1].costo-a[1].costo);
      h+='<div style="font-size:14px;font-weight:600;margin:18px 0 8px">📊 Desglose por estación</div>';
      h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr style="background:#F1EFE8"><th style="text-align:left;padding:8px 10px">Estación</th><th style="text-align:center;padding:8px 10px">Días plan</th><th style="text-align:center;padding:8px 10px">Días real</th><th style="text-align:center;padding:8px 10px">Desvío</th><th style="text-align:right;padding:8px 10px">Costo real</th><th style="text-align:center;padding:8px 10px">Hs extra</th></tr></thead><tbody>';
      estArr.forEach(([k,v])=>{ const dp=v.planD.size, dr=v.realD.size, dv=dr-dp; h+='<tr style="border-top:1px solid #F1EFE8"><td style="padding:7px 10px"><span style="background:'+(STATIONS[k]?STATIONS[k].bg:'#eee')+';color:'+(STATIONS[k]?STATIONS[k].color:'#555')+';padding:2px 7px;border-radius:6px">'+nombreEstacion(k)+'</span></td><td style="text-align:center">'+dp+'</td><td style="text-align:center">'+dr+'</td><td style="text-align:center;color:'+(dv>0?'#A32D2D':dv<0?'#3B6D11':'#888780')+'">'+(dv>=0?"+":"")+dv+'</td><td style="text-align:right">'+fmt(v.costo)+'</td><td style="text-align:center;color:'+(v.hsExtra>0?'#BA7517':'#A8A69E')+'">'+(v.hsExtra||0)+'h</td></tr>'; });
      h+='</tbody></table></div>';

      // lectura del desvío (descriptiva, basada en datos)
      h+='<div style="font-size:14px;font-weight:600;margin:18px 0 8px">📝 Lectura del desvío</div><div style="font-size:13px;color:#5F5E5A;line-height:1.6;background:#F9F8F4;border-radius:12px;padding:14px 16px">';
      const obs=[];
      if(presup){ if(desvCosto>0)obs.push("El costo real superó el presupuesto en "+fmt(desvCosto)+" ("+desvPct.toFixed(0)+"%)."); else obs.push("El costo real quedó "+fmt(Math.abs(desvCosto))+" por debajo del presupuesto ("+Math.abs(desvPct).toFixed(0)+"%)."); } else obs.push("No hay presupuesto de mano de obra cargado para comparar el costo.");
      if(hsExtra>0){ const pctExtra=real?(extra/real*100):0; obs.push("Las horas extra ("+hsExtra+"h) representan "+pctExtra.toFixed(0)+"% del costo real ("+fmt(extra)+")."); }
      if(ausencias>0)obs.push("Se registraron "+ausencias+" jornada(s) de ausencia en el período.");
      if(desvDias>0)obs.push("El proyecto se extendió "+desvDias+" día(s) hábil(es) más de lo planificado."); else if(desvDias<0)obs.push("El proyecto se completó en "+Math.abs(desvDias)+" día(s) hábil(es) menos de lo planificado."); else obs.push("La duración real coincidió con la planificada.");
      const peor=estArr.filter(([,v])=>v.realD.size-v.planD.size>0).sort((a,b)=>(b[1].realD.size-b[1].planD.size)-(a[1].realD.size-a[1].planD.size))[0];
      if(peor)obs.push("La estación con mayor desvío de tiempo fue "+nombreEstacion(peor[0])+" (+"+(peor[1].realD.size-peor[1].planD.size)+" días).");
      const caroExtra=estArr.filter(([,v])=>v.hsExtra>0).sort((a,b)=>b[1].hsExtra-a[1].hsExtra)[0];
      if(caroExtra)obs.push("La mayor concentración de horas extra se dio en "+nombreEstacion(caroExtra[0])+" ("+caroExtra[1].hsExtra+"h).");
      h+=obs.map(o=>'• '+o).join('<br>');
      h+='<div style="font-size:11px;color:#A8A69E;margin-top:10px">Las fechas reales se infieren del detalle diario cargado (primer y último día con trabajo registrado por estación). La precisión depende de cuán completo esté el registro.</div>';
      h+='</div>';

      h+='</div></div>';
      contenido.innerHTML=h;
    }
    function setInformeProy(v){ informeProy=v; renderInforme(); }
    async function toggleGente(planiId, personaId, estaba) {
      if (estaba) { const { error } = await sb.from("planificacion_personal").delete().eq("planificacion_id", planiId).eq("persona_id", personaId); if (error) return setEstado("Error: " + error.message, "err"); }
      else { const { error } = await sb.from("planificacion_personal").insert({ planificacion_id: planiId, persona_id: personaId, horas: 8 }); if (error) return setEstado("Error: " + error.message, "err"); }
      if (!planiPers[planiId]) { planiPers[planiId] = []; planiHoras[planiId] = {}; }
      if (estaba) { planiPers[planiId] = planiPers[planiId].filter(x => x !== personaId); delete planiHoras[planiId][personaId]; }
      else { planiPers[planiId].push(personaId); if(!planiHoras[planiId]) planiHoras[planiId]={}; planiHoras[planiId][personaId] = 8; }
      setEstado("\u2713 Guardado.", "ok"); renderPlani();
    }
    // suma de horas de una persona en un día dado, entre todas las estaciones cuyo rango incluye ese día
    function horasPersonaDia(personaId, fecha, exceptoPlaniId) {
      let tot = 0;
      plani.forEach(b => {
        if (b.id === exceptoPlaniId) return;
        if (!(planiPers[b.id]||[]).includes(personaId)) return;
        if (!diasHabiles(b.fecha_desde, b.fecha_hasta).includes(fecha)) return;
        tot += (planiHoras[b.id] && planiHoras[b.id][personaId] != null) ? planiHoras[b.id][personaId] : 8;
      });
      return tot;
    }
    async function editarHoras(planiId, personaId, horas) {
      // guardar siempre; avisar (sin bloquear) si algún día supera 8h entre estaciones
      const { error } = await sb.from("planificacion_personal").update({ horas }).eq("planificacion_id", planiId).eq("persona_id", personaId);
      if (error) return setEstado("Error: " + error.message, "err");
      if (!planiHoras[planiId]) planiHoras[planiId] = {}; planiHoras[planiId][personaId] = horas;
      // chequear si ahora hay algún día con más de 8h
      const b = plani.find(x => x.id === planiId);
      const dias = diasHabiles(b.fecha_desde, b.fecha_hasta);
      let aviso = null;
      for (const d of dias) { const tot = horasPersonaDia(personaId, d, null); if (tot > 8) { aviso = dm(d) + " (" + tot + "h)"; break; } }
      if (aviso) setEstado("\u26a0 " + nombrePersona(personaId) + " queda con más de 8h el " + aviso + ". Ajustá el reparto antes de generar el detalle.", "err");
      else setEstado("\u2713 Guardado.", "ok");
      renderPlani();
    }

    async function hacerLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPass").value;
      const errDiv = document.getElementById("loginError");
      errDiv.style.display = "none";
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { errDiv.textContent = "Email o contraseña incorrectos."; errDiv.style.display = "block"; return; }
      mostrarApp(data.user);
    }
    async function cerrarSesion() { await sb.auth.signOut(); document.getElementById("app").style.display = "none"; document.getElementById("login").style.display = "flex"; }
    let miPerfil = { rol: "coordinador", ve_sueldos: false };
    async function mostrarApp(user) {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("userEmail").textContent = user.email;
      // leer perfil (rol y permisos)
      const { data: perf } = await sb.from("perfiles").select("*").eq("id", user.id).maybeSingle();
      miPerfil = perf || { rol: "coordinador", ve_sueldos: false };
      aplicarPermisos();
      // tab inicial: si no ve sueldos y estaba en personal, mandarlo a proyectos
      if (tab === "personal" && !puedeVerSueldos()) tab = "plani";
      cargar();
    }
    function puedeVerSueldos() { return miPerfil.rol === "admin" || miPerfil.rol === "pm" ? (miPerfil.ve_sueldos !== false) : (miPerfil.ve_sueldos === true); }
    function esAdmin() { return miPerfil.rol === "admin"; }
    function aplicarPermisos() {
      // Solapa Personal (sueldos): solo si ve_sueldos
      const tp = document.getElementById("tab-personal");
      if (tp) tp.style.display = puedeVerSueldos() ? "" : "none";
      // Solapa Proyectos: PM y admin la editan; coordinador la ve. (visible para todos por ahora)
      // mostrar rol en la barra
      const ue = document.getElementById("userEmail");
      if (ue && miPerfil.rol) ue.textContent = ue.textContent + " · " + miPerfil.rol;
    }
    async function initAuth() {
      const { data } = await sb.auth.getSession();
      if (data.session) mostrarApp(data.session.user);
      else { document.getElementById("login").style.display = "flex"; document.getElementById("app").style.display = "none"; }
    }
    window.__supaReady.then(function(){
      if (typeof supabase === "undefined" || !supabase || !supabase.createClient) {
        document.getElementById("loginError").textContent = "No se pudo cargar la librería. Revisá tu conexión y recargá.";
        document.getElementById("loginError").style.display = "block";
        return;
      }
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      initAuth();
    });
  </script>
</body>
