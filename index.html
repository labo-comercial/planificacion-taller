    }
    function renderPlani() {
      let h = '<p style="font-size:13px;color:#888780;margin-top:0">Agregá estaciones, asignalas a un proyecto, elegí tarea, fechas y gente. Para generar el detalle, cada día todo el personal directo disponible debe estar asignado a su jornada.</p>';
      if (!proyectos.length) h += '<div class="estado err">No hay proyectos. Creá al menos uno en la pestaña Proyectos antes de planificar.</div>';
      const val = validarCobertura();
      if (!VALIDAR_COBERTURA && plani.length > 0) {
        if (val.faltantes.length) {
          h += '<div class="estado cargando" style="margin-bottom:12px">ℹ️ <b>Cobertura incompleta.</b> Podés generar el detalle igual; esto es solo un aviso. <span style="color:#A8A69E">Sin asignar (tocá para resolver): '+val.faltantesObj.slice(0,6).map(o=>chipConflicto(o,"#8A6A2A")).join(" · ")+(val.faltantesObj.length>6?"…":"")+'</span></div>';
        } else {
          h += '<div class="estado ok" style="margin-bottom:12px">✓ Cobertura completa. Todo el personal directo disponible está asignado cada día.</div>';
        }
      } else if (plani.length > 0 && !val.ok) {
        h += '<div class="estado err" style="margin-bottom:12px"><b>⚠ No se puede generar el detalle todavía.</b> Cada día, todo el personal directo disponible debe estar asignado a su jornada (los de vacaciones/licencia y los contratistas se excluyen).';
        if (val.faltantes.length) h += '<div style="margin-top:4px">Sin asignar (tocá para resolver): ' + val.faltantesObj.slice(0,10).map(o=>chipConflicto(o,"#A32D2D")).join(" · ") + (val.faltantesObj.length>10?(" … y "+(val.faltantesObj.length-10)+" más"):"") + '</div>';
        if (val.excesos.length) h += '<div style="margin-top:4px">Sobreasignados (+8h) (tocá para resolver): ' + val.excesosObj.slice(0,8).map(o=>chipConflicto(o,"#A32D2D")).join(" · ") + '</div>';
        h += '</div>';
      } else if (plani.length > 0 && val.ok) {
        h += '<div class="estado ok" style="margin-bottom:12px">✓ Cobertura completa. Todo el personal directo disponible está asignado cada día.</div>';
      }
      // ---- Filtro de visualización: por defecto desde AYER (oculta lo más viejo), igual que Detalle ----
      const ayerPl = fechaStr(new Date(Date.now() - 86400000));
      if (planiDesde === null) planiDesde = ayerPl;
      // una estación se oculta solo si TIENE fecha_hasta y terminó antes del filtro.
      // sin fechas = configuración pendiente → siempre visible.
      let planiVisibles = planiVerTodo ? plani.slice() : plani.filter(b => !b.fecha_hasta || b.fecha_hasta >= planiDesde);
      if (planiProy) planiVisibles = planiVisibles.filter(b => b.proyecto_id === planiProy);
      if (planiOrdenFecha) {
        planiVisibles.sort((a,b)=>{
          const fa = a.fecha_desde || "9999-12-31", fb = b.fecha_desde || "9999-12-31";
          return fa < fb ? -1 : fa > fb ? 1 : 0;
        });
      }
      const planiOcultas = plani.length - planiVisibles.length;
      const proyEnPlan = [...new Set(plani.map(b=>b.proyecto_id).filter(Boolean))];
      h += '<div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;background:#FAFAF8;border:1px solid #EEECE4;border-radius:10px;padding:8px 12px">';
      // ---- Selector de LENTE (agrupación): estación / persona / proyecto ----
      h += '<span style="font-size:12px;color:#888780">Ver por:</span>';
      h += '<span style="display:inline-flex;background:#F1F0EC;border-radius:9px;padding:3px;gap:2px">'
        + [['estacion','Estación'],['persona','Persona'],['proyecto','Proyecto'],['semana','Semana']].map(([k,lab])=>{
            const on = planiLente===k;
            return '<button class="btn" onclick="planiLente=\''+k+'\';renderPlani()" style="border:0;background:'+(on?'#fff':'transparent')+';color:'+(on?'#2C2C2A':'#888780')+';font-size:12px;font-weight:550;padding:5px 12px;border-radius:7px;'+(on?'box-shadow:0 1px 3px rgba(0,0,0,.09)':'')+'">'+lab+'</button>';
          }).join('')
        + '</span>';
      h += '<span style="width:1px;height:22px;background:#E6E4DC;margin:0 2px"></span>';
      h += '<span style="font-size:12px;color:#888780">Proyecto:</span>';
      h += '<select onchange="planiProy=this.value;renderPlani()" style="width:auto"><option value="">Todos</option>'+proyectos.filter(p=>proyEnPlan.includes(p.id)).map(p=>'<option value="'+p.id+'" '+(p.id===planiProy?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select>';
      h += '<span style="font-size:12px;color:#888780;margin-left:6px">Ver desde:</span>';
      h += '<input type="date" value="'+planiDesde+'" '+(planiVerTodo?'disabled':'')+' onchange="planiDesde=this.value;planiVerTodo=false;renderPlani()" style="width:auto">';
      h += '<button class="btn btn-sec btn-sm" onclick="planiDesde=\''+ayerPl+'\';planiVerTodo=false;renderPlani()">Ayer + en adelante</button>';
      h += '<label style="font-size:12px;color:#888780;display:flex;align-items:center;gap:5px;margin-left:auto"><input type="checkbox" '+(planiVerTodo?'checked':'')+' onchange="planiVerTodo=this.checked;renderPlani()" style="width:auto">Ver todo</label>';
      if (planiOcultas > 0 && !planiVerTodo) h += '<span style="font-size:11.5px;color:#A8A69E;width:100%">'+planiOcultas+' estación(es) fuera del filtro (fecha o proyecto). Cambiá los filtros o tildá "Ver todo" para consultarlas.</span>';
      h += '</div>';
      h += '<div class="no-print" style="display:flex;justify-content:flex-end;margin-bottom:10px">'+botonesExport("plani-print","planificacion")+'</div>';
      h += '<div id="plani-print">';

      // ---- Controles de expandir/colapsar todo (no en vista grilla) ----
      if (planiVisibles.length && planiLente!=='semana') {
        h += '<div class="no-print" style="display:flex;gap:8px;align-items:center;margin-bottom:10px">'
          + '<button class="btn btn-sec btn-sm" onclick="planiVisibles_expandTodo()">Expandir todo</button>'
          + '<button class="btn btn-sec btn-sm" onclick="planiAbiertos.clear();renderPlani()">Colapsar todo</button>'
          + '<span style="font-size:11.5px;color:#A8A69E">Tocá una fila para expandirla y editarla.</span>'
          + '</div>';
      }

      // ---- Supervisores primero (es lo primero que se establece) ----
      h += renderPanelSupervision(planiProy);

      // ---- Filas colapsables, agrupadas según la LENTE ----
      // Cuerpo expandido: idéntico a la vista anterior (mismos onclick a las mismas funciones).
      function cuerpoBloque(b){
        const st = STATIONS[b.estacion]; if(!st) return '';
        const gente = planiPers[b.id] || [];
        const subsSel = (b.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);
        return '<div style="padding:14px;border-top:1px solid #EEECE4">'
          + '<div class="pl-row" style="margin-bottom:8px"><span style="font-size:11px;color:#A8A69E;margin-right:4px">Proyecto:</span><select onchange="editarPl(\''+b.id+'\',\'proyecto_id\',this.value)" style="min-width:160px">'+proyectos.map(p=>'<option value="'+p.id+'" '+(p.id===b.proyecto_id?'selected':'')+'>'+p.nombre+'</option>').join('')+'</select></div>'
          + '<div style="margin:2px 0 8px"><div style="font-size:11px;color:#A8A69E;margin-bottom:4px">Tareas (tildá una o varias):</div><div class="chips">'+st.subs.map(s=>{const on=subsSel.includes(s);return '<button class="chip'+(on?' on':'')+'" onclick="toggleSub(\''+b.id+'\',\''+s.replace(/'/g,"\\\\'")+'\','+(on?'true':'false')+')">'+s+'</button>';}).join('')+'</div></div>'
          + (function(){ const mods=modulosDeProy(b.proyecto_id); const sel=(b.modulos||"").split(",").map(s=>s.trim()).filter(Boolean); let m='<div style="margin:2px 0 8px"><div style="font-size:11px;color:#A8A69E;margin-bottom:4px">Módulos (opcional, tildá uno o varios):</div><div class="chips">'; if(!mods.length){ m+='<span style="font-size:11px;color:#A8A69E">El proyecto no tiene módulos definidos (cargalos en Proyectos).</span>'; } else { m+=mods.map(md=>{const on=sel.includes(md);return '<button class="chip'+(on?' on':'')+'" onclick="toggleModuloPl(\''+b.id+'\',\''+md.replace(/'/g,"\\\\'")+'\','+(on?'true':'false')+')">'+md+'</button>';}).join(''); } return m+'</div></div>'; })()
          + '<div class="pl-row"><input type="date" value="'+(b.fecha_desde||'')+'" onchange="editarPl(\''+b.id+'\',\'fecha_desde\',this.value)" style="width:auto"><span style="color:#A8A69E;font-size:12px">a</span><input type="date" value="'+(b.fecha_hasta||'')+'" onchange="editarPl(\''+b.id+'\',\'fecha_hasta\',this.value)" style="width:auto"><span style="color:#A8A69E;font-size:12px">'+diasHabiles(b.fecha_desde,b.fecha_hasta).length+' días háb.</span></div>'
          + '<div class="chips">'+personasHuella().map(p=>{
              const on=gente.includes(p.id);
              const dias=diasHabiles(b.fecha_desde,b.fecha_hasta);
              const diasNoDispo=dias.filter(d=>noDispoEn(p.id,d));
              const algoNoDispo=diasNoDispo.length>0;
              if(algoNoDispo && !on){ const tipo=tipoNoDispoEn(p.id,diasNoDispo[0])||"No disp."; return '<button class="chip" disabled title="No disponible ('+tipo+') en '+diasNoDispo.length+' día(s) del rango" style="text-decoration:line-through;opacity:0.45;cursor:not-allowed">'+p.nombre+'</button>'; }
              const horas = (planiHoras[b.id] && planiHoras[b.id][p.id]!=null) ? planiHoras[b.id][p.id] : 8;
              const esContrP = p.tipo==="Contratista";
              const chipBtn = '<button class="chip'+(on?' on':'')+'" onclick="toggleGente(\''+b.id+'\',\''+p.id+'\','+(on?'true':'false')+')" '+(esContrP?'title="Contratista (no cuenta para cobertura)"':'')+'>'+p.nombre+(esContrP?' ◇':'')+(algoNoDispo?' \u26a0':'')+'</button>';
              if(!on) return chipBtn;
              return '<span style="display:inline-flex;align-items:center;gap:3px">'+chipBtn+'<input type="number" value="'+horas+'" min="0" max="8" onchange="editarHoras(\''+b.id+'\',\''+p.id+'\',Number(this.value))" title="Horas en esta estación" style="width:42px;padding:2px 4px;font-size:11px;text-align:center">h</span>';
            }).join('')+'</div>'
          + '</div>';
      }
      // ¿el bloque tiene algún día con una persona sobre 8h? (para marca visual de conflicto)
      function bloqueEnConflicto(b){
        const gente = planiPers[b.id] || [];
        const dias = diasHabiles(b.fecha_desde, b.fecha_hasta);
        for(const pid of gente){
          const p = personas.find(x=>x.id===pid);
          if(p && p.tipo==="Contratista") continue; // contratistas no cuentan
          for(const d of dias){ if(horasPersonaDia(pid, d, null) > 8) return true; }
        }
        return false;
      }
      // Fila colapsable de un bloque. showEst/showProy controlan qué mostrar según la lente.
      function filaBloque(b, showEst, showProy){
        const st = STATIONS[b.estacion]; if(!st) return '';
        const gente = planiPers[b.id] || [];
        const subsSel = (b.subtarea||"").split(",").map(s=>s.trim()).filter(Boolean);
        const pr = proyectos.find(p=>p.id===b.proyecto_id);
        const abierto = planiAbiertos.has(b.id);
        const conf = bloqueEnConflicto(b);
        const dias = diasHabiles(b.fecha_desde,b.fecha_hasta);
        const fechaTxt = (b.fecha_desde&&b.fecha_hasta) ? dm(b.fecha_desde)+'–'+dm(b.fecha_hasta)+' · '+dias.length+' d.háb.' : '<span style="color:#C99">sin fechas</span>';
        const tareaTxt = subsSel.length ? subsSel.join(', ') : '<span style="color:#A8A69E">sin tarea</span>';
        // avatares (iniciales) de la gente asignada
        const ava = gente.slice(0,5).map(pid=>{ const p=personas.find(x=>x.id===pid); const ini=p?p.nombre.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase():'?'; return '<span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:#DCD9CF;color:#5F5E5A;font-size:9.5px;font-weight:650;align-items:center;justify-content:center;border:2px solid #fff;margin-left:-6px">'+ini+'</span>'; }).join('');
        const avaWrap = gente.length ? '<span style="display:inline-flex;margin-left:6px">'+ava+'</span><span style="font-size:11.5px;color:#A8A69E;margin-left:8px">'+gente.length+(gente.length===1?' pers.':' pers.')+'</span>' : '<span style="font-size:11.5px;color:#C4C2BA;margin-left:6px">sin gente</span>';
        let head = '<div class="pl-row" style="margin:0;padding:11px 13px;cursor:pointer;align-items:center" onclick="planiToggleBloque(\''+b.id+'\')">';
        head += '<span style="color:#A8A69E;font-size:11px;transition:.15s;display:inline-block;'+(abierto?'transform:rotate(90deg)':'')+'">▶</span>';
        if(showEst) head += '<span class="estpill" style="background:'+st.color+';color:#fff;min-width:118px;display:inline-block;text-align:center;font-weight:600">'+st.label+'</span>';
        if(showProy) head += '<span style="font-weight:600;color:#2C2C2A;font-size:13px">'+(pr?pr.nombre:'—')+'</span>';
        head += '<span style="font-size:12.5px;color:#888780">'+tareaTxt+'</span>';
        head += '<span style="font-size:12px;color:#A8A69E;margin-left:8px">'+fechaTxt+'</span>';
        if(conf) head += '<span style="background:#FCEBEB;color:#A32D2D;font-size:10.5px;font-weight:650;padding:2px 7px;border-radius:5px;margin-left:6px">+8h</span>';
        head += '<span style="margin-left:auto;display:flex;align-items:center">'+avaWrap
          + '<button class="btn-del" style="margin-left:10px" onclick="event.stopPropagation();eliminarPl(\''+b.id+'\')">×</button></span>';
        head += '</div>';
        return '<div class="card" id="plibloque-'+b.id+'" style="border:1px solid '+(conf?'#E7B0B0':'#E6E4DC')+';border-left:5px solid '+(conf?'#A32D2D':st.color)+';border-radius:11px;margin-bottom:7px;padding:0;overflow:hidden">'
          + head + (abierto ? cuerpoBloque(b) : '') + '</div>';
      }

      if(!planiVisibles.length){
        h += '<p style="font-size:13px;color:#A8A69E;padding:8px 2px">No hay estaciones para mostrar con los filtros actuales.</p>';
      } else if(planiLente==='semana'){
        // ---- VISTA PANORÁMICA: grilla día × (estación|persona) ----
        // Sub-toggle de eje de filas.
        h += '<div class="no-print" style="display:flex;gap:8px;align-items:center;margin:0 0 10px">'
          + '<span style="font-size:12px;color:#888780">Filas por:</span>'
          + '<span style="display:inline-flex;background:#F1F0EC;border-radius:9px;padding:3px;gap:2px">'
          + [['estacion','Estación'],['persona','Persona']].map(([k,lab])=>{
              const on=planiGridEje===k;
              return '<button class="btn" onclick="planiGridEje=\''+k+'\';renderPlani()" style="border:0;background:'+(on?'#fff':'transparent')+';color:'+(on?'#2C2C2A':'#888780')+';font-size:12px;font-weight:550;padding:4px 11px;border-radius:7px;'+(on?'box-shadow:0 1px 3px rgba(0,0,0,.09)':'')+'">'+lab+'</button>';
            }).join('')
          + '</span>'
          + '<span style="font-size:11.5px;color:#A8A69E;margin-left:6px">Tocá un bloque para abrirlo y editarlo.</span></div>';

        // Rango de días: unión de los rangos visibles (o ventana desde el filtro), acotado para no explotar.
        let fMin=null, fMax=null;
        planiVisibles.forEach(b=>{ if(b.fecha_desde){ if(!fMin||b.fecha_desde<fMin)fMin=b.fecha_desde; } if(b.fecha_hasta){ if(!fMax||b.fecha_hasta>fMax)fMax=b.fecha_hasta; } });
        if(!fMin) fMin = planiDesde;
        if(!fMax){ const d=new Date(fMin+'T12:00:00'); d.setDate(d.getDate()+13); fMax=fechaStr(d); }
        // limitar a 42 días para no generar una tabla gigante
        const dIni=new Date(fMin+'T12:00:00'), dFin=new Date(fMax+'T12:00:00');
        const dias=[]; let cur=new Date(dIni);
        while(cur<=dFin && dias.length<42){ dias.push(fechaStr(cur)); cur.setDate(cur.getDate()+1); }
        // función: bloques que caen en un día (usando días hábiles del bloque)
        const bloquesEnDia = (fecha, filtroFn) => planiVisibles.filter(b => filtroFn(b) && diasHabiles(b.fecha_desde,b.fecha_hasta).includes(fecha));

        // definir las filas según el eje
        let filas; // [{label, color, filtroFn}]
        if(planiGridEje==='estacion'){
          filas = STKEYS.filter(k=>planiVisibles.some(b=>b.estacion===k)).map(k=>({
            label: STATIONS[k].label, color: STATIONS[k].color, filtroFn: b=>b.estacion===k
          }));
        } else {
          filas = personasHuella().filter(p=>planiVisibles.some(b=>(planiPers[b.id]||[]).includes(p.id))).map(p=>({
            label: p.nombre, color:'#4A3F7A', filtroFn: b=>(planiPers[b.id]||[]).includes(p.id)
          }));
        }

        if(!filas.length){
          h += '<p style="font-size:13px;color:#A8A69E;padding:8px 2px">No hay bloques con fechas para mostrar en la grilla.</p>';
        } else {
          h += '<div style="overflow:auto;border:1px solid #E6E4DC;border-radius:12px;background:#fff">';
          h += '<table style="border-collapse:collapse;width:100%;font-size:11.5px;min-width:'+(120+dias.length*66)+'px">';
          // encabezado de días
          h += '<thead><tr><th style="position:sticky;left:0;background:#F6F5F1;border:1px solid #EEECE4;padding:8px 10px;text-align:left;min-width:120px;z-index:2">'+(planiGridEje==='estacion'?'Estación':'Persona')+'</th>';
          dias.forEach(f=>{
            const wd=new Date(f+'T12:00:00').getDay(); const finde=(wd===0||wd===6); const fer=esFeriado(f);
            const dd=f.slice(8,10);
            h += '<th style="border:1px solid #EEECE4;padding:6px 4px;background:'+(fer?'#FBF0F0':finde?'#F1F0EC':'#F6F5F1')+';color:'+(fer?'#A32D2D':finde?'#C4C2BA':'#888780')+';font-weight:600;min-width:62px">'+['D','L','M','M','J','V','S'][wd]+'<br>'+dd+'</th>';
          });
          h += '</tr></thead><tbody>';
          filas.forEach(fila=>{
            h += '<tr><td style="position:sticky;left:0;background:#FAFAF8;border:1px solid #EEECE4;padding:7px 10px;font-weight:600;white-space:nowrap;z-index:1"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+fila.color+';margin-right:6px;vertical-align:0"></span>'+fila.label+'</td>';
            dias.forEach(f=>{
              const wd=new Date(f+'T12:00:00').getDay(); const finde=(wd===0||wd===6);
              const aqui = bloquesEnDia(f, fila.filtroFn);
              let cell='';
              aqui.forEach(b=>{
                const st=STATIONS[b.estacion]; const pr=proyectos.find(p=>p.id===b.proyecto_id);
                const conf=bloqueEnConflicto(b);
                const etiqueta = planiGridEje==='estacion' ? (pr?pr.nombre:'—') : (st?st.label:'—');
                cell += '<div onclick="planiAbrirDesdeGrilla(\''+b.id+'\')" title="'+(pr?pr.nombre:'—')+' · '+(st?st.label:'')+' — tocá para editar" '
                  + 'style="background:'+(st?st.color:'#999')+';color:#fff;border-radius:5px;padding:3px 6px;margin:2px 0;font-size:10px;font-weight:600;cursor:pointer;line-height:1.25;'+(conf?'outline:2px solid #A32D2D;outline-offset:-2px':'')+'">'
                  + etiqueta + (conf?' ⚠':'') + '</div>';
              });
              h += '<td style="border:1px solid #EEECE4;padding:3px;vertical-align:top;background:'+(finde?'#FBFAF8':'#fff')+';min-width:62px">'+(cell||'<span style="color:#E0DED6;font-size:13px;display:block;text-align:center">·</span>')+'</td>';
            });
            h += '</tr>';
          });
          h += '</tbody></table></div>';
          h += '<p style="font-size:11px;color:#A8A69E;margin-top:8px">Cada celda es un día. <span style="color:#A32D2D">⚠ borde rojo</span> = ese bloque deja a alguien sobre 8h ese día. Los fines de semana y feriados van sombreados. Tocá un bloque para abrirlo en la lista y editarlo.</p>';
        }
      } else if(planiLente==='estacion'){
        // Orden por estación (según catálogo), luego por fecha dentro del grupo.
        STKEYS.forEach(k=>{
          const grp = planiVisibles.filter(b=>b.estacion===k).sort((a,b)=>(a.fecha_desde||'9999')<(b.fecha_desde||'9999')?-1:1);
          if(!grp.length) return;
          h += '<div style="font-size:11px;color:#A8A69E;text-transform:uppercase;letter-spacing:.05em;font-weight:650;margin:14px 2px 5px">'+STATIONS[k].label+' <span style="color:#C4C2BA;font-weight:500">· '+grp.length+'</span></div>';
          grp.forEach(b=>{ h += filaBloque(b, false, true); });
        });
      } else if(planiLente==='proyecto'){
        const proyIds = proyectos.map(p=>p.id).filter(id=>planiVisibles.some(b=>b.proyecto_id===id));
        proyIds.forEach(pid=>{
          const pr = proyectos.find(p=>p.id===pid);
          const grp = planiVisibles.filter(b=>b.proyecto_id===pid).sort((a,b)=>(a.fecha_desde||'9999')<(b.fecha_desde||'9999')?-1:1);
          if(!grp.length) return;
          h += '<div style="font-size:11px;color:#A8A69E;text-transform:uppercase;letter-spacing:.05em;font-weight:650;margin:14px 2px 5px">'+(pr?pr.nombre:'—')+' <span style="color:#C4C2BA;font-weight:500">· '+grp.length+'</span></div>';
          grp.forEach(b=>{ h += filaBloque(b, true, false); });
        });

    async function editarPl(id, c, v) {
      const b = plani.find(x=>x.id===id);
      const fechaPrevia = b ? b.fecha_desde : null;
      const u = {}; u[c] = (v === "" ? null : v); if(c==="proyecto_id"){ u.modulos = null; }
      const { error } = await sb.from("planificacion").update(u).eq("id", id);

      setEstado("\u2713 Guardado.", "ok");
      // Replanificación: si cambió el INICIO de un bloque, ofrecer desplazar las tareas
      // futuras de las mismas personas la misma cantidad de días hábiles. Pasado congelado.
      if(c==="fecha_desde" && b && fechaPrevia && v && v!==fechaPrevia){
        await ofrecerDesplazar(b, fechaPrevia, v);
      }
      if(c==="fecha_desde"||c==="fecha_hasta"||c==="proyecto_id") renderPlani();

    // Desplaza los bloques futuros de las mismas personas, en días hábiles, según el corrimiento del inicio.
    async function ofrecerDesplazar(bloque, inicioPrevio, inicioNuevo){
      const delta = diffDiasCorridos(inicioPrevio, inicioNuevo); // en días corridos
      // convertir a días hábiles equivalentes para preservar la cadencia laboral
      const a = delta>0 ? inicioPrevio : inicioNuevo, z = delta>0 ? inicioNuevo : inicioPrevio;
      let habiles = Math.max(0, diasHabiles(a, z).length - 1);
      if(delta<0) habiles = -habiles;
      if(habiles===0) return;
      const personasBloque = (planiPers[bloque.id] || []);
      if(!personasBloque.length) return;
      const hoy = hoyISO();
      // candidatos: otros bloques que (1) comparten al menos una persona, (2) arrancan después del
      // inicio PREVIO del bloque editado, y (3) no están en el pasado (inicio >= hoy).
      const candidatos = plani.filter(x => x.id!==bloque.id && x.fecha_desde
        && x.fecha_desde > inicioPrevio && x.fecha_desde >= hoy
        && (planiPers[x.id]||[]).some(pid => personasBloque.includes(pid)));
      if(!candidatos.length) return;
      const dir = habiles>0 ? "hacia adelante" : "hacia atrás";
      const nombres = [...new Set(personasBloque)].map(nombrePersona).join(", ");
      const msg = "Replanificaste el inicio de «"+(STATIONS[bloque.estacion]?STATIONS[bloque.estacion].label:bloque.estacion)+"» "+Math.abs(habiles)+" día(s) hábil(es) "+dir+".\n\n"
        + "¿Desplazar también las "+candidatos.length+" tarea(s) futura(s) de "+nombres+" la misma cantidad?\n\n"
        + "(Solo se mueven tareas de esas personas con inicio de hoy en adelante. El pasado no se toca.)";
      if(!confirm(msg)) return;
      let movidos = 0;
      for(const x of candidatos){
        const nuevoDesde = sumarDiasHabiles(x.fecha_desde, habiles);
        const nuevoHasta = x.fecha_hasta ? sumarDiasHabiles(x.fecha_hasta, habiles) : null;
        // nunca dejar un bloque arrancando antes de hoy por un desplazamiento hacia atrás
        if(nuevoDesde < hoy){ continue; }
        const upd = { fecha_desde: nuevoDesde }; if(nuevoHasta) upd.fecha_hasta = nuevoHasta;
        const { error } = await sb.from("planificacion").update(upd).eq("id", x.id);
        if(error){ setEstado("Error al desplazar una tarea: "+error.message,"err"); continue; }
        x.fecha_desde = nuevoDesde; if(nuevoHasta) x.fecha_hasta = nuevoHasta; movidos++;
      }
      setEstado("\u2713 "+movidos+" tarea(s) desplazada(s) "+Math.abs(habiles)+" día(s) hábil(es) "+dir+".","ok");
    }

    async function generarDetalle() {
      const val = validarCobertura();
      if (!val.ok) { setEstado("Todavía hay días sin cubrir.", "err"); return; }
      // requisito excluyente: toda asignación de supervisión debe tener al menos un proyecto
      const supSinProy = supervisiones.filter(s => !((s.proyectos||"").split(",").map(x=>x.trim()).filter(Boolean).length));

      const hoy = fechaStr(new Date());

      const { data: existente, error: eEx } = await sb.from("detalle_diario").select("*").eq("sede","la_huella");
      if (eEx) return setEstado("Error: " + eEx.message, "err");
      // ¿hay algo cargado (real) en días futuros (>= hoy)? (los días extra NO se borran, no cuentan acá)
      const futConDatos = (existente||[]).filter(d => d.fecha >= hoy && !d.es_extra && (d.ausente || d.horas_extra > 0 || d.estacion_real !== d.estacion_plan || d.persona_real !== d.persona_plan));
      if (futConDatos.length > 0) {

      }
      // borrar SOLO el detalle planificado de hoy en adelante; los días extra quedan intactos.
      // (es_extra distinto de true cubre tanto false como NULL en filas viejas)
      const { error: eDel } = await sb.from("detalle_diario").delete().eq("sede","la_huella").gte("fecha", hoy).or("es_extra.is.null,es_extra.eq.false");
      if (eDel) return setEstado("Error al limpiar futuro: " + eDel.message, "err");
      // generar filas nuevas de hoy en adelante
      const filas = [];
      plani.forEach(b => {
        const dias = diasHabiles(b.fecha_desde, b.fecha_hasta).filter(d => d >= hoy);
        const gente = planiPers[b.id] || [];
        gente.forEach(g => dias.forEach(fecha => {
          if (noDispoEn(g, fecha)) return; // no genera filas para días no disponibles
          const hrs = (planiHoras[b.id] && planiHoras[b.id][g]!=null) ? planiHoras[b.id][g] : 8;
          const vhPlan = costoHora(g, fecha); // valor-hora asumido al planificar (futuro sin valor → base actual)
          filas.push({ fecha, sede:"la_huella", persona_plan: g, persona_real: g, proyecto_id: b.proyecto_id, estacion_plan: b.estacion, subtarea_plan: b.subtarea, estacion_real: b.estacion, subtarea_real: b.subtarea, modulos_plan: b.modulos||null, modulos_real: b.modulos||null, horas_plan: hrs, horas_normales: hrs, horas_extra: 0, ausente: false, valor_hora_plan: vhPlan });
        }));
      });
      // supervisión: una fila por supervisor por día, con la marca SUP_MARK y los proyectos como "tarea"
      supervisiones.forEach(s => {
        const ids = (s.proyectos||"").split(",").map(x=>x.trim()).filter(Boolean);
        if (!ids.length) return; // sin proyecto no genera (validado más arriba)
        const nombres = ids.map(nombreProy).join(", ");
        const dias = diasHabiles(s.fecha_desde, s.fecha_hasta).filter(d => d >= hoy);
        const hrs = (s.horas != null ? s.horas : 8);
        dias.forEach(fecha => {
          if (noDispoEn(s.supervisor_id, fecha)) return;
          const vhPlanS = costoHora(s.supervisor_id, fecha);
          filas.push({ fecha, sede:"la_huella", persona_plan: s.supervisor_id, persona_real: s.supervisor_id, proyecto_id: ids[0], estacion_plan: SUP_MARK, subtarea_plan: nombres, estacion_real: SUP_MARK, subtarea_real: nombres, modulos_plan: null, modulos_real: null, horas_plan: hrs, horas_normales: hrs, horas_extra: 0, ausente: false, valor_hora_plan: vhPlanS });
        });
      });
      if (filas.length > 0) {
        const { error: eIns } = await sb.from("detalle_diario").insert(filas);
        if (eIns) return setEstado("Error al generar: " + eIns.message, "err");
      }
      setEstado("\u2713 Detalle generado: " + filas.length + " registro(s) de hoy en adelante. El pasado quedó intacto.", "ok");
      tab = "detalle"; ["personal","proyectos","dispo","plani","detalle"].forEach(x => document.getElementById("tab-"+x).className = "tab" + (x==="detalle"?" active":""));
      cargar();
    }

    // GENERACIÓN DE EXCEPCIÓN: rellena el detalle de UNA fecha puntual que quedó sin generar.
    // No borra nada. Solo crea las filas que faltan para ese día, respetando el candado del pasado.
    async function generarDetalleFecha() {
      const seguir = confirm(
        "RELLENAR UN DÍA SUELTO — uso excepcional\n\n"
        + "Esto sirve solo para tapar un hueco: un día que quedó SIN detalle generado (por ejemplo, un día pasado).\n\n"
        + "• Crea únicamente las jornadas que falten para ese día, tomándolas del plan.\n"
        + "• NO toca ninguna fila ya cargada (respeta el candado del pasado).\n"
        + "• NO es el flujo normal: para planificar a futuro usá «Generar detalle diario».\n\n"
        + "¿Continuar?"
      );
      if (!seguir) { setEstado("Cancelado.", "cargando"); return; }
      const fecha = prompt("Fecha a rellenar (formato AAAA-MM-DD).\nEjemplo: 2026-07-06", "");
      if (!fecha) { setEstado("Cancelado.", "cargando"); return; }
      if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) { setEstado("Fecha inválida. Usá el formato AAAA-MM-DD.", "err"); return; }
      const d = new Date(fecha + "T12:00:00");
      const finde = (d.getDay() === 0 || d.getDay() === 6);
      if ((finde || esFeriado(fecha)) && !confirm("El " + dmy(fecha) + " es fin de semana o feriado. ¿Rellenarlo igual?")) { setEstado("Cancelado.", "cargando"); return; }
      const { data: exist, error: eEx } = await sb.from("detalle_diario").select("*").eq("sede","la_huella").eq("fecha", fecha);
      if (eEx) return setEstado("Error: " + eEx.message, "err");
      const yaHay = new Set((exist||[]).map(r => r.persona_real + "|" + r.estacion_real + "|" + r.proyecto_id));
      const filas = [];
      plani.forEach(b => {
        const dias = diasHabiles(b.fecha_desde, b.fecha_hasta);
        if (!dias.includes(fecha)) return;
        const gente = planiPers[b.id] || [];
        gente.forEach(g => {
          if (noDispoEn(g, fecha)) return;
          const clave = g + "|" + b.estacion + "|" + b.proyecto_id;
          if (yaHay.has(clave)) return;
          const hrs = (planiHoras[b.id] && planiHoras[b.id][g]!=null) ? planiHoras[b.id][g] : 8;
          const vhPlan = costoHora(g, fecha);
          filas.push({ fecha, sede:"la_huella", persona_plan: g, persona_real: g, proyecto_id: b.proyecto_id, estacion_plan: b.estacion, subtarea_plan: b.subtarea, estacion_real: b.estacion, subtarea_real: b.subtarea, modulos_plan: b.modulos||null, modulos_real: b.modulos||null, horas_plan: hrs, horas_normales: hrs, horas_extra: 0, ausente: false, valor_hora_plan: vhPlan });
        });
      });
      supervisiones.forEach(s => {
        const ids = (s.proyectos||"").split(",").map(x=>x.trim()).filter(Boolean);
        if (!ids.length) return;
        const dias = diasHabiles(s.fecha_desde, s.fecha_hasta);
        if (!dias.includes(fecha)) return;
        if (noDispoEn(s.supervisor_id, fecha)) return;
        const clave = s.supervisor_id + "|" + SUP_MARK + "|" + ids[0];
        if (yaHay.has(clave)) return;
        const nombres = ids.map(nombreProy).join(", ");
        const hrs = (s.horas != null ? s.horas : 8);
        const vhPlanS = costoHora(s.supervisor_id, fecha);
        filas.push({ fecha, sede:"la_huella", persona_plan: s.supervisor_id, persona_real: s.supervisor_id, proyecto_id: ids[0], estacion_plan: SUP_MARK, subtarea_plan: nombres, estacion_real: SUP_MARK, subtarea_real: nombres, modulos_plan: null, modulos_real: null, horas_plan: hrs, horas_normales: hrs, horas_extra: 0, ausente: false, valor_hora_plan: vhPlanS });
      });
      if (!filas.length) {
        setEstado("No hay nada para rellenar el " + dmy(fecha) + ": o no había plan para ese día, o ya estaba todo cargado.", "cargando");
        return;
      }
      const { error: eIns } = await sb.from("detalle_diario").insert(filas);
      if (eIns) return setEstado("Error al rellenar: " + eIns.message, "err");
      setEstado("\u2713 " + dmy(fecha) + " rellenado: " + filas.length + " jornada(s) creada(s) desde el plan. Lo que ya estaba cargado no se tocó.", "ok");
      cargar();
    }

    // ============================================================
    // GENERADOR DE DETALLE DIARIO — BASE NEUQUÉN
    // Genera el detalle desde las tareas de mantenimiento (trailer = "proyecto",
    // tarea = "estación", subtareas = texto). Mismas reglas que La Huella:
    // pasado congelado (borra solo de hoy en adelante), días extra intactos,
    // filas con sede='neuquen'. Las horas de la tarea se aplican a CADA día.
    // ============================================================
    async function generarDetalleNqn() {
      const hoy = fechaStr(new Date());
      // Tareas válidas: con trailer, con fechas y con al menos una persona.
      const invalidas = [];
      const validas = mantTareas.filter(t=>{
        const tieneFechas = t.fecha_desde && t.fecha_hasta && diasHabiles(t.fecha_desde, t.fecha_hasta).length>0;
        const tienePers = (mantPers[t.id]||[]).length>0;
        const tieneTrailer = !!t.trailer_id;
        if(!tieneFechas || !tienePers || !tieneTrailer){ invalidas.push(t); return false; }
        return true;
      });
      if(!validas.length){
        setEstado("No hay tareas de mantenimiento completas para generar (necesitan trailer, fechas y al menos una persona).","err");
        return;
      }
      // traer detalle existente de Neuquén
      const { data: existente, error: eEx } = await sb.from("detalle_diario").select("*").eq("sede","neuquen");
      if (eEx) return setEstado("Error: " + eEx.message, "err");
      const futConDatos = (existente||[]).filter(d => d.fecha >= hoy && !d.es_extra && (d.ausente || d.horas_extra > 0 || d.estacion_real !== d.estacion_plan || d.persona_real !== d.persona_plan));
      let aviso = "";
      if (futConDatos.length > 0) aviso = "\n\nOJO: hay " + futConDatos.length + " registro(s) ya cargados de hoy en adelante que se regeneran y se pierden. (Los días extra no se tocan.)";
      if(invalidas.length) aviso += "\n\n" + invalidas.length + " tarea(s) quedan afuera por estar incompletas (sin trailer, fechas o personas).";
      if(!confirm("Generar el detalle diario de Base Neuquén desde "+validas.length+" tarea(s) de mantenimiento, de hoy en adelante."+aviso+"\n\n¿Continuar?")){ setEstado("Generación cancelada.","cargando"); return; }
      // borrar SOLO el detalle planificado de Neuquén de hoy en adelante; los días extra quedan.
      const { error: eDel } = await sb.from("detalle_diario").delete().eq("sede","neuquen").gte("fecha", hoy).or("es_extra.is.null,es_extra.eq.false");
      if (eDel) return setEstado("Error al limpiar futuro: " + eDel.message, "err");
      // generar filas nuevas de hoy en adelante
      const filas = [];
      validas.forEach(t=>{
        const dias = diasHabiles(t.fecha_desde, t.fecha_hasta).filter(d=> d>=hoy);
        const gente = mantPers[t.id] || [];
        const hrs = (t.horas!=null && t.horas!=="") ? Number(t.horas) : 8; // horas POR DÍA
        gente.forEach(g => dias.forEach(fecha => {
          if (noDispoEn(g, fecha)) return;
          const vhPlan = costoHora(g, fecha);
          filas.push({
            fecha, sede:"neuquen",
            persona_plan: g, persona_real: g,
            proyecto_id: null,
            trailer_id: t.trailer_id,          // el trailer va en su propia columna
            estacion_plan: t.tarea||"", subtarea_plan: t.subtarea||"",
            estacion_real: t.tarea||"", subtarea_real: t.subtarea||"",
            modulos_plan: null, modulos_real: null,
            horas_plan: hrs, horas_normales: hrs, horas_extra: 0,
            ausente: false, valor_hora_plan: vhPlan
          });
        }));
      });
      if (filas.length > 0) {
        const { error: eIns } = await sb.from("detalle_diario").insert(filas);
        if (eIns) return setEstado("Error al generar: " + eIns.message, "err");
      }
      registrarLog("crear","detalle","Detalle generado: "+filas.length+" jornada(s)");
      setEstado("\u2713 Detalle de Neuquén generado: " + filas.length + " registro(s) de hoy en adelante. El pasado quedó intacto.", "ok");
      cambiarTab("nqn_detalle");
    }

    /* ===== MOTOR DE IMPACTO (costo y tiempo, con signo) =====
       Devuelve:
       - porFila[id] = { costoDelta, costoTipo }  (costoDelta>0 sobrecosto, <0 ahorro)
       - porEstacion[key] = { diasPlan, diasReal, diasDelta, finPlan, finReal, atrasoDias, costoDiasDelta }
       - totales = { sobrecosto, ahorro, costoNeto, atraso, adelanto, tiempoNeto }
       key de estación = estacion_plan + "|" + proyecto_id  */
    function calcularImpacto(){
      const porFila = {};
      const porEstacion = {};
      // Cotizaciones y archivados no entran al panel de desvíos operativos.
      const proyOper = new Set(proyectosOperativos().map(p=>p.id));
      const esProyOper = (pid)=> proyOper.has(pid);
      const ensureEst = (key)=>{ if(!porEstacion[key]) porEstacion[key] = { diasPlanSet:new Set(), diasRealSet:new Set(), finPlan:null, finReal:null, costoDiasDelta:0, costoReal:0, costoPlan:0, costoImprod:0, tieneExtra:false, costoOrigen:{extra:0, edicion:0, planreal:0, jornal:0} }; return porEstacion[key]; };
      // Clasifica el origen del desvío de una fila: 'extra' | 'edicion' | 'planreal' | 'jornal'
      const norm = (x)=> (x==null ? "" : String(x));
      function origenDesvio(f){
        if(f.es_extra) return "extra";
        const hPlan = (f.horas_plan!=null ? Number(f.horas_plan) : Number(f.horas_normales)||0);
        const hRealTot = f.ausente ? 0 : ((Number(f.horas_normales)||0)+(Number(f.horas_extra)||0));
        const editada = norm(f.estacion_real)!==norm(f.estacion_plan)
                      || norm(f.persona_real)!==norm(f.persona_plan)
                      || !!f.ausente
                      || Math.abs(hRealTot - hPlan) > 0.01;
        if(editada) return "edicion";
        // No editada: si el valor-hora real (mes de la fecha) difiere del valor planificado
        // congelado al generar, el desvío es por cambio de valor jornal.
        const chReal = costoHora(f.persona_real, f.fecha);
        const chPlan = (f.valor_hora_plan!=null) ? Number(f.valor_hora_plan) : costoHora(f.persona_plan!=null?f.persona_plan:f.persona_real, f.fecha);
        if(Math.abs(chReal - chPlan) > 0.001) return "jornal";
        return "planreal";
      }
      // --- Costo por fila: (horas reales - horas plan) * costo/hora; extra cuenta x2 ---
      // Solo cuentan las filas ya ejecutadas (fecha < hoy). El día en curso y el futuro
      // todavía son plan, no ejecución: no generan desvío de costo.
      detalle.forEach(f=>{
        if(!esFechaReal(f.fecha)) return;
        if(!esProyOper(f.proyecto_id)) return;
        const ch = costoHora(f.persona_real, f.fecha);            // valor del mes real (vigente)
        const chPlan = (f.valor_hora_plan!=null) ? Number(f.valor_hora_plan) : costoHora(f.persona_plan!=null?f.persona_plan:f.persona_real, f.fecha); // valor congelado al planificar
        const hPlan = (f.horas_plan!=null ? Number(f.horas_plan) : Number(f.horas_normales)||0);
        const hReal = f.ausente ? 0 : (Number(f.horas_normales)||0);
        const hExtra = f.ausente ? 0 : (Number(f.horas_extra)||0);
        // costo real incluye extra a 1.5x/2x según el día (con valor vigente); costo plan usa horas y valor planificados.
        // Ausencia (directo mensualizado): se pagó igual la jornada planificada, aunque no produjo → suma como costo improductivo.
        const costoReal = f.ausente ? (hPlan*ch) : (hReal*ch + hExtra*ch*multExtra(f.fecha));
        const costoImprod = f.ausente ? (hPlan*ch) : 0;
        const costoPlan = hPlan*chPlan;
        const delta = costoReal - costoPlan;  // >0 sobrecosto, <0 ahorro
        let tipo = "neutro";
        if (Math.abs(delta) > 0.5) tipo = delta>0 ? "sobrecosto" : "ahorro";
        const origen = origenDesvio(f);
        porFila[f.id] = { costoDelta: delta, costoTipo: tipo, ch, origen };
        // acumular costo en la estación real del proyecto
        const ke = f.estacion_real + "|" + f.proyecto_id;
        const e = ensureEst(ke);
        e.costoReal += costoReal; e.costoPlan += costoPlan; e.costoImprod += costoImprod;
        if(Math.abs(delta) > 0.5) e.costoOrigen[origen] += delta;
        if(f.es_extra) e.tieneExtra = true;
      });
      // --- Tiempo y días por estación/proyecto ---
      // Plan: de la tabla plani (bloques), pero SOLO los días que ya deberían haber ocurrido
      // (hasta ayer). Comparar el plan futuro contra un real que aún no existe daría atraso falso.
      plani.forEach(b=>{
        if(!esProyOper(b.proyecto_id)) return;
        const key = b.estacion + "|" + b.proyecto_id;
        const diasPlan = diasHabiles(b.fecha_desde, b.fecha_hasta).filter(esFechaReal);
        const pe = ensureEst(key);
        diasPlan.forEach(d=> pe.diasPlanSet.add(d));
        if (diasPlan.length){ const fin = diasPlan[diasPlan.length-1]; if(!pe.finPlan || fin>pe.finPlan) pe.finPlan = fin; }
      });
      // Real: fechas trabajadas en el detalle por estación_real+proyecto, solo hasta ayer
      detalle.forEach(f=>{
        if (f.ausente) return;
        if (!esFechaReal(f.fecha)) return;
        if (!esProyOper(f.proyecto_id)) return;
        const key = f.estacion_real + "|" + f.proyecto_id;
        const pe = ensureEst(key);
        pe.diasRealSet.add(f.fecha);
        if (!pe.finReal || f.fecha>pe.finReal) { pe.finReal = f.fecha; pe.finRealOrigen = (porFila[f.id] ? porFila[f.id].origen : "planreal"); }
      });
      // Consolidar métricas por estación
      Object.values(porEstacion).forEach(e=>{
        e.diasPlan = e.diasPlanSet.size;
        e.diasReal = e.diasRealSet.size;
        e.diasDelta = e.diasReal - e.diasPlan;       // >0 más días, <0 menos
        e.costoDelta = e.costoReal - e.costoPlan;    // >0 sobrecosto, <0 ahorro (real vs plan)
        // atraso/adelanto en días hábiles entre finPlan y finReal
        if (e.finPlan && e.finReal){
          const signo = e.finReal > e.finPlan ? 1 : (e.finReal < e.finPlan ? -1 : 0);
          const a = e.finReal>e.finPlan ? e.finPlan : e.finReal;
          const b = e.finReal>e.finPlan ? e.finReal : e.finPlan;
          const span = Math.max(0, diasHabiles(a,b).length - 1);
          e.atrasoDias = signo * span;               // >0 atraso, <0 adelanto
        } else e.atrasoDias = 0;
        // origen del desvío de tiempo: lo atribuimos a la fila que fija el último día real.
        // si no hubo corrimiento (atraso 0) o no hay finReal, queda como plan vs real.
        e.atrasoOrigen = (e.atrasoDias!==0 && e.finRealOrigen) ? e.finRealOrigen : "planreal";
      });
      // --- Agregación POR PROYECTO ---
      // COSTO (dos cifras):
      //   - costoNetoPlan = sobrecosto - ahorro  (real vs plan, fila por fila)
      //   - costoReal vs presupuesto_mo          (real vs presupuesto)
      // TIEMPO (dos cifras):
      //   - atrasoProy = fin plan vs fin real del PROYECTO COMPLETO
      //   - atrasoEst  = suma de atrasos/adelantos de las estaciones del proyecto
      const porProyecto = {};
      const ensureProy = (pid)=>{ if(!porProyecto[pid]) porProyecto[pid] = { sobrecosto:0, ahorro:0, costoNetoPlan:0, costoReal:0, costoImprod:0, presup:0, costoVsPresup:0, finPlan:null, finReal:null, atrasoProy:0, atrasoEst:0, tieneExtra:false, costoOrigen:{extra:0, edicion:0, planreal:0, jornal:0}, tiempoOrigen:{extra:0, edicion:0, planreal:0, jornal:0} }; return porProyecto[pid]; };
      // costo por proyecto (desde las filas): delta vs plan + costo real absoluto — solo ejecutado
      detalle.forEach(f=>{
        if(!esFechaReal(f.fecha)) return;
        const pid = f.proyecto_id; if(pid==null) return;
        const pp = ensureProy(pid);
        const fi = porFila[f.id];
        const d = fi ? fi.costoDelta : 0;
        if(d>0) pp.sobrecosto += d; else if(d<0) pp.ahorro += (-d);
        if(fi && Math.abs(d)>0.5) pp.costoOrigen[fi.origen] += d;
        if(f.ausente){
          // Ausencia pagada (mensualizado): suma al costo real como jornada planificada, y se registra como improductivo.
          const ch=costoHora(f.persona_real, f.fecha);
          const hp=(f.horas_plan!=null?Number(f.horas_plan):Number(f.horas_normales)||0);
          pp.costoReal += hp*ch; pp.costoImprod += hp*ch;
        } else {
          const ch=costoHora(f.persona_real, f.fecha); pp.costoReal += (Number(f.horas_normales)||0)*ch + (Number(f.horas_extra)||0)*ch*multExtra(f.fecha);
        }
        if(f.es_extra) pp.tieneExtra = true;
      });
      // presupuesto MO por proyecto (de la tabla proyectos): total = La Huella + Montaje
      proyectos.forEach(p=>{ const pp = porProyecto[p.id]; if(pp){ pp.presup = presupMO(p); pp.presupHuella = presupHuella(p); pp.presupMontaje = presupMontaje(p); } });
      // fin planificado por proyecto (desde plani), recortado a lo que ya debería haber ocurrido
      plani.forEach(b=>{
        const dP = diasHabiles(b.fecha_desde, b.fecha_hasta).filter(esFechaReal);
        if(!dP.length) return;
        const pp = ensureProy(b.proyecto_id);
        const fin = dP[dP.length-1];
        if(!pp.finPlan || fin>pp.finPlan) pp.finPlan = fin;
      });
      // fin real por proyecto (desde detalle, días efectivamente trabajados hasta ayer)
      detalle.forEach(f=>{
        if(f.ausente) return; if(!esFechaReal(f.fecha)) return; const pid=f.proyecto_id; if(pid==null) return;
        const pp = ensureProy(pid);
        if(!pp.finReal || f.fecha>pp.finReal) pp.finReal = f.fecha;
      });
      // suma de atrasos de estaciones, agrupada por proyecto (segundo corte de tiempo)
      Object.entries(porEstacion).forEach(([k,e])=>{
        const proyId = k.split("|")[1];
        const pp = porProyecto[proyId]; if(!pp) return;
        pp.atrasoEst += (e.atrasoDias||0);
        if(e.atrasoDias) pp.tiempoOrigen[e.atrasoOrigen||"planreal"] += e.atrasoDias;
      });
      Object.values(porProyecto).forEach(pp=>{
        pp.costoNetoPlan = pp.sobrecosto - pp.ahorro;
        pp.costoVsPresup = pp.presup ? (pp.costoReal - pp.presup) : null; // null = sin presupuesto cargado
        if(pp.finPlan && pp.finReal){
          const signo = pp.finReal>pp.finPlan ? 1 : (pp.finReal<pp.finPlan ? -1 : 0);
          const a = pp.finReal>pp.finPlan ? pp.finPlan : pp.finReal;
          const b = pp.finReal>pp.finPlan ? pp.finReal : pp.finPlan;
          const span = Math.max(0, diasHabiles(a,b).length - 1);
          pp.atrasoProy = signo * span;
        } else pp.atrasoProy = 0;
      });
      // Totales
      let sobrecosto=0, ahorro=0, atraso=0, adelanto=0;
      Object.values(porFila).forEach(f=>{ if(f.costoDelta>0) sobrecosto+=f.costoDelta; else if(f.costoDelta<0) ahorro+=(-f.costoDelta); });
      Object.values(porEstacion).forEach(e=>{ if(e.atrasoDias>0) atraso+=e.atrasoDias; else if(e.atrasoDias<0) adelanto+=(-e.atrasoDias); });
      const totales = { sobrecosto, ahorro, costoNeto: sobrecosto-ahorro, atraso, adelanto, tiempoNeto: atraso-adelanto };
      return { porFila, porEstacion, porProyecto, totales };
    }
    function fmtPlata(n){ const s=n<0?"-":""; return s+"$"+Math.abs(Math.round(n)).toLocaleString("es-AR"); }
    // Etiqueta visual del origen del desvío
    const ORIGEN_META = {
      extra:    { label:"Día extra",   bg:"#FAEEDA", fg:"#854F0B" },
      edicion:  { label:"Edición",     bg:"#E6F1FB", fg:"#0C447C" },
      jornal:   { label:"Cambio de valor jornal", bg:"#EFE7FB", fg:"#6B3FA0" },

      const optTr = (sel)=> '<option value="">(sin trailer)</option>'+trailers.map(tr=>'<option value="'+tr.id+'" '+(tr.id===sel?'selected':'')+'>'+trailerIfTipo(tr).replace(/"/g,'&quot;')+'</option>').join('');
      const catsNqn = Object.keys(tareasDeMant()).sort((a,b)=>a.localeCompare(b,"es"));

      const optSubN = (cat,sel)=>{ const cc=tareasDeMant(); const base=(cat&&cc[cat])?cc[cat].map(s=>s.subtarea).filter(Boolean):[]; if(sel && !base.includes(sel)) base.unshift(sel); return '<option value="">(subtarea)</option>'+base.map(s=>'<option value="'+String(s).replace(/"/g,'&quot;')+'" '+(s===sel?'selected':'')+'>'+String(s).replace(/</g,'&lt;')+'</option>').join(''); };
      const optPersN = (sel)=> personasDe("neuquen").map(p=>'<option value="'+p.id+'" '+(p.id===sel?'selected':'')+'>'+p.nombre+'</option>').join('');

      h += '<table><thead><tr><th>Fecha</th><th>Trailer</th><th>Tarea</th><th>Subtareas</th><th>Persona</th><th>H. norm.</th><th>H. extra</th><th>Aus.</th></tr></thead><tbody>';
      filasVisibles.forEach(f=>{

    // Editar una fila del detalle de Neuquén (horas normales/extra).
    async function editarDetNqn(id, c, v){
      const val = (v===""?0:Number(v)); if(isNaN(val)) return setEstado("Valor inválido.","err");
      const { error } = await sb.from("detalle_diario").update({ [c]: val }).eq("id", id);
      if (error) return setEstado("Error: "+error.message,"err");
      const f = detalle.find(x=>x.id===id); if(f) f[c]=val; setEstado("\u2713 Guardado.","ok"); renderDetalleNqn();
    }
    // Editar un campo de texto/id del detalle de Neuquén (trailer, subtarea, persona).
    async function editarDetNqnCampo(id, c, v){
      const u = {}; u[c] = (v===""?null:v);
      const { error } = await sb.from("detalle_diario").update(u).eq("id", id);
      if (error) return setEstado("Error: "+error.message,"err");
      const f = detalle.find(x=>x.id===id); if(f) f[c]=u[c]; setEstado("\u2713 Guardado.","ok"); renderDetalleNqn();
    }
    // Cambiar la Tarea (categoría) del detalle de Neuquén: al cambiar, se resetea la subtarea a la primera de la categoría.
    async function cambiarTareaDetNqn(id, cat){
      const cc = tareasDeMant();
      const primeraSub = (cat && cc[cat] && cc[cat].length) ? (cc[cat][0].subtarea||"") : "";
      const { error } = await sb.from("detalle_diario").update({ estacion_real: cat||null, subtarea_real: primeraSub||null }).eq("id", id);
      if (error) return setEstado("Error: "+error.message,"err");
      const f = detalle.find(x=>x.id===id); if(f){ f.estacion_real=cat||null; f.subtarea_real=primeraSub||null; }
      setEstado("\u2713 Guardado.","ok"); renderDetalleNqn();
    }
    // Marcar ausente en el detalle de Neuquén, con la misma opción de correr tareas.
    async function toggleAusenteNqn(id, aus){
      const { error } = await sb.from("detalle_diario").update({ ausente: aus }).eq("id", id);
      if (error) return setEstado("Error: "+error.message,"err");
      const f = detalle.find(x=>x.id===id); if(f) f.ausente = aus;
      setEstado("\u2713 Guardado.","ok");
      if(aus && f){ await ofrecerCorrerDetalle(f); }
      renderDetalleNqn();
    }
    // "Sigue mañana" para Neuquén: crea una jornada extra para mañana desde la fila de hoy.
    function seguirMananaNqn(id){
      const f = detalle.find(x=>x.id===id);
      if(!f){ setEstado("No encontré la fila.","err"); return; }
      const manana = sumarDiasHabiles(hoyISO(), 1);
      abrirDiaExtraNqn({ fecha: manana, trailer_id: f.trailer_id, persona: f.persona_real, tarea: f.estacion_real, subtarea: f.subtarea_real, origenFilaId: f.id });
    }

          const extraTag = p.tieneExtra ? '<span style="background:#BA7517;color:#fff;font-size:8.5px;padding:1px 5px;border-radius:5px;font-weight:600;margin-left:6px">EXTRA</span>' : '';

        h += '</div>';

      filasVisibles.forEach(f => {

        const reasig = (norm(f.estacion_real) !== norm(f.estacion_plan)) || (norm(f.persona_real) !== norm(f.persona_plan)) || !!f.ausente;

          + '<td style="text-align:center"><input type="number" '+dis+' value="'+(f.horas_extra||0)+'" onchange="editarDet(\''+f.id+'\',\'horas_extra\',Number(this.value))" style="width:42px;text-align:center;'+(f.horas_extra>0?'color:#BA7517':'')+'" '+(f.ausente?'disabled':'')+'></td>'
          + (function(){ const fi=imp.porFila[f.id]; if(!fi||fi.costoTipo==="neutro") return '<td style="text-align:right"><span style="color:#D3D1C7;font-size:11px">—</span></td>'; const col=fi.costoDelta>0?'#A32D2D':'#3B6D11'; const et=fi.costoDelta>0?'sobrecosto':'ahorro'; return '<td style="text-align:right"><span style="color:'+col+';font-size:11.5px;font-weight:600" title="'+et+'">'+fmtPlata(fi.costoDelta)+'</span></td>'; })()
          + '<td>'+(pideMotivo?'<select '+dis+' onchange="editarDet(\''+f.id+'\',\'motivo_desvio\',this.value)" style="min-width:160px;border-color:'+(f.motivo_desvio?'#BA7517':'#A32D2D')+';'+(f.motivo_desvio?'':'background:#FCEBEB')+'">'+opcMotivo(f.motivo_desvio)+'</select>':'<span style="color:#D3D1C7;font-size:11px">—</span>')+'</td>'
          + '</tr>';

      h += '</tbody></table></div><div class="row-actions no-print"><button class="btn btn-primary" onclick="cargar()">↻ Recargar</button></div>';

      h += '<p style="font-size:12px;color:#A8A69E;margin-top:10px">🔒 = día anterior a hoy (historia, no editable). Las filas con fondo crema tienen desvío (estación o persona distinta a lo planificado) y piden un motivo. <b style="color:#BA7517">↪ sigue mañana</b> (solo en filas de hoy): si una tarea no se terminó, crea una jornada para mañana sin tocar la planificación. Para cambios grandes (reasignar, redistribuir), usá Planificación General y regenerá el detalle.</p>';

    async function cambiarProyDet(id, proyId){
      const { error } = await sb.from("detalle_diario").update({ proyecto_id: proyId, modulos_real: null }).eq("id", id);
      if(error) return setEstado("Error: "+error.message,"err");
      const f = detalle.find(x=>x.id===id); if(f){ f.proyecto_id=proyId; f.modulos_real=null; }
      setEstado("\u2713 Guardado.","ok"); renderDetalle();
    }
    async function editarDet(id, c, v) { const u = {}; u[c] = v; const { error } = await sb.from("detalle_diario").update(u).eq("id", id); if (error) return setEstado("Error: " + error.message, "err"); const f = detalle.find(x=>x.id===id); if(f) f[c]=v; setEstado("\u2713 Guardado.", "ok"); renderDetalle(); }
    function celdaModulos(f, pasado){
      const mods = modulosDeProy(f.proyecto_id);
      const sel = (f.modulos_real||"").split(",").map(s=>s.trim()).filter(Boolean);
      if(!mods.length){ return '<span style="font-size:11px;color:#A8A69E">'+(sel.length?sel.join(", "):"—")+'</span>'; }
      if(pasado){ return '<span style="font-size:11.5px;color:#5F5E5A">'+(sel.length?sel.join(", "):"—")+'</span>'; }
      return '<div class="chips" style="margin-top:0;gap:3px">'+mods.map(md=>{const on=sel.includes(md);return '<button class="chip'+(on?' on':'')+'" style="padding:2px 7px;font-size:10.5px" onclick="toggleModuloDet(\''+f.id+'\',\''+md.replace(/'/g,"\\\\'")+'\','+(on?'true':'false')+')">'+md+'</button>';}).join('')+'</div>';
    }
    async function toggleModuloDet(id, mod, estaba){
      const f = detalle.find(x=>x.id===id); if(!f) return;
      let mods = (f.modulos_real||"").split(",").map(s=>s.trim()).filter(Boolean);
      if(estaba) mods = mods.filter(s=>s!==mod); else if(!mods.includes(mod)) mods.push(mod);
      const nuevo = mods.join(", ");
      const { error } = await sb.from("detalle_diario").update({ modulos_real: nuevo }).eq("id", id);
      if(error) return setEstado("Error: "+error.message,"err");
      f.modulos_real = nuevo; setEstado("\u2713 Guardado.","ok"); renderDetalle();
    }
    async function cambiarEstDet(id, est) { const sub = STATIONS[est].subs[0]; const { error } = await sb.from("detalle_diario").update({ estacion_real: est, subtarea_real: sub }).eq("id", id); if (error) return setEstado("Error: " + error.message, "err"); const f = detalle.find(x=>x.id===id); if(f){f.estacion_real=est;f.subtarea_real=sub;} setEstado("\u2713 Guardado.", "ok"); renderDetalle(); }
    async function toggleAusente(id, val) {
      const u = val ? { ausente: true, horas_normales: 0, horas_extra: 0 } : { ausente: false, horas_normales: 8 };
      const { error } = await sb.from("detalle_diario").update(u).eq("id", id);
      if (error) return setEstado("Error: " + error.message, "err");
      const f = detalle.find(x=>x.id===id); if(f) Object.assign(f,u);
      setEstado("\u2713 Guardado.", "ok");
      // Replanificación en el detalle: si marcaste ausente, la tarea de esa persona no se hizo ese día.
      // Ofrecer correr sus días futuros (misma persona, mismo proyecto+estación) un día hábil hacia adelante.
      if(val && f && !f.es_extra){ await ofrecerCorrerDetalle(f); }
      renderDetalle();
    }
    // Corre un día hábil hacia adelante las filas dadas (de la última a la primera para no colisionar).
    async function correrFilasUnDia(cand){
      let ok=0;
      for(let i=cand.length-1;i>=0;i--){
        const x=cand[i];
        const nueva = sumarDiasHabiles(x.fecha, 1);
        const { error } = await sb.from("detalle_diario").update({ fecha: nueva }).eq("id", x.id);
        if(error){ setEstado("Error al correr un día: "+error.message,"err"); continue; }
        x.fecha = nueva; ok++;
      }
      detalle.sort((a,b)=> a.fecha<b.fecha?-1:a.fecha>b.fecha?1:0);
      return ok;
    }
    // Revisa las filas futuras (de hoy en adelante) de una persona y detecta días con
    // solapamiento: 2+ tareas el mismo día O más de 8 horas. Supervisión NO cuenta.
    function avisoSolapamiento(personaId){
      const hoy = hoyISO();
      const porDia = {};
      detalle.forEach(f=>{
        if(f.persona_real!==personaId) return;
        if(f.fecha < hoy) return;
        if(f.ausente) return;
        if(f.estacion_real===SUP_MARK) return;
        const d = porDia[f.fecha] || (porDia[f.fecha] = { tareas:new Set(), horas:0 });
        d.tareas.add(f.estacion_real + "|" + refTarea(f));
        d.horas += (Number(f.horas_normales)||0) + (Number(f.horas_extra)||0);
      });
      const conflict = Object.keys(porDia).sort()
        .filter(d => porDia[d].tareas.size >= 2 || porDia[d].horas > 8)
        .map(d => dmy(d) + " (" + (porDia[d].tareas.size>=2 ? porDia[d].tareas.size+" tareas" : porDia[d].horas+"h") + ")");
      if(!conflict.length) return "";
      return "⚠ Atención: tras correr, "+nombrePersona(personaId)+" queda con superposición en:\n\n"
        + "• " + conflict.join("\n• ")
        + "\n\nRevisalo en el Detalle diario, o rearmá su agenda en Planificación General si el cambio es grande. (No se bloquea nada; vos decidís.)";
    }
    // Ofrece correr las tareas futuras de una persona a partir de una fila de referencia.
    // Dos alcances: solo esta tarea (misma estación+proyecto) o todas las tareas de la persona.
    async function ofrecerCorrerDetalle(filaRef, motivo){
      const hoy = hoyISO();
      motivo = motivo || ("quedó ausente el "+dmy(filaRef.fecha)+" en "+nombreEstacion(filaRef.estacion_real));
      const futuras = detalle.filter(x => x.id!==filaRef.id
        && x.persona_real===filaRef.persona_real
        && !x.ausente && !x.es_extra
        && x.fecha > filaRef.fecha && x.fecha >= hoy);
      const candTarea = futuras.filter(x => refTarea(x)===refTarea(filaRef) && x.estacion_real===filaRef.estacion_real)
        .sort((a,b)=> a.fecha<b.fecha?-1:1);
      const candTodo = [...futuras].sort((a,b)=> a.fecha<b.fecha?-1:1);
      if(!candTodo.length) return;
      let cand;
      if(candTodo.length === candTarea.length){
        const msg = nombrePersona(filaRef.persona_real)+" "+motivo+".\n\n"
          + "Sus tareas siguientes ("+candTarea.length+" día/s futuro/s) quedaron desfasadas. ¿Qué hacemos?\n\n"
          + "• Aceptar = ARRASTRAR todo automáticamente (corre esos "+candTarea.length+" día/s un día hábil hacia adelante).\n"
          + "• Cancelar = NO tocar nada; lo ajusto yo después en Planificación General.\n\n"
          + "(De hoy en adelante. El pasado no se toca.)";
        if(!confirm(msg)) return;
        cand = candTarea;
      } else {
        const msg = nombrePersona(filaRef.persona_real)+" "+motivo+".\n\n"
          + "¿Qué querés correr un día hábil hacia adelante?\n\n"
          + "• Aceptar = SOLO esta tarea ("+candTarea.length+" día/s en "+nombreEstacion(filaRef.estacion_real)+")\n"
          + "• Cancelar = elegir en el próximo paso si corrés TODO\n\n"
          + "(De hoy en adelante. El pasado no se toca.)";
        if(confirm(msg)){
          cand = candTarea;
        } else {
          const msg2 = "¿Correr TODAS las tareas futuras de "+nombrePersona(filaRef.persona_real)+"?\n\n"
            + "Son "+candTodo.length+" día(s) en distintas estaciones/proyectos.\n\n"
            + "(Aceptar = correr todo · Cancelar = no correr nada)";
          if(!confirm(msg2)) return;
          cand = candTodo;
        }
      }
      if(!cand.length) return;
      const ok = await correrFilasUnDia(cand);
      setEstado("\u2713 "+ok+" día(s) corrido(s) un día hábil hacia adelante.","ok");
      const aviso = avisoSolapamiento(filaRef.persona_real);
      if(aviso) alert(aviso);
    }

    /* ---- DÍA EXTRA (trabajo real no planificado) ---- */
    function cerrarDiaExtra(){ const ov=document.getElementById("ovExtra"); if(ov) ov.remove(); }
    function abrirDiaExtra(pre){
      cerrarDiaExtra();
      pre = pre || null;
      const hoy = fechaStr(new Date());
      const fechaDefault = pre && pre.fecha ? pre.fecha : hoy;
      const esSeguir = !!pre;

    // ---- VALOR-HORA POR MES (con histórico) ----
    function mesDe(fechaISO){ return fechaISO ? fechaISO.slice(0,7) : null; } // 'YYYY-MM'
    // Valor-hora de una persona para un mes dado.
    // 1) valor exacto del mes; 2) último mes anterior cargado; 3) costo_hora base actual.
    function valorHoraMes(pid, mes){
      const base = (()=>{ const p=personas.find(x=>x.id===pid); return p?(Number(p.costo_hora)||0):0; })();
      const h = valorHoraHist[pid];
      if(!h || !mes) return base;
      if(h[mes]!=null) return h[mes];
      const anteriores = Object.keys(h).filter(m=>m<mes).sort();
      if(anteriores.length) return h[anteriores[anteriores.length-1]];
      return base; // no hay valor anterior → base
    }
    // ¿el mes tiene valor propio cargado? (para avisos)
    function mesTieneValor(pid, mes){ const h=valorHoraHist[pid]; return !!(h && mes && h[mes]!=null); }
    // costoHora(pid, fecha): valor-hora vigente en el mes de esa fecha. Sin fecha → base actual.
    function costoHora(pid, fecha){ if(!fecha) { const p=personas.find(x=>x.id===pid); return p?(Number(p.costo_hora)||0):0; } return valorHoraMes(pid, mesDe(fecha)); }
    // especialidadMes(pid, fecha): especialidad vigente en el mes de esa fecha (mismo criterio en cascada que valorHoraMes).
    // 1) especialidad exacta del mes; 2) último mes anterior cargado; 3) especialidad base actual de la persona.
    function especialidadMes(pid, fecha){
      const base = (()=>{ const p=personas.find(x=>x.id===pid); return p?(p.especialidad||"—"):"—"; })();
      const mes = mesDe(fecha);
      const h = especialidadHist[pid];
      if(!h || !mes) return base;
      if(h[mes]!=null && h[mes]!=="") return h[mes];
      const anteriores = Object.keys(h).filter(m=>m<mes).sort();
      if(anteriores.length) return h[anteriores[anteriores.length-1]] || base;
      return base;
    }
    function nombreEstacion(k){ if(k===SUP_MARK) return SUP_LABEL; return STATIONS[k] ? STATIONS[k].label : k; }

    // Presupuesto: desdoblado en La Huella (todas las estaciones menos Montaje) y Montaje.
    function presupHuella(pr){ return Number(pr && pr.presupuesto_mo_huella)||0; }
    function presupMontaje(pr){ return Number(pr && pr.presupuesto_mo_montaje)||0; }
    function presupMO(pr){ return presupHuella(pr)+presupMontaje(pr); }

    // Bloque "Origen del desvío" para la Vista PM: cuánto del sobre/subcosto viene de cada causa.
    function bloqueOrigenDesvio(det){
      const norm=(x)=> x==null?"":String(x);
      const acc={extra:0, edicion:0, jornal:0, planreal:0};
      det.forEach(f=>{
        if(!esFechaReal(f.fecha)) return;
        const ch=costoHora(f.persona_real,f.fecha);
        const chPlan=(f.valor_hora_plan!=null)?Number(f.valor_hora_plan):ch;
        const hPlan=(f.horas_plan!=null?Number(f.horas_plan):Number(f.horas_normales)||0);
        const hReal=f.ausente?0:(Number(f.horas_normales)||0);
        const hExtra=f.ausente?0:(Number(f.horas_extra)||0);
        const delta=(hReal*ch+hExtra*ch*multExtra(f.fecha))-(hPlan*chPlan);
        if(Math.abs(delta)<=0.5) return;
        let origen;
        if(f.es_extra) origen="extra";
        else {
          const editada = norm(f.estacion_real)!==norm(f.estacion_plan) || norm(f.persona_real)!==norm(f.persona_plan) || !!f.ausente || Math.abs(((Number(f.horas_normales)||0)+(Number(f.horas_extra)||0))-hPlan)>0.01;
          if(editada) origen="edicion";
          else if(Math.abs(ch-chPlan)>0.001) origen="jornal";
          else origen="planreal";
        }
        acc[origen]+=delta;
      });
      const total=Object.values(acc).reduce((s,v)=>s+Math.abs(v),0);
      if(total<=0.5) return '';
      const fmtAR=(n)=>(n>=0?'+':'')+'$'+Math.round(n).toLocaleString("es-AR");
      let x='<div style="background:#fff;border:1px solid #E6E4DC;border-radius:14px;padding:16px;margin-bottom:16px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">Origen del desvío de costo</div><div style="font-size:11.5px;color:#A8A69E;margin-bottom:12px">De qué proviene el desvío acumulado: alcance (día extra), gestión (edición), inflación (valor jornal) o ejecución (plan vs real).</div>';
      ["extra","edicion","jornal","planreal"].forEach(o=>{
        const v=acc[o]; if(Math.abs(v)<=0.5) return;
        const m=ORIGEN_META[o]; const pct=Math.abs(v)/total*100;
        x+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px">'
          + '<span style="width:150px">'+tagOrigen(o)+'</span>'
          + '<div style="flex:1;background:#F1EFE8;border-radius:4px;height:18px"><div style="width:'+pct+'%;background:'+m.fg+';height:100%;border-radius:4px;opacity:.85"></div></div>'
          + '<span style="width:110px;text-align:right;color:'+(v>0?'#A32D2D':'#3B6D11')+'">'+fmtAR(v)+'</span></div>';
      });
      return x+'</div>';
    }
    function renderDash() {
      // Dashboard opera solo sobre proyectos en operación (cotizaciones y archivados quedan fuera).
      const proyOperD = proyectosOperativos();
      const proyOperDset = new Set(proyOperD.map(p=>p.id));
      const proyVig = proyOperD.filter(p => p.estado !== "Cerrado");
      let det = detalle.filter(f => proyOperDset.has(f.proyecto_id));
      if (dashProy) det = det.filter(f => f.proyecto_id === dashProy);
      // KPIs — solo ejecución real (hasta ayer). El día en curso y el futuro son plan, no desvío.
      let jornal=0, extra=0, ausencias=0, hsExtra=0, costoImprodD=0;
      det.forEach(f => { if(!esFechaReal(f.fecha)) return; const ch=costoHora(f.persona_real, f.fecha); if (f.ausente){ ausencias++; const hp=(f.horas_plan!=null?Number(f.horas_plan):Number(f.horas_normales)||0); costoImprodD += hp*ch; return; } jornal+=(Number(f.horas_normales)||0)*ch; extra+=(Number(f.horas_extra)||0)*ch*multExtra(f.fecha); hsExtra+=(Number(f.horas_extra)||0); });
      const real = jornal+extra+costoImprodD;
      const presup = (dashProy ? proyectos.filter(p=>p.id===dashProy) : proyOperD).reduce((s,p)=>s+presupMO(p),0);
      // --- Índices de desempeño (Earned Value) ---
      // CPI = costo planificado del trabajo hecho / costo real. >1 = eficiente (gastás menos de lo previsto).
      // SPI = días reales trabajados / días planificados hasta hoy. >1 = adelantado; <1 = atrasado.
      let costoPlanEV=0, costoRealEV=0;
      det.forEach(f=>{
        if(!esFechaReal(f.fecha)) return;
        const chReal = costoHora(f.persona_real, f.fecha);
        const chPlan = (f.valor_hora_plan!=null) ? Number(f.valor_hora_plan) : chReal;
        const hReal = Number(f.horas_normales)||0, hExtra=Number(f.horas_extra)||0;
        const hPlan = (f.horas_plan!=null ? Number(f.horas_plan) : hReal);
        if(f.ausente){
