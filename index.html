<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planificación Mano de Obra — Personal (prueba Supabase)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F7F6F2; color: #2C2C2A; margin: 0; padding: 24px; }
    .wrap { max-width: 880px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 2px; }
    .sub { font-size: 13px; color: #888780; margin: 0 0 18px; }
    .estado { font-size: 12.5px; padding: 8px 12px; border-radius: 8px; margin-bottom: 16px; }
    .ok { background: #E1F5EE; color: #0F6E56; }
    .err { background: #FCEBEB; color: #A32D2D; }
    .cargando { background: #F1EFE8; color: #5F5E5A; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #E6E4DC; border-radius: 12px; overflow: hidden; font-size: 13px; }
    thead tr { background: #F1EFE8; }
    th { text-align: left; padding: 9px 12px; font-weight: 600; color: #5F5E5A; font-size: 12px; }
    td { padding: 6px 10px; border-top: 1px solid #F1EFE8; }
    input, select { border: 1px solid #E6E4DC; border-radius: 6px; padding: 5px 7px; font-size: 12.5px; width: 100%; }
    .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #185FA5; color: #fff; }
    .btn-add { background: transparent; border: 1px dashed #E6E4DC; color: #185FA5; padding: 8px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 12px; }
    .btn-del { border: none; background: transparent; color: #A8A69E; cursor: pointer; font-size: 16px; }
    .row-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Personal y tarifas</h1>
    <p class="sub">Etapa 1 — Prueba de conexión a Supabase. Lo que cargues acá se guarda de verdad en la base.</p>
    <div id="estado" class="estado cargando">Conectando con Supabase…</div>
    <div id="contenido"></div>
  </div>

  <script>
    // --- Credenciales de tu proyecto Supabase ---
    const SUPABASE_URL = "https://lppceugnfuzuvzclhlce.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwcGNldWduZnV6dXZ6Y2xobGNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDYwNjUsImV4cCI6MjA5NjA4MjA2NX0.R8EHV_jYyFmozaeAInYYwsmPzSJA3gRsZZbsixF0W0c";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const estado = document.getElementById("estado");
    const contenido = document.getElementById("contenido");
    let personas = [];

    function setEstado(msg, clase) { estado.textContent = msg; estado.className = "estado " + clase; }

    async function cargar() {
      setEstado("Conectando con Supabase…", "cargando");
      const { data, error } = await sb.from("personal").select("*").order("creado_en", { ascending: true });
      if (error) {
        setEstado("Error al leer: " + error.message + " (revisá las políticas de acceso / RLS)", "err");
        return;
      }
      personas = data || [];
      setEstado("✓ Conectado. " + personas.length + " persona(s) en la base.", "ok");
      render();
    }

    function render() {
      let html = '<table><thead><tr><th>Legajo</th><th>Nombre</th><th>Especialidad</th><th>Tipo</th><th style="text-align:right">Costo hora</th><th></th></tr></thead><tbody>';
      if (personas.length === 0) {
        html += '<tr><td colspan="6" style="color:#A8A69E;padding:14px">Sin personas todavía. Agregá una para probar.</td></tr>';
      }
      personas.forEach(p => {
        html += '<tr>'
          + '<td style="width:80px">' + (p.legajo || '—') + '</td>'
          + '<td><input value="' + (p.nombre||'') + '" onchange="editar(\'' + p.id + '\',\'nombre\',this.value)"></td>'
          + '<td><input value="' + (p.especialidad||'') + '" onchange="editar(\'' + p.id + '\',\'especialidad\',this.value)"></td>'
          + '<td style="width:120px"><select onchange="editar(\'' + p.id + '\',\'tipo\',this.value)"><option ' + (p.tipo==='Directo'?'selected':'') + '>Directo</option><option ' + (p.tipo==='Contratista'?'selected':'') + '>Contratista</option></select></td>'
          + '<td style="width:110px"><input type="number" value="' + (p.costo_hora||0) + '" onchange="editar(\'' + p.id + '\',\'costo_hora\',Number(this.value))" style="text-align:right"></td>'
          + '<td style="width:30px"><button class="btn-del" onclick="eliminar(\'' + p.id + '\')">×</button></td>'
          + '</tr>';
      });
      html += '</tbody></table>';
      html += '<div class="row-actions"><button class="btn-add" onclick="agregar()">+ Agregar persona</button>'
        + '<button class="btn btn-primary" onclick="cargar()">↻ Recargar desde la base</button></div>';
      html += '<p style="font-size:12px;color:#A8A69E;margin-top:14px">Probá: agregá una persona, después recargá esta página entera (F5). Si sigue ahí, la persistencia funciona. Podés verla también en el Table Editor de Supabase.</p>';
      contenido.innerHTML = html;
    }

    async function agregar() {
      const { error } = await sb.from("personal").insert({ nombre: "Nueva persona", tipo: "Directo", costo_hora: 0 });
      if (error) { setEstado("Error al agregar: " + error.message, "err"); return; }
      await cargar();
    }

    async function editar(id, campo, valor) {
      const upd = {}; upd[campo] = valor;
      const { error } = await sb.from("personal").update(upd).eq("id", id);
      if (error) { setEstado("Error al guardar: " + error.message, "err"); return; }
      const p = personas.find(x => x.id === id); if (p) p[campo] = valor;
      setEstado("✓ Guardado.", "ok");
    }

    async function eliminar(id) {
      const { error } = await sb.from("personal").delete().eq("id", id);
      if (error) { setEstado("Error al eliminar: " + error.message, "err"); return; }
      await cargar();
    }

    cargar();
  </script>
</body>
</html>
